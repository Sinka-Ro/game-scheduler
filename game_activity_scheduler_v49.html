<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞品游戏运营活动排期工具 v32-fixed-20260318-01</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f6;--bg3:#efefed;
  --text:#1a1a1a;--text2:#595959;--text3:#9b9b9b;
  --border:#e5e5e3;--border2:#d0d0ce;
  --primary:#5046e4;--primary-light:#ece9ff;
  --row-h:32px;--label-w:160px;--day-w:50px;
  --header-h:30px;--subheader-h:34px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;color:var(--text);background:var(--bg);overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;gap:12px}
.logo{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap}
.badge-beta{font-size:10px;padding:1px 6px;border-radius:10px;background:#e8e6ff;color:#5046e4;margin-left:6px;font-weight:500}
.topbar-mid{display:flex;gap:0;border-bottom:none}
.nav-tab{padding:0 14px;height:48px;display:flex;align-items:center;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
.nav-tab:hover:not(.active){color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;background:var(--bg);color:var(--text);white-space:nowrap;transition:background .1s;line-height:1.5}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.primary:hover{background:#3d34c8}
.btn.sm{padding:3px 8px;font-size:11px}
.btn.danger{color:#d93025;border-color:#f5c6c3}
.btn.danger:hover{background:#fce8e6}
.avatar{width:26px;height:26px;border-radius:50%;background:#e8e6ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#5046e4;flex-shrink:0;cursor:pointer}

/* MAIN AREA */
#mainArea{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ===== LIST VIEW ===== */
.list-view{display:flex;height:100%;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;padding:10px 8px;gap:8px;overflow-y:auto}
.sidebar-section-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;padding:4px 6px 2px}
.filter-item{padding:5px 8px;font-size:12px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;color:var(--text2);transition:background .1s}
.filter-item:hover{background:var(--bg2)}
.filter-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.filter-count{font-size:11px;opacity:.7}
.list-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.list-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{padding:5px 10px 5px 28px;font-size:12px;border:1px solid var(--border2);border-radius:5px;outline:none;background:var(--bg);color:var(--text);width:220px}
.search-wrap input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.list-table-wrap{flex:1;overflow:auto}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.stat-card{background:var(--bg2);border-radius:6px;padding:10px 14px}
.stat-card .val{font-size:20px;font-weight:600;line-height:1.2}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:2px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:7px 12px;font-size:11px;font-weight:500;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;position:sticky;top:0;z-index:5}
td{padding:7px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:var(--bg2)}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:500}

/* ===== GANTT CALENDAR ===== */
.cal-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.cal-toolbar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;flex-wrap:wrap}
.cal-title{font-size:13px;font-weight:600;white-space:nowrap}
.game-switcher{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden;flex-shrink:0}
.game-tab{padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);background:var(--bg);border-right:1px solid var(--border2);transition:background .1s;white-space:nowrap}
.game-tab:last-child{border-right:none}
.game-tab.active{background:var(--primary);color:#fff;font-weight:500}
.game-tab:hover:not(.active){background:var(--bg2)}
.month-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.mnav-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2)}
.mnav-btn:hover{background:var(--bg2)}
.mnav-label{font-size:12px;min-width:64px;text-align:center;color:var(--text)}

.gantt-container{flex:1;display:flex;overflow:hidden}
.gantt-left{width:var(--label-w);flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--border2);position:relative;z-index:10;background:var(--bg)}
.gantt-right{flex:1;overflow-x:auto;overflow-y:auto;position:relative}
.gantt-right-inner{min-width:max-content;position:relative}

/* Frozen left headers */
.left-top{height:calc(var(--header-h) + var(--subheader-h));flex-shrink:0;border-bottom:2px solid var(--border2);display:flex;align-items:flex-end;padding:0 10px 6px;font-size:11px;color:var(--text3);font-weight:500;background:var(--bg2)}
.left-rows{flex:1;overflow-y:hidden;overflow-x:hidden}
.left-cat-header{height:26px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;letter-spacing:.3px;border-bottom:1px solid var(--border);flex-shrink:0}
.left-row{height:var(--row-h);display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.left-row:hover{background:var(--bg2)}

/* Right header */
.right-header{height:calc(var(--header-h) + var(--subheader-h));border-bottom:2px solid var(--border2);background:var(--bg2);position:sticky;top:0;z-index:8}
.week-header-row{height:var(--header-h);display:flex;border-bottom:1px solid var(--border)}
.week-block{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);font-weight:600;border-right:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.day-header-row{height:var(--subheader-h);display:flex}
.day-hcell{width:var(--day-w);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);border-right:1px solid var(--border);cursor:default;flex-direction:column;gap:1px}
.day-hcell.weekend{color:#d93025;background:rgba(217,48,37,.04)}
.day-hcell.today{background:#e8e6ff;color:var(--primary);font-weight:700}

/* Right body rows */
.right-cat-header{height:26px;border-bottom:1px solid var(--border);display:flex;position:relative}
.right-cat-header .day-bg{width:var(--day-w);flex-shrink:0;border-right:1px solid var(--border);height:100%}
.right-row{height:var(--row-h);border-bottom:1px solid var(--border);display:flex;position:relative}
.right-row .day-bg{width:var(--day-w);flex-shrink:0;border-right:1px solid var(--border);height:100%;flex-shrink:0}
.right-row .day-bg.weekend{background:rgba(0,0,0,.018)}
.right-row .day-bg.today{background:rgba(80,70,228,.06)}
.right-row:hover .day-bg{background:rgba(0,0,0,.025)}
.right-row:hover .day-bg.today{background:rgba(80,70,228,.1)}

/* Activity bars */
.act-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:2;transition:filter .1s;pointer-events:all}
.act-bar:hover{filter:brightness(.93)}
.preheat-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;border:1.5px dashed;display:flex;align-items:center;padding:0 5px;font-size:10px;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:1;opacity:.7}

/* Today line */
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--primary);z-index:9;pointer-events:none}

/* Scrollbar sync helper */
.gantt-left .left-rows{scrollbar-width:none}
.gantt-left .left-rows::-webkit-scrollbar{display:none}

/* Tooltip */
.tip{position:fixed;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:10px 14px;font-size:12px;z-index:9999;pointer-events:none;max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none}
.tip-title{font-weight:600;font-size:13px;margin-bottom:6px;color:var(--text)}
.tip-row{color:var(--text2);margin-bottom:3px;line-height:1.5}
.tip-row span{color:var(--text);font-weight:500}

/* Stats view */
.stats-view{padding:20px;overflow-y:auto;height:100%}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-big{background:var(--bg2);border-radius:8px;padding:14px 16px}
.stat-big .num{font-size:24px;font-weight:700}
.stat-big .lbl{font-size:11px;color:var(--text3);margin-top:3px}
.stats-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px}
.panel-title{font-size:13px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--text3);min-width:20px;text-align:right}

/* Collab view */
.collab-view{padding:20px;overflow-y:auto;height:100%}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg);border-radius:10px;width:660px;max-width:95vw;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.flabel{font-size:11px;color:var(--text2);font-weight:600}
.flabel .req{color:#d93025}
input[type=text],input[type=datetime-local],select,textarea{font-size:12px;padding:6px 9px;border:1px solid var(--border2);border-radius:5px;outline:none;color:var(--text);background:var(--bg);font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:64px}
.close-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px}
.close-x:hover{background:var(--bg2);color:var(--text)}
.confirm-box{background:var(--bg);border-radius:10px;padding:28px;width:380px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.confirm-title{font-size:15px;font-weight:600;margin-bottom:8px}
.confirm-desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}

/* Notif */
.notif{position:fixed;top:16px;right:16px;z-index:2000;background:var(--bg);border:1px solid;border-radius:7px;padding:10px 16px;font-size:13px;max-width:340px;transition:opacity .3s;display:none;box-shadow:var(--shadow)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Media library */
.media-view{padding:0;overflow:hidden;height:100%;display:flex;flex-direction:column}
.media-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.media-game-tabs{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.media-game-tab{padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);background:var(--bg);border-right:1px solid var(--border2);white-space:nowrap}
.media-game-tab:last-child{border-right:none}
.media-game-tab.active{background:var(--primary);color:#fff;font-weight:500}
.media-game-tab:hover:not(.active){background:var(--bg2)}
.media-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,150px);gap:10px;align-content:start}
.media-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;width:150px}
.media-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1)}
.media-thumb{width:150px;height:350px;object-fit:cover;display:block;background:var(--bg2)}
.media-thumb-video{width:150px;height:350px;display:flex;align-items:center;justify-content:center;background:#1a1a2e;font-size:28px}
.media-card-body{padding:6px 8px}
.media-card-name{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.media-card-meta{font-size:10px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Attachment zone in detail modal */
.attach-zone{border:2px dashed var(--border2);border-radius:8px;padding:18px 14px;text-align:center;cursor:pointer;transition:border-color .15s;background:var(--bg2);position:relative}
.attach-zone:hover,.attach-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.attach-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.attach-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.attach-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)}
.attach-thumb{width:44px;height:34px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--bg3)}
.attach-thumb-vid{width:44px;height:34px;border-radius:4px;flex-shrink:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:16px}
.attach-info{flex:1;min-width:0}
.attach-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-size{font-size:10px;color:var(--text3)}
.attach-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;border-radius:3px;flex-shrink:0}
.attach-del:hover{background:var(--bg3);color:#d93025}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lightbox img,.lightbox video{max-width:92vw;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-caption{color:#e5e7eb;font-size:13px;max-width:600px;text-align:center}
.lightbox-nav{display:flex;gap:8px}
.lightbox-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:12px}
.lightbox-nav button:hover{background:rgba(255,255,255,.3)}
/* ── Auth ── */
.auth-overlay{position:fixed;inset:0;background:#f0eff7;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.auth-card{background:#fff;border:1px solid #ddd;border-radius:14px;width:100%;max-width:420px;padding:36px 40px;box-shadow:0 8px 32px rgba(80,70,228,.1)}
.auth-logo{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-.3px}
.auth-sub{font-size:12px;color:#9b9b9b;margin:4px 0 26px}
.auth-tabs{display:flex;border-bottom:1px solid #e5e5e3;margin-bottom:22px}
.atab{padding:8px 18px;font-size:13px;cursor:pointer;color:#9b9b9b;border-bottom:2px solid transparent;transition:color .15s}
.atab.active{color:#5046e4;border-bottom-color:#5046e4;font-weight:500}
.afield{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.alabel{font-size:11px;font-weight:600;color:#595959}
.ainput{padding:9px 12px;border:1px solid #d0d0ce;border-radius:7px;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
.ainput:focus{border-color:#5046e4;box-shadow:0 0 0 3px rgba(80,70,228,.1)}
.abtn{width:100%;padding:11px;background:#5046e4;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit;letter-spacing:.2px}
.abtn:hover{background:#3d34c8}
.abtn:disabled{background:#c7c4f0;cursor:not-allowed}
.amsg{font-size:12px;padding:9px 12px;border-radius:7px;margin-top:10px;line-height:1.6}
.amsg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.amsg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.amsg.warn{background:#fffbeb;color:#713f12;border:1px solid #fde68a}
/* role badges */
.rbadge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.rb-admin{background:#fee2e2;color:#991b1b}
.rb-editor{background:#dbeafe;color:#1d4ed8}
.rb-viewer{background:#f3f4f6;color:#6b7280}
.rb-pending{background:#fffbeb;color:#713f12}
/* ── Daily Recommendations ── */
.daily-view{padding:20px;overflow-y:auto;height:100%}
.daily-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.daily-title{font-size:16px;font-weight:600}
.daily-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.daily-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative}
.daily-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#5046e4}
.daily-card.important-card{border-color:#f59e0b;background:#fffdf0}
.daily-card-body{padding:14px 16px}
.daily-card-num{position:absolute;top:10px;right:12px;font-size:20px;font-weight:700;color:rgba(0,0,0,.08);line-height:1;z-index:1}
.daily-card-meta{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.daily-card-name{font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4}
.daily-card-detail{font-size:11px;color:var(--text2);line-height:1.7}
.daily-card-reason{font-size:11px;background:var(--bg2);padding:7px 10px;border-radius:6px;color:var(--text2);margin-top:8px;line-height:1.6;border-left:3px solid #5046e4}
/* Slideshow */
.dc-slideshow{width:100%;aspect-ratio:1/3;position:relative;overflow:hidden;background:#1a1a2e;flex-shrink:0}
.dc-slide{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;display:flex;align-items:center;justify-content:center}
.dc-slide.active{opacity:1}
.dc-slide img{width:100%;height:100%;object-fit:cover;display:block}
.dc-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.dc-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .3s}
.dc-dot.active{background:#fff}
/* Media type grouping */
.media-type-section{margin-bottom:20px}
.media-type-hd{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
/* ── Report ── */
.report-view{display:flex;height:100%;overflow:hidden}
.report-sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;padding:14px 12px;gap:4px;overflow-y:auto}
.report-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.report-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--bg)}
.report-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;align-content:start}
.report-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.report-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#5046e4}
.report-card-thumb{width:100%;height:160px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.report-card-thumb img{width:100%;height:100%;object-fit:cover}
.report-card-thumb .pdf-icon{font-size:48px;opacity:.5}
.report-card-body{padding:12px 14px}
.report-card-title{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.report-card-meta{font-size:11px;color:var(--text3);margin-bottom:6px}
.report-tags{display:flex;flex-wrap:wrap;gap:4px}
.rtag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;cursor:pointer}
.rtag-filter{padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;border:none;background:transparent;width:100%;text-align:left;color:var(--text2)}
.rtag-filter:hover,.rtag-filter.active{background:var(--bg2);color:#5046e4;font-weight:500}
.report-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;padding:40px}

/* ── Type Search Dropdown ── */
.type-search-wrap{position:relative}
.type-search-input{font-size:12px;padding:6px 28px 6px 9px;border:1px solid var(--border2);border-radius:5px;outline:none;color:var(--text);background:var(--bg);width:100%;cursor:pointer;box-sizing:border-box}
.type-search-input:focus{border-color:var(--primary)}
.type-search-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--text3);pointer-events:none}
.type-search-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--bg);border:1px solid var(--border2);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:9999;max-height:220px;overflow-y:auto;display:none}
.type-search-dropdown.open{display:block}
.type-search-opt{padding:7px 10px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px}
.type-search-opt:hover,.type-search-opt.highlighted{background:var(--primary-light);color:var(--primary)}
.type-search-opt .opt-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.type-search-opt mark{background:transparent;color:var(--primary);font-weight:600}
.type-search-empty{padding:10px;font-size:12px;color:var(--text3);text-align:center}

/* ── Calendar row drag ── */
.cal-row-drag.drag-over-row{background:var(--primary-light)!important;outline:2px dashed var(--primary);}
.cal-row-drag.dragging-row{opacity:.4;}
.cal-right-row.drag-over-row{background:rgba(80,70,228,.08)!important;}
.cal-right-row.dragging-row{opacity:.4;}

/* ── Media type filter bar ── */
.media-type-bar{display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap;align-items:center}
.media-type-chip{padding:3px 11px;font-size:12px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);transition:all .12s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.media-type-chip:hover{border-color:var(--primary);color:var(--primary)}
.media-type-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:500}
.media-type-chip .chip-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
/* ── Media paste zone ── */
.media-paste-zone{border:2px dashed var(--border2);border-radius:8px;margin:0 16px 12px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;background:var(--bg)}
.media-paste-zone:hover,.media-paste-zone.pasting{border-color:var(--primary);background:var(--primary-light)}
.media-paste-zone.pasting{border-style:solid}
.media-paste-zone-icon{font-size:20px;flex-shrink:0}
.media-paste-zone-text{font-size:12px;color:var(--text2);line-height:1.5}
.media-paste-zone-sub{font-size:11px;color:var(--text3);margin-top:2px}
.media-act-selector{font-size:12px;padding:4px 8px;border:1px solid var(--border2);border-radius:5px;outline:none;color:var(--text);background:var(--bg);max-width:200px}

/* ── Media upload zone (drag + file + paste) ── */
.media-upload-zone{display:flex;gap:0;margin:0 16px 12px;border:2px dashed var(--border2);border-radius:8px;background:var(--bg);overflow:hidden;transition:border-color .15s}
.media-upload-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.media-upload-droparea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 12px;cursor:default;text-align:center;min-height:90px;transition:background .15s}
.media-upload-droparea.drag-over{background:var(--primary-light)}
.media-upload-drop-icon{font-size:24px;margin-bottom:4px;line-height:1}
.media-upload-drop-main{font-size:12px;color:var(--text2);font-weight:500}
.media-upload-drop-sub{font-size:10px;color:var(--text3);margin-top:5px}
.media-upload-side{width:150px;flex-shrink:0;border-left:1px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;background:var(--bg2)}

/* ── Calendar game notes bar ── */
.cal-notes-bar{display:flex;align-items:flex-start;gap:8px;padding:6px 14px;background:#fffbeb;border-bottom:1px solid #fde68a;flex-shrink:0;min-height:32px}
.cal-notes-bar.empty{background:var(--bg2);border-bottom-color:var(--border)}
.cal-notes-icon{font-size:13px;flex-shrink:0;margin-top:1px;opacity:.7}
.cal-notes-text{flex:1;font-size:12px;color:#713f12;line-height:1.6;white-space:pre-wrap;word-break:break-word;min-height:18px}
.cal-notes-text.empty-hint{color:var(--text3);font-style:italic}
.cal-notes-edit-btn{flex-shrink:0;font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid #fde68a;background:transparent;color:#92400e;cursor:pointer;margin-top:1px;white-space:nowrap}
.cal-notes-edit-btn:hover{background:#fef9c3}
</style>

  document.getElementById(elId).innerHTML=msg?`<div class="amsg ${type}">${msg}</div>`:'';
}

async function authLogin(){
  const sb=getSB();
  if(!sb){showAuthMsg('请先在「存储设置」中配置 Supabase','err','login');return;}
  const email=document.getElementById('a-email').value.trim();
  const pwd=document.getElementById('a-pwd').value;
  if(!email||!pwd){setAuthMsg('a-login-msg','请填写邮箱和密码','err');return;}
  const btn=document.getElementById('a-login-btn');
  btn.disabled=true;btn.textContent='登录中…';
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
    if(error) throw new Error(error.message==='Invalid login credentials'?'邮箱或密码错误，请重试':error.message);
    await handleAuthUser(data.user);
  }catch(e){
    setAuthMsg('a-login-msg',e.message,'err');
  }finally{
    btn.disabled=false;btn.textContent='登录';
  }
}

async function authRegister(){
  const sb=getSB();
  if(!sb){setAuthMsg('a-reg-msg','请先配置 Supabase（底部「存储设置」）','err');return;}
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pwd=document.getElementById('r-pwd').value;
  const reason=document.getElementById('r-reason').value.trim();
  if(!name||!email||!pwd){setAuthMsg('a-reg-msg','请填写所有必填项','err');return;}
  if(pwd.length<6){setAuthMsg('a-reg-msg','密码至少需要6位','err');return;}
  const btn=document.getElementById('a-reg-btn');
  btn.disabled=true;btn.textContent='提交中…';
  try{
    const {data,error}=await sb.auth.signUp({email,password:pwd,options:{data:{display_name:name}}});
    if(error) throw new Error(error.message);
    if(data.user){
      await sb.from('user_profiles').upsert({id:data.user.id,email,name,role:'pending',reason});
      // Write pending notif into opLogs for admin visibility
      opLogs.unshift({time:ts(),user:'系统',action:`新账号申请：${name}（${email}）${reason?'，说明：'+reason:''}`});
      saveData();
    }
    setAuthMsg('a-reg-msg','✓ 申请已提交！请等待管理员审批，通过后刷新页面登录。','ok');
  }catch(e){
    setAuthMsg('a-reg-msg','注册失败：'+e.message,'err');
  }finally{
    btn.disabled=false;btn.textContent='提交申请';
  }
}

async function authLogout(){
  stopCloudSync();
  const sb=getSB();
  if(sb) await sb.auth.signOut().catch(()=>{});
  currentUser={id:'',name:'',role:'none',email:''};
  updateTopbarUser();
  showAuthOverlay('login');
}

async function handleAuthUser(user){
  if(!user) return;
  const sb=getSB();
  const {data:prof,error}=await sb.from('user_profiles').select('*').eq('id',user.id).single();
  if(error||!prof){
    // Profile missing — create pending
    await sb.from('user_profiles').upsert({id:user.id,email:user.email,name:user.user_metadata?.display_name||user.email.split('@')[0],role:'pending',reason:''});
    showPendingState();return;
  }
  if(prof.role==='pending'||prof.role==='revoked'){
    showAuthOverlay('pending');
    if(prof.role==='revoked'){
      const el=document.getElementById('aform-pending');
      if(el){const m=el.querySelector('.amsg');if(m)m.textContent='❌ 您的账号访问权限已被撤销，如有疑问请联系管理员。';}
    }
    return;
  }
  currentUser={id:user.id,name:prof.name||prof.email,role:prof.role,email:prof.email};
  document.getElementById('auth-overlay').style.display='none';
  updateTopbarUser();
  addLog('登录系统');
  renderMain();
  startCloudSync();
  if(prof.role==='admin') checkPendingApprovals();
  // Upcoming activity reminder
  setTimeout(()=>{
    const soon=activities.filter(a=>{
      const d=(new Date(a.startTime)-TODAY)/86400000;
      return d>0&&d<=3;
    });
    if(soon.length) showNotif(`提醒：《${soon[0].game}》「${soon[0].name}」将于 ${Math.ceil((new Date(soon[0].startTime)-TODAY)/86400000)} 天后开始`);
  },800);
}

function showPendingState(revoked=false){
  showAuthOverlay('pending');
  if(revoked){
    const el=document.getElementById('aform-pending');
    if(el){const m=el.querySelector('.amsg');if(m)m.textContent='❌ 您的账号访问权限已被撤销，如有疑问请联系管理员。';}
  }
}

function updateTopbarUser(){
  const av=document.getElementById('userAvatar');
  const un=document.getElementById('userName');
  const addBtn=document.getElementById('add-btn');
  if(av) av.textContent=currentUser.name?currentUser.name[0].toUpperCase():'?';
  if(un) un.textContent=(currentUser.name||'未登录')+' ▾';
  // Hide add button for non-editors and anyone not properly authenticated
  const canAdd = currentUser.id && (currentUser.role==='editor'||currentUser.role==='admin');
  if(addBtn) addBtn.style.display=canAdd?'':'none';
  // Show logs + collab tabs only for admins
  const logsTab=document.getElementById('logs-tab');
  if(logsTab) logsTab.style.display=currentUser.role==='admin'?'':'none';
  const collabTab=document.getElementById('collab-tab');
  if(collabTab) collabTab.style.display=currentUser.role==='admin'?'':'none';
}

async function checkPendingApprovals(){
  const sb=getSB();if(!sb)return;
  const {data}=await sb.from('user_profiles').select('id').eq('role','pending');
  if(data&&data.length>0)
    setTimeout(()=>showNotif(`有 ${data.length} 个账号申请待审批，请前往「协作管理」处理`),800);
}

async function checkAuthState(){
  const sb=getSB();if(!sb)return false;
  const {data:{session}}=await sb.auth.getSession().catch(()=>({data:{session:null}}));
  if(session?.user){await handleAuthUser(session.user);return true;}
  return false;
}

// ── User management (admin panel) ──
async function loadAndRenderUsers(){
  if(currentUser.role!=='admin'){return;}
  const sb=getSB();if(!sb)return;
  const wrap=document.getElementById('user-mgmt');if(!wrap)return;
  wrap.innerHTML=`<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">加载中…</div>`;

  const pending=profiles.filter(p=>p.role==='pending');
  const active=profiles.filter(p=>p.role!=='pending');
  const rb=r=>({admin:'rb-admin',editor:'rb-editor',viewer:'rb-viewer',pending:'rb-pending',revoked:'rb-viewer'})[r]||'rb-viewer';
  const rl=r=>({admin:'管理员',editor:'编辑者',viewer:'查看者',pending:'待审批',revoked:'已撤销'})[r]||r;

  const pendingSection=pending.length===0?'':`
    <div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:600;color:#713f12">待审批账号</span>
        <span style="background:#fef9c3;border:1px solid #fde68a;color:#713f12;font-size:10px;padding:1px 7px;border-radius:10px">${pending.length}</span>
      </div>
      <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;overflow:hidden">
        ${pending.map(p=>`
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #fde68a">
            <div style="width:30px;height:30px;border-radius:50%;background:#fef9c3;color:#713f12;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${(p.name||'?')[0].toUpperCase()}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:500">${p.name} <span style="font-size:11px;color:var(--text3)">${p.email}</span></div>
              ${p.reason?`<div style="font-size:11px;color:var(--text2);margin-top:2px">申请说明：${p.reason}</div>`:''}
              <div style="font-size:10px;color:var(--text3);margin-top:1px">${(p.created_at||'').split('T')[0]} 申请</div>
            </div>
            <div style="display:flex;gap:5px;flex-shrink:0">
              <button class="btn sm" style="background:#dcfce7;color:#166534;border-color:#bbf7d0" onclick="approveUser('${p.id}','editor','${p.name}')">批准·编辑者</button>
              <button class="btn sm" style="background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe" onclick="approveUser('${p.id}','viewer','${p.name}')">批准·查看者</button>
              <button class="btn sm danger" onclick="rejectUser('${p.id}','${p.name}')">拒绝</button>
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  const activeSection=`
    <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)">全部成员（${active.length}）</div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden">
      ${active.map(p=>`
        <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)${p.id===currentUser.id?';background:#f0f0ff':''}">
          <div style="width:28px;height:28px;border-radius:50%;background:#e8e6ff;color:#5046e4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${(p.name||'?')[0].toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:500">${p.name}${p.id===currentUser.id?' <span style="font-size:10px;color:var(--text3)">(我)</span>':''}</div>

            <option value="" disabled selected>修改权限…</option>
            <option value="admin">管理员</option>
            <option value="editor">编辑者</option>
            <option value="viewer">查看者</option>
            <option value="revoked" style="color:#d93025">撤销访问</option>
          </select>`:'<span style="width:90px"></span>'}
        </div>`).join('')}
    </div>`;

  wrap.innerHTML=pendingSection+activeSection+`<div style="margin-top:8px;text-align:right"><button class="btn sm" onclick="loadAndRenderUsers()">刷新列表</button></div>`;
}

async function approveUser(id,role,name){
  const sb=getSB();if(!sb)return;
  await sb.from('user_profiles').update({role}).eq('id',id);
  addLog(`审批通过了 ${name} 的申请，角色：${role==='editor'?'编辑者':'查看者'}`);
  showNotif(`已批准 ${name}，角色：${role==='editor'?'编辑者':'查看者'}`);
  loadAndRenderUsers();
}

async function rejectUser(id,name){
  const sb=getSB();if(!sb)return;
  await sb.from('user_profiles').update({role:'revoked'}).eq('id',id);
  addLog(`拒绝了 ${name} 的账号申请`);
  showNotif(`已拒绝 ${name} 的申请`);
  loadAndRenderUsers();
}

async function changeUserRole(id,role,name){
  const sb=getSB();if(!sb)return;
  await sb.from('user_profiles').update({role}).eq('id',id);
  const label={admin:'管理员',editor:'编辑者',viewer:'查看者',revoked:'撤销访问'};
  addLog(`将 ${name} 的权限修改为「${label[role]||role}」`);
  showNotif(`${name} 的权限已更新为：${label[role]||role}`);
  loadAndRenderUsers();
}
// ── Show auth overlay in specific state ──
function showAuthOverlay(state){
  const overlay = document.getElementById('auth-overlay');
  if(!overlay) return;
  overlay.style.display = 'flex';

  // Hide all forms first
  ['aform-login','aform-reg','aform-pending','aform-nosupabase'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const tabs = document.getElementById('auth-tabs');
  const sub  = document.getElementById('auth-sub-text');

  if(state==='nosupabase'){
    if(tabs) tabs.style.display='none';
    if(sub)  sub.textContent='访问受限';
    const el=document.getElementById('aform-nosupabase'); if(el) el.style.display='';
  } else if(state==='pending'){
    if(tabs) tabs.style.display='none';
    if(sub)  sub.textContent='账号待审批';
    const el=document.getElementById('aform-pending'); if(el) el.style.display='';
  } else {
    // login or reg
    if(tabs) tabs.style.display='flex';
    if(sub)  sub.textContent='请登录以继续，账号由管理员审批后生效';
    authTab(state==='reg'?'reg':'login');
  }
}

async function doSetupFromAuthScreen(){
  const url=(document.getElementById('setup-sb-url').value||'').trim().replace(/\/$/,'');
  const key=(document.getElementById('setup-sb-key').value||'').trim();
  const msgEl=document.getElementById('setup-sb-msg');
  if(!url||!key){
    if(msgEl) msgEl.innerHTML=`<div class="amsg err" style="margin-top:8px">请填写 Project URL 和 anon key</div>`;
    return;
  }
  const btn=document.getElementById('setup-sb-btn');
  btn.disabled=true; btn.textContent='连接中…';
  try{
    // Test connection
    const r=await fetch(`${url}/rest/v1/scheduler_data?id=eq.main_data&select=id`,{
      headers:{'apikey':key,'Authorization':'Bearer '+key}
    });
    if(!r.ok&&r.status!==404&&r.status!==200) throw new Error(`连接失败 ${r.status}`);
    // Save config
    persistCloudConfig(url, key, 'scheduler_data');
    _sbUrl=url; _sbKey=key; _sbReady=true;
    _sb=null; getSB(); // reinitialize
    if(msgEl) msgEl.innerHTML=`<div class="amsg ok" style="margin-top:8px">
      ✓ 连接成功！正在进入…<br><br>
      <strong>重要：</strong>请在工具 HTML 文件第 <code>_sbUrl</code> 和 <code>_sbKey</code> 两行填入以下值后重新部署，这样所有人打开后直接看到登录界面：<br>
      <code style="font-size:10px;word-break:break-all">'${url}'</code>
    </div>`;
    setTimeout(()=>location.reload(), 2000);
  }catch(e){
    btn.disabled=false; btn.textContent='连接并进入';
    if(msgEl) msgEl.innerHTML=`<div class="amsg err" style="margin-top:8px">连接失败：${e.message}</div>`;
  }
}

function getSnapshotRevision(d){
  const rev = Number(d?._meta?.revision || d?.savedAtMs || 0);
  if(Number.isFinite(rev) && rev > 0) return rev;
  const parsed = d?.savedAt ? Date.parse(String(d.savedAt).replace(' ','T')) : NaN;
  return Number.isFinite(parsed) ? parsed : 0;
}

function getAttachmentsSignature(src){
  const obj = src || {};
  return Object.keys(obj).sort().map(actId=>{
    const arr = Array.isArray(obj[actId]) ? obj[actId] : [];
    const items = arr.map(att=>[
      att.id || '',
      att.type || '',
      att.name || '',
      att.addedAt || '',
      att.size || 0,
      String(att.data || '').length
    ].join(':')).join(',');
    return `${actId}[${items}]`;
  }).join('|');
}

function shouldDelayCloudApply(){
  return !!document.getElementById('modal-overlay') || !!_saveTimer;
}

async function refreshCloudState(opts){
  const options = opts || {};
  if(!_sbReady || !_sbUrl || !_sbKey) return false;
  if(_syncBusy) return false;
  if(shouldDelayCloudApply() && !options.force){
    const alreadyDeferred = _syncDeferred;
    _syncDeferred = true;
    if(options.notify !== false && !alreadyDeferred){
      showNotif(document.getElementById('modal-overlay')
        ? '检测到团队更新，关闭当前弹窗后会自动刷新'
        : '检测到团队更新，当前修改保存后会自动刷新');
    }
    return false;
  }

  // BUG2 FIX: if we have a pending save, flush it NOW before reading cloud
  // Otherwise we might apply remote data that doesn't include our unsaved changes,
  // then our save timer fires and overwrites with a snapshot that lost remote changes
  if(_saveTimer){
    clearTimeout(_saveTimer);
    _saveTimer = null;
    try{ await _doSave(); }catch(e){ console.warn('Pre-refresh flush failed', e); }
    // _doSave already reads+merges+writes, so we're done — no need to apply cloud again
    return true;
  }

  _syncBusy = true;
  try{
    const cloud = await sbReadRow('main_data');
    if(!cloud) return false;
    await sbReadAttachments();
    const nextRev = getSnapshotRevision(cloud);
    const nextAttSig = getAttachmentsSignature(attachments);
    const changed = !!options.force || nextRev > _syncLastMainRev || nextAttSig !== _syncLastAttachmentSig;
    if(!changed) return false;
    const ownMainWrite = nextRev && nextRev === _lastLocalSaveRev;
    const ownAttachmentWrite = nextAttSig && nextAttSig === _lastLocalAttachmentSig;

    // BUG1 FIX: use merge mode — never discard local-only activities
    applySnapshot(cloud, { merge: true });
    persistSnapshotToLocal(buildSnapshot());
    _syncLastMainRev = nextRev;
    _syncLastAttachmentSig = nextAttSig;
    updateTopbarUser();
    if(currentUser.id) renderMain();
    updateBarTs();
    setBarState('cloud', ownMainWrite || ownAttachmentWrite ? '云端已连接（Supabase）' : `已接收团队更新 · ${ts()}`);
    if(options.notify !== false && !ownMainWrite && !ownAttachmentWrite){
      showNotif(options.message || '检测到团队更新，页面已自动刷新');
    }
    return true;
  }catch(e){
    console.warn('Cloud refresh failed', e);
    if(options.reportError) setBarState('error', `云端同步检查失败：${e.message}`);
    return false;
  }finally{
    _syncBusy = false;
  }
}

function scheduleCloudRefresh(reason, opts){
  const options = opts || {};
  if(!_sbReady || !_sbUrl || !_sbKey) return;
  if(_syncReloadTimer) clearTimeout(_syncReloadTimer);
  _syncReloadTimer = setTimeout(()=>{
    refreshCloudState({
      force: !!options.force,
      notify: options.notify,
      message: options.message,
      reportError: !!options.reportError,
      reason
    });
  }, reason === 'poll' ? 0 : 250);
}

function flushDeferredCloudRefresh(){
  if(!_syncDeferred) return;
  _syncDeferred = false;
  scheduleCloudRefresh('deferred', { notify:true, message:'已应用团队刚刚的更新' });
}

function stopCloudSync(){
  if(_syncReloadTimer){ clearTimeout(_syncReloadTimer); _syncReloadTimer = null; }
  if(_syncPollTimer){ clearInterval(_syncPollTimer); _syncPollTimer = null; }
  const sb = getSB();
  if(_syncChannel && sb && sb.removeChannel){
    try{ sb.removeChannel(_syncChannel); }catch(e){}
  }
  _syncChannel = null;
}

function startCloudSync(){
  if(!_sbReady || !_sbUrl || !_sbKey || !currentUser.id) return;
  stopCloudSync();
  const local = lsLoad() || {};
  if(local._snapshot) _syncLastMainRev = getSnapshotRevision(local._snapshot);
  _syncLastAttachmentSig = getAttachmentsSignature(local._attachments || attachments);
  const sb = getSB();
  if(sb && sb.channel){
    try{
      _syncChannel = sb.channel(`scheduler-sync-${getClientId()}`).on('postgres_changes',{
        event:'*',
        schema:'public',
        table:_sbTable
      }, payload=>{
        const rowId = payload?.new?.id || payload?.old?.id || '';
        if(rowId === 'main_data' || String(rowId).startsWith('att_')){
          scheduleCloudRefresh('realtime', { notify:true });
        }
      }).subscribe(status=>{
        if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
          console.warn('Realtime subscription status', status);
        }
      });
    }catch(e){
      console.warn('Start realtime sync failed', e);
    }
  }
  _syncPollTimer = setInterval(()=>{
    if(document.hidden) return;
    scheduleCloudRefresh('poll', { notify:false });
  }, CLOUD_SYNC_POLL_MS);
  if(!_syncVisibilityBound){
    document.addEventListener('visibilitychange', ()=>{
      if(!document.hidden) scheduleCloudRefresh('focus', { notify:false });
    });
    _syncVisibilityBound = true;
  }
  scheduleCloudRefresh('sync-start', { notify:false });
}

function encodeCloudShareConfig(url,key,table){
  try{
    return btoa(JSON.stringify({
      u:(url || '').trim().replace(/\/$/,''),
      k:(key || '').trim(),
      t:(table || 'scheduler_data').trim() || 'scheduler_data'
    })).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }catch(e){
    console.warn('Encode cloud share config failed', e);
    return '';
  }
}

function decodeCloudShareConfig(raw){
  try{
    if(!raw) return null;
    const normalized = String(raw).replace(/-/g,'+').replace(/_/g,'/');
    const pad = '='.repeat((4 - normalized.length % 4) % 4);
    const cfg = JSON.parse(atob(normalized + pad));
    const url = (cfg.u || cfg.url || '').trim().replace(/\/$/,'');
    const key = (cfg.k || cfg.key || '').trim();
    const table = (cfg.t || cfg.table || 'scheduler_data').trim() || 'scheduler_data';
    if(!url || !key) return null;
    return {_sbUrl:url,_sbKey:key,_sbTable:table};
  }catch(e){
    console.warn('Decode cloud share config failed', e);
    return null;
  }
}

function stripCloudConfigFromLocation(){
  try{
    const url = new URL(window.location.href);
    let changed = false;
    if(url.searchParams.has('cloud')){
      url.searchParams.delete('cloud');
      changed = true;
    }
    if((url.hash || '').startsWith('#cloud=')){
      url.hash = '';
      changed = true;
    }
    if(changed && window.history && window.history.replaceState){
      window.history.replaceState(null, '', url.toString());
    }
  }catch(e){}
}

function getCloudConfigFromLocation(){
  try{
    const url = new URL(window.location.href);
    const queryCfg = decodeCloudShareConfig(url.searchParams.get('cloud') || '');
    if(queryCfg) return queryCfg;
    if((url.hash || '').startsWith('#cloud=')){
      return decodeCloudShareConfig(url.hash.slice(7));
    }
  }catch(e){}
  return null;
}

function buildCollabShareUrl(url,key,table){
  const token = encodeCloudShareConfig(url,key,table);
  if(!token) return '';
  try{
    const shareUrl = new URL(window.location.href);
    shareUrl.searchParams.delete('cloud');
    shareUrl.hash = `cloud=${token}`;
    return shareUrl.toString();
  }catch(e){
    return `${window.location.href.split('#')[0]}#cloud=${token}`;
  }
}

async function copyText(text){
  if(!text) return false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){}
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly','readonly');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try{ ok = document.execCommand('copy'); }catch(e){}
  ta.remove();
  return ok;
}

// ─── Snapshot ───
function buildSnapshot(){
  // Attachments saved separately — keep main snapshot small
  const revision = Date.now();
  // Prune tombstones older than 30 days to keep snapshot lean
  const cutoff = Date.now() - 30*24*60*60*1000;
  const prunedDeleted = {};
  Object.entries(_deletedKeys).forEach(([k,ts])=>{ if(ts>cutoff) prunedDeleted[k]=ts; });
  _deletedKeys = prunedDeleted;
  return { activities:activities.map(normalizeActivity), GAMES, ACT_TYPES, TYPE_COLORS,
           GAME_CATS, GAME_CAT_COLORS, GAME_CAT_TEXT, GAME_NOTES,
           opLogs:opLogs.slice(0,300),
           reports, REPORT_TAGS, REPORT_TAG_COLORS,
           _deletedKeys,
           savedAt:ts(), savedAtMs:revision,
           _meta:{ revision, clientId:getClientId(), userId:currentUser.id||'', userName:currentUser.name||'' } };
}

// Merge two activity arrays.
// localWins=true  → used when SAVING: our edits are authoritative, also absorb remote-only additions.
// localWins=false → used when LOADING: remote wins for shared records, keep local-only additions.
// tombstones (_deletedKeys) prevent deleted items from being resurrected.
function mergeActivities(localActs, remoteActs, deletedKeys, localWins){
  const tombstones = deletedKeys || _deletedKeys || {};
  const remoteMap = new Map();
  (remoteActs||[]).forEach(a=>{
    const norm = normalizeActivity(a);
    const k = getActivityRef(norm);
    if(k && !tombstones[k]) remoteMap.set(k, norm);
  });
  const localMap = new Map();
  (localActs||[]).forEach(a=>{
    const k = getActivityRef(a);
    if(k && !tombstones[k]) localMap.set(k, a);
  });

  if(localWins){
    // SAVE scenario: local is authoritative for additions/edits.
    // Start with local activities (local wins for shared records).
    const merged = [...localMap.values()].map(a => normalizeActivity(a));
    // Absorb remote-only activities (teammate's new additions not yet in our local).
    remoteMap.forEach((act, key)=>{
      if(!localMap.has(key)) merged.push(act);
    });
    return merged;
  } else {
    // LOAD scenario: remote wins for shared records.
    // Start with all remote activities.
    const merged = [...remoteMap.values()];
    // Add local-only activities (not yet pushed to cloud — new local additions).
    localMap.forEach((act, key)=>{
      if(!remoteMap.has(key)) merged.unshift(normalizeActivity(act));
    });
    return merged;
  }
}

function applySnapshot(d, opts){
  if(!d) return false;
  const merge = opts && opts.merge;
  const localWins = opts && opts.localWins;

  // Always merge tombstones from incoming snapshot — union of all clients' deletions
  if(d._deletedKeys && typeof d._deletedKeys === 'object'){
    Object.entries(d._deletedKeys).forEach(([k,ts])=>{
      if(!_deletedKeys[k] || ts > _deletedKeys[k]) _deletedKeys[k] = ts;
    });
  }

  if(Array.isArray(d.activities)){
    if(merge && activities.length > 0){
      // Pass merged tombstone set so merge respects all known deletions.
      // localWins=true when our local snapshot is newer (unsaved edit before refresh).
      activities = mergeActivities(activities, d.activities, _deletedKeys, localWins);
    } else {
      // Full replace — still filter out tombstoned items
      activities = d.activities.map(normalizeActivity).filter(a=>!_deletedKeys[getActivityRef(a)]);
    }
  }
  if(Array.isArray(d.GAMES)&&d.GAMES.length) GAMES=d.GAMES;
  if(Array.isArray(d.ACT_TYPES)&&d.ACT_TYPES.length) ACT_TYPES=d.ACT_TYPES;
  if(d.TYPE_COLORS)     Object.assign(TYPE_COLORS,d.TYPE_COLORS);
  if(d.GAME_CATS)       Object.assign(GAME_CATS,d.GAME_CATS);
  if(d.GAME_CAT_COLORS) Object.assign(GAME_CAT_COLORS,d.GAME_CAT_COLORS);
  if(d.GAME_CAT_TEXT)   Object.assign(GAME_CAT_TEXT,d.GAME_CAT_TEXT);
  if(d.GAME_NOTES)       Object.assign(GAME_NOTES,d.GAME_NOTES);
  if(Array.isArray(d.opLogs)) opLogs=d.opLogs;
  // attachments loaded separately via sbReadAttachments()
  if(Array.isArray(d.reports)) reports=d.reports;
  if(Array.isArray(d.REPORT_TAGS)&&d.REPORT_TAGS.length) REPORT_TAGS=d.REPORT_TAGS;
  if(d.REPORT_TAG_COLORS) Object.assign(REPORT_TAG_COLORS,d.REPORT_TAG_COLORS);
  return true;
}

// ─── Supabase REST helpers ───
// Main data  → row id='main_data'  (activities, config, logs — no images)
// Attachments → row id='att_{actId}' (one row per activity, base64 images here)
// This split keeps main_data small (<50KB) and prevents sync failures from large payloads.

async function sbUpsertRow(rowId, payload){
  const base = `${_sbUrl}/rest/v1/${_sbTable}`;
  const hdrs = { 'Content-Type':'application/json', 'apikey':_sbKey,
                 'Authorization':'Bearer '+_sbKey, 'Prefer':'return=minimal,resolution=merge-duplicates' };
  const body = JSON.stringify({ id: rowId, payload: JSON.stringify(payload) });
  // Use upsert (POST with merge-duplicates) — simpler and avoids PATCH/INSERT dance
  const r = await fetch(base, { method:'POST', headers:hdrs, body });
  if(!r.ok){ const t=await r.text(); throw new Error(`写入失败 ${r.status}: ${t.slice(0,120)}`); }
}

async function sbReadRow(rowId){
  const r = await fetch(`${_sbUrl}/rest/v1/${_sbTable}?id=eq.${encodeURIComponent(rowId)}&select=payload`, {
    headers:{ 'apikey':_sbKey, 'Authorization':'Bearer '+_sbKey }
  });
  if(!r.ok) throw new Error(`读取失败 ${r.status}`);
  const rows = await r.json();
  if(!rows||!rows.length) return null;
  return JSON.parse(rows[0].payload);
}

async function sbReadAttachments(){
  // Fetch all attachment rows in one query
  const r = await fetch(`${_sbUrl}/rest/v1/${_sbTable}?id=like.att_*&select=id,payload`, {
    headers:{ 'apikey':_sbKey, 'Authorization':'Bearer '+_sbKey }
  });
  if(!r.ok) return { items: attachments, signature:getAttachmentsSignature(attachments) };
  const rows = await r.json();
  const nextAttachments = {};
  if(!rows||!rows.length){
    attachments = nextAttachments;
    return { items: attachments, signature:'' };
  }
  rows.forEach(row=>{
    try{
      const actId = row.id.slice(4); // strip "att_" prefix
      const atts  = JSON.parse(row.payload);
      if(Array.isArray(atts)&&atts.length) nextAttachments[actId]=atts;
    }catch(e){}
  });
  attachments = nextAttachments;
  return { items: attachments, signature:getAttachmentsSignature(attachments) };
}

async function sbSaveAttachments(actId){
  if(!_sbReady||!_sbUrl||!_sbKey) return;
  const atts=attachments[actId];
  if(!atts||!atts.length){
    // No attachments left — delete the row
    fetch(`${_sbUrl}/rest/v1/${_sbTable}?id=eq.att_${encodeURIComponent(actId)}`,{
      method:'DELETE', headers:{'apikey':_sbKey,'Authorization':'Bearer '+_sbKey}
    }).catch(()=>{});
    return;
  }
  await sbUpsertRow(`att_${actId}`, atts);
}

// ─── Load ───
async function loadData(){
  let local = lsLoad();
  const sharedCfg = getCloudConfigFromLocation();
  if(sharedCfg){
    local = persistCloudConfig(sharedCfg._sbUrl, sharedCfg._sbKey, sharedCfg._sbTable);
    stripCloudConfigFromLocation();
  }
  if(local && local._snapshot)    applySnapshot(local._snapshot);
  if(local && local._attachments) Object.assign(attachments, local._attachments);
  if(local && local._ui) applyUiState(local._ui);

  // Priority: hardcoded values in HTML > localStorage config
  // This ensures ALL users connect to the same Supabase even without localStorage config
  const effectiveUrl = _sbUrl || (local && local._sbUrl) || '';
  const effectiveKey = _sbKey || (local && local._sbKey) || '';
  const effectiveTable = _sbTable || (local && local._sbTable) || 'scheduler_data';

  if(effectiveUrl && effectiveKey && window.supabase){
    _sbUrl   = effectiveUrl;
    _sbKey   = effectiveKey;
    _sbTable = effectiveTable;
    _sb = null;
    try{
      const cloud = await sbReadRow('main_data');
      if(cloud && cloud.savedAt){
        // If our local snapshot is NEWER than cloud (e.g. user edited then refreshed before
        // the 800ms save-debounce could push to cloud), keep local edits — localWins=true.
        // Otherwise let cloud win so teammate changes are applied.
        const cloudRev = getSnapshotRevision(cloud);
        const localRev = local?._snapshot ? getSnapshotRevision(local._snapshot) : 0;
        const localIsNewer = localRev > cloudRev;
        applySnapshot(cloud, { merge: true, localWins: localIsNewer });
      }
      _sbReady = true;
      // Persist the MERGED result (not the raw cloud snapshot) so local edits aren't overwritten.
      if(cloud) persistSnapshotToLocal(buildSnapshot());
      updateSyncMarkers(cloud || local?._snapshot || {});
      setBarState('cloud','云端已连接（Supabase）');
      sbReadAttachments().then(()=>{
        const latest = lsLoad() || {};
        latest._attachments = attachments;
        // Save the merged snapshot (already in localStorage from above), just update attachments.
        lsSave(latest);
        _syncLastAttachmentSig = getAttachmentsSignature(attachments);
        if(currentUser.id) renderMain();
      }).catch(e=>console.warn('Attachment load failed',e));
    }catch(e){
      console.warn('Supabase load failed',e);
      setBarState('error',`云端读取失败，使用本地数据（${e.message}）`);
    }
    return true;
  }

  if(local && local._snapshot){
    setBarState('local','本地自动保存已启用，数据刷新后不丢失');
    return true;
  }
  setBarState('local','本地自动保存已启用 · 可在「存储设置」中接入 Supabase 云端');
  return false;
}

// ─── Save ───
async function saveData(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_doSave, 800);
}

// Call after modifying attachments for a specific activity
async function saveAttachmentsFor(actId){
  const local = lsLoad()||{};
  local._attachments = attachments;
  lsSave(local);
  if(_sbReady && _sbUrl && _sbKey){
    _lastLocalAttachmentSig = getAttachmentsSignature(attachments);
    sbSaveAttachments(actId).catch(e=>{
      console.warn('Attachment sync failed',e);
      showNotif(`附件云端同步失败（本地已保存）: ${e.message}`,true);
    }).finally(()=>{
      _syncLastAttachmentSig = _lastLocalAttachmentSig;
    });
  }
}

async function _doSave(){
  _saveTimer = null;
  if(!_sbReady||!_sbUrl||!_sbKey){
    // Local only — just persist
    const snapshot = buildSnapshot();
    _lastLocalSaveRev = getSnapshotRevision(snapshot);
    persistSnapshotToLocal(snapshot);
    updateBarTs();
    setBarState('local');
    return;
  }

  setBarState('saving');
  try{
    // BUG4 FIX: read latest cloud FIRST, merge our local changes on top, then write
    // This prevents overwriting a teammate's data that arrived while we were editing
    let base = null;
    try{ base = await sbReadRow('main_data'); }catch(e){ console.warn('Pre-save read failed, writing without merge', e); }

    let finalActivities;
    if(base && base.savedAtMs){
      // Merge: our local state is authoritative for additions/edits
      // Tombstones ensure deleted items from cloud don't come back
      // Also absorb any tombstones from cloud snapshot
      if(base._deletedKeys && typeof base._deletedKeys==='object'){
        Object.entries(base._deletedKeys).forEach(([k,ts])=>{
          if(!_deletedKeys[k]||ts>_deletedKeys[k]) _deletedKeys[k]=ts;
        });
      }
      // localWins=true: our edits take priority over stale cloud data
      finalActivities = mergeActivities(activities, base.activities||[], _deletedKeys, true);
    } else {
      finalActivities = activities.map(normalizeActivity).filter(a=>!_deletedKeys[getActivityRef(a)]);
    }

    // Temporarily set merged activities, build snapshot, then restore
    const savedActivities = activities;
    activities = finalActivities;
    const snapshot = buildSnapshot();
    activities = savedActivities; // restore (renderMain will use current in-memory state)

    _lastLocalSaveRev = getSnapshotRevision(snapshot);
    persistSnapshotToLocal(snapshot);
    updateBarTs();

    await sbUpsertRow('main_data', snapshot);
    _syncLastMainRev = _lastLocalSaveRev;
    _syncLastAttachmentSig = getAttachmentsSignature(attachments);
    setBarState('saved',`已同步到云端 · ${ts()}`);
    // After a successful save, update in-memory activities to match what was saved
    // so subsequent saves don't create a new merge conflict with the same data
    activities = finalActivities;
    flushDeferredCloudRefresh();
  }catch(e){
    console.warn('Supabase save failed',e);
    // Still save locally
    const snapshot = buildSnapshot();
    persistSnapshotToLocal(snapshot);
    setBarState('error',`云端同步失败（本地已保存）: ${e.message}`);
  }
}

  _sbUrl=url; _sbKey=key; _sbTable='scheduler_data';

  try{
    // Test: try to read (may return empty, that's ok)
    await fetch(`${url}/rest/v1/${_sbTable}?id=eq.main_data&select=id`,{
      headers:{'apikey':key,'Authorization':'Bearer '+key}
    }).then(r=>{ if(!r.ok&&r.status!==404) throw new Error(`连接测试失败 ${r.status}`); });

function initTypeSearchDropdown(selectedVal){
  const wrap = document.getElementById('type-search-wrap');
  const inp  = document.getElementById('f-type-input');
  const hid  = document.getElementById('f-type');
  const dd   = document.getElementById('type-search-dropdown');
  if(!wrap||!inp||!hid||!dd) return;

  // Make input editable now (was readonly to prevent keyboard on open)
  inp.removeAttribute('readonly');

  // Build full option list
  function renderOpts(filter){
    const q = filter.trim().toLowerCase();
    dd.innerHTML = '';
    const matched = ACT_TYPES.filter(t => !q || t.toLowerCase().includes(q));
    if(!matched.length){
      dd.innerHTML = '<div class="type-search-empty">无匹配结果</div>';
      return;
    }
    matched.forEach((t,i)=>{
      const c = TYPE_COLORS[t]||{bg:'#e5e7eb',border:'#9ca3af'};
      const display = q ? t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`) : t;
      const opt = document.createElement('div');
      opt.className = 'type-search-opt' + (t===hid.value?' highlighted':'');
      opt.dataset.val = t;
      opt.innerHTML = `<span class="opt-dot" style="background:${c.bg};border:1px solid ${c.border||c.bg}"></span><span>${display}</span>`;
      opt.addEventListener('mousedown', e=>{ e.preventDefault(); selectTypeOpt(t); });
      dd.appendChild(opt);
    });
  }

  function selectTypeOpt(val){
    hid.value = val;
    inp.value = val;
    inp.setAttribute('readonly','readonly');
    dd.classList.remove('open');
    inp.blur();
    renderOpts('');
  }

  inp.addEventListener('focus', ()=>{
    inp.removeAttribute('readonly');
    inp.select();
    renderOpts(inp.value===''+inp.value ? '' : inp.value);
    dd.classList.add('open');
  });
  inp.addEventListener('input', ()=>{ renderOpts(inp.value); dd.classList.add('open'); });
  inp.addEventListener('keydown', e=>{
    const opts = [...dd.querySelectorAll('.type-search-opt')];
    const cur  = dd.querySelector('.type-search-opt.highlighted');
    let idx    = opts.indexOf(cur);
    if(e.key==='ArrowDown'){ e.preventDefault(); idx=Math.min(idx+1,opts.length-1); opts[idx]?.classList.add('highlighted'); opts.forEach((o,i)=>i!==idx&&o.classList.remove('highlighted')); opts[idx]?.scrollIntoView({block:'nearest'}); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); idx=Math.max(idx-1,0); opts[idx]?.classList.add('highlighted'); opts.forEach((o,i)=>i!==idx&&o.classList.remove('highlighted')); opts[idx]?.scrollIntoView({block:'nearest'}); }
    else if(e.key==='Enter'){ e.preventDefault(); const hlt=dd.querySelector('.type-search-opt.highlighted'); if(hlt) selectTypeOpt(hlt.dataset.val); }
    else if(e.key==='Escape'){ dd.classList.remove('open'); inp.setAttribute('readonly','readonly'); inp.value=hid.value; }
  });
  inp.addEventListener('blur', ()=>{
    setTimeout(()=>{
      dd.classList.remove('open');
      inp.setAttribute('readonly','readonly');
      // Reset display to selected value if no valid match
      if(!ACT_TYPES.includes(inp.value)) inp.value = hid.value;
    }, 150);
  });

  renderOpts('');
}

// ===================== GANTT CALENDAR =====================
function renderCalendarView(container){
  const year=calYear, month=calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const gameActs=activities.filter(a=>a.game===calGame);
  const cats=GAME_CATS[calGame]||[];
  const catColors=GAME_CAT_COLORS[calGame]||[];
  const catTexts=GAME_CAT_TEXT[calGame]||[];

  // build days array
  const days=[];
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    const dow=dt.getDay();
    days.push({d,dow,isWe:dow===0||dow===6,isToday:year===TODAY.getFullYear()&&month===TODAY.getMonth()&&d===TODAY.getDate()});
  }
  const totalW=days.length*50; // var(--day-w)=50px

  // week labels for header
  function buildWeekBlocks(){
    const blocks=[];let cur=null;
    days.forEach(day=>{
      const weekNum=getWeekNum(new Date(year,month,day.d));
      if(!cur||cur.wn!==weekNum){
        if(cur)blocks.push(cur);
        cur={wn:weekNum,start:day.d,count:1};
      } else {cur.count++;}
    });
    if(cur)blocks.push(cur);
    return blocks;
  }
  function getWeekNum(d){
    const jan1=new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  }
  const weekBlocks=buildWeekBlocks();

  // compute bar left/width in px given day column positions
  function barGeom(startStr,endStr){
    const s=new Date(startStr), e=new Date(endStr);
    const mStart=new Date(year,month,1), mEnd=new Date(year,month,daysInMonth,23,59,59);
    if(s>mEnd||e<mStart)return null;
    const sd=Math.max(1,(s<mStart?1:s.getDate()));
    const ed=Math.min(daysInMonth,(e>mEnd?daysInMonth:e.getDate()));
    const left=(sd-1)*50;
    const width=(ed-sd+1)*50-2;
    return{left,width};
  }

  // ── Row splitting: detect overlapping bars and assign to sub-rows ──
  // Two activities "overlap in the calendar" if their visible date ranges intersect this month.
  function actsOverlap(a, b){
    const mStart=new Date(year,month,1), mEnd=new Date(year,month,daysInMonth,23,59,59);
    const as=new Date(a.startTime), ae=new Date(a.endTime);
    const bs=new Date(b.startTime), be=new Date(b.endTime);
    const visAs=as<mStart?mStart:as, visAe=ae>mEnd?mEnd:ae;
    const visBs=bs<mStart?mStart:bs, visBe=be>mEnd?mEnd:be;
    if(visAs>mEnd||visAe<mStart||visBs>mEnd||visBe<mStart)return false;
    return visAs<=visBe && visBs<=visAe;
  }

  // Pack acts into non-overlapping sub-rows using greedy interval packing
  function packIntoSubRows(acts){
    const subRows=[]; // each subRow is array of acts
    acts.forEach(act=>{
      // find first subRow where act doesn't overlap any existing act
      let placed=false;
      for(const sr of subRows){
        if(!sr.some(existing=>actsOverlap(act,existing))){
          sr.push(act);placed=true;break;
        }
      }
      if(!placed) subRows.push([act]);
    });
    return subRows;
  }

  // build flat row list with cat separators — each type row may expand into multiple sub-rows
  const rowItems=[];
  cats.forEach((catDef,ci)=>{
    rowItems.push({type:'cat',label:catDef.cat,ci});
    catDef.rows.forEach(rowDef=>{
      const rowActs=gameActs.filter(a=>rowDef.types.includes(a.type));
      // filter to acts visible this month
      const visActs=rowActs.filter(a=>{
        const s=new Date(a.startTime),e=new Date(a.endTime);
        return s<=new Date(year,month,daysInMonth,23,59,59)&&e>=new Date(year,month,1);
      });
      const subRows=visActs.length>0?packIntoSubRows(visActs):[];
      if(subRows.length===0){
        // empty row — show one blank row
        rowItems.push({type:'row',label:rowDef.label,acts:[],types:rowDef.types,ci,subRowIdx:0,totalSubRows:1,allActs:rowActs});
      } else {
        subRows.forEach((srActs,sri)=>{
          rowItems.push({
            type:'row',
            label:sri===0?rowDef.label:'',  // label only on first sub-row
            acts:srActs,
            types:rowDef.types,
            ci,
            subRowIdx:sri,
            totalSubRows:subRows.length,
            allActs:rowActs
          });
        });
      }
    });
  });

  // render game tabs
  const gameTabs=GAMES.map(g=>`<div class="game-tab ${g===calGame?'active':''}" onclick="switchCalGame('${g}')">${g}</div>`).join('');

  // Month names
  const mNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  // Left column HTML
  let leftTop=`<div class="left-top">活动类型</div>`;
  let leftRows='';
  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=catColors[item.ci%catColors.length]||'#f3f4f6';
      const tc=catTexts[item.ci%catTexts.length]||'#374151';
      leftRows+=`<div class="left-cat-header" style="background:${bg};color:${tc}">${item.label}</div>`;
    } else {
      // For sub-rows after the first, show a continuation indicator
      if(item.subRowIdx===0){
        const badge=item.totalSubRows>1
          ?`<span style="margin-left:4px;font-size:9px;background:var(--bg3);color:var(--text3);padding:1px 5px;border-radius:8px">${item.totalSubRows}</span>`
          :'';
        leftRows+=`<div class="left-row cal-row-drag" draggable="true"
          data-ci="${item.ci}" data-row-label="${item.label}" data-types="${(item.types||[]).join(',')}"
          title="拖拽可调整行顺序 | ${item.label}"
          style="cursor:grab">
          <span style="font-size:10px;color:var(--text3);margin-right:4px;user-select:none">⠿</span>${item.label}${badge}</div>`;
      } else {
        leftRows+=`<div class="left-row" style="opacity:.55;font-size:10px;padding-left:18px">↳ 续行 ${item.subRowIdx+1}</div>`;
      }
    }
  });

  // Right column header HTML
  let weekHeaderHtml='';
  weekBlocks.forEach(wb=>{
    weekHeaderHtml+=`<div class="week-block" style="width:${wb.count*50}px">W${wb.wn}</div>`;
  });
  const DOW_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let dayHeaderHtml='';
  days.forEach(day=>{
    const cls=(day.isWe?'weekend':'')+(day.isToday?' today':'');
    const dowStr=DOW_EN[day.dow];
    dayHeaderHtml+=`<div class="day-hcell ${cls}" style="flex-direction:column;gap:1px">
      <span>${day.d}</span>
      <span style="font-size:9px;opacity:.7">${dowStr}</span>
    </div>`;
  });

  // Right body rows HTML
  let rightBodyHtml='';
  // Today line position
  const todayPos=TODAY.getFullYear()===year&&TODAY.getMonth()===month?(TODAY.getDate()-1)*50+25:-1;

  container.innerHTML=`

      <div class="month-nav">

        <span class="mnav-label">${year}/${month+1}</span>
        <button class="mnav-btn" onclick="changeMonth(1)">›</button>
        <button class="btn sm" onclick="goToToday()" style="margin-left:4px">今天</button>
        <button class="btn sm" onclick="showModal('add')" style="margin-left:4px">+ 新增</button>
        <button class="btn sm" onclick="exportCalendarExcel()" style="margin-left:4px">📥 导出Excel</button>
      </div>
    </div>
    <div class="cal-notes-bar ${GAME_NOTES[calGame]?'':'empty'}" id="calNotesBar">
      <span class="cal-notes-icon">${GAME_NOTES[calGame]?'📌':'📌'}</span>
      <span class="cal-notes-text ${GAME_NOTES[calGame]?'':'empty-hint'}" id="calNotesText">${GAME_NOTES[calGame]||'暂无备注说明，点击右侧编辑按钮添加…'}</span>
      ${currentUser.role!=='viewer'?`<button class="cal-notes-edit-btn" onclick="showCalNotesEditor('${calGame}')">✏ 编辑备注</button>`:''}
    </div>
    <div class="gantt-container" id="ganttContainer">
      <div class="gantt-left" id="ganttLeft">
        ${leftTop}
        <div class="left-rows" id="leftRows">${leftRows}</div>
      </div>
      <div class="gantt-right" id="ganttRight">
        <div class="gantt-right-inner" style="width:${totalW}px">
          <div class="right-header">
            <div class="week-header-row">${weekHeaderHtml}</div>
            <div class="day-header-row">${dayHeaderHtml}</div>
          </div>
          <div id="rightBody">${rightBodyHtml}</div>
        </div>
      </div>
    </div>
  </div>`;

  // sync scroll between left and right
  const gr=document.getElementById('ganttRight');
  const lr=document.getElementById('leftRows');
  if(gr&&lr){

}

// ===================== CALENDAR ROW DRAG =====================
function initCalRowDrag(){
  const lr = document.getElementById('leftRows');
  if(!lr) return;
  const dragRows = [...lr.querySelectorAll('.cal-row-drag')];
  if(!dragRows.length) return;

  let dragSrc = null; // { ci, label, types[] }

  dragRows.forEach(el=>{
    el.addEventListener('dragstart', e=>{
      dragSrc = { ci: +el.dataset.ci, label: el.dataset.rowLabel, types: el.dataset.types ? el.dataset.types.split(',') : [] };
      el.classList.add('dragging-row');
      // also highlight corresponding right-row
      getRightRow(el.dataset.ci, el.dataset.rowLabel)?.classList.add('dragging-row');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', ()=>{
      dragRows.forEach(r=>r.classList.remove('dragging-row','drag-over-row'));
      document.querySelectorAll('.cal-right-row').forEach(r=>r.classList.remove('dragging-row','drag-over-row'));
      dragSrc = null;
    });
    el.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; el.classList.add('drag-over-row'); getRightRow(el.dataset.ci, el.dataset.rowLabel)?.classList.add('drag-over-row'); });
    el.addEventListener('dragleave', ()=>{ el.classList.remove('drag-over-row'); getRightRow(el.dataset.ci, el.dataset.rowLabel)?.classList.remove('drag-over-row'); });
    el.addEventListener('drop', e=>{
      e.preventDefault();
      el.classList.remove('drag-over-row');
      getRightRow(el.dataset.ci, el.dataset.rowLabel)?.classList.remove('drag-over-row');
      if(!dragSrc) return;
      const targetCi  = +el.dataset.ci;
      const targetLabel = el.dataset.rowLabel;
      if(dragSrc.label === targetLabel && dragSrc.ci === targetCi) return;
      reorderCalRow(dragSrc, targetCi, targetLabel);
    });
  });
}

function getRightRow(ci, label){
  return document.querySelector(`.cal-right-row[data-ci="${ci}"][data-row-label="${label}"][data-sub="0"]`);
}

function reorderCalRow(src, targetCi, targetLabel){
  const game = calGame;
  const cats = GAME_CATS[game];
  if(!cats) return;

  // Find and remove source row from its category
  let srcRow = null;
  for(const cat of cats){
    const idx = cat.rows.findIndex(r => r.label === src.label);
    if(idx >= 0){ srcRow = cat.rows.splice(idx, 1)[0]; break; }
  }
  if(!srcRow) return;

  // Find target position and insert before it
  for(const cat of cats){
    const tIdx = cat.rows.findIndex(r => r.label === targetLabel);
    if(tIdx >= 0){
      cat.rows.splice(tIdx, 0, srcRow);
      break;
    }
  }

  saveData();
  renderMain();
  showNotif(`已将「${src.label}」移动到「${targetLabel}」前面`);
}
