// ===================== EXPORT CALENDAR TO EXCEL =====================
function exportCalendarExcel(){
  const year=calYear, month=calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const mNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const gameActs=activities.filter(a=>a.game===calGame);
  const cats=GAME_CATS[calGame]||[];
  const catBgColors=(GAME_CAT_COLORS[calGame]||[]);
  const catTxColors=(GAME_CAT_TEXT[calGame]||[]);
  const DOW_ZH=['日','一','二','三','四','五','六'];

  // Build days array
  const days=[];
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    const dow=dt.getDay();
    days.push({d,dow,isWe:dow===0||dow===6,isToday:year===TODAY.getFullYear()&&month===TODAY.getMonth()&&d===TODAY.getDate()});
  }

  // Overlap detection and sub-row packing (same as calendar render)
  function actsOverlap(a,b){
    const mS=new Date(year,month,1),mE=new Date(year,month,daysInMonth,23,59,59);
    const as=new Date(a.startTime),ae=new Date(a.endTime),bs=new Date(b.startTime),be=new Date(b.endTime);
    const vAs=as<mS?mS:as,vAe=ae>mE?mE:ae,vBs=bs<mS?mS:bs,vBe=be>mE?mE:be;
    if(vAs>mE||vAe<mS||vBs>mE||vBe<mS)return false;
    return vAs<=vBe&&vBs<=vAe;
  }
  function packSubRows(acts){
    const rows=[];
    acts.forEach(act=>{
      let placed=false;
      for(const r of rows){if(!r.some(e=>actsOverlap(act,e))){r.push(act);placed=true;break;}}
      if(!placed)rows.push([act]);
    });
    return rows;
  }

  // Build row items identical to renderCalendarView
  const rowItems=[];
  cats.forEach((catDef,ci)=>{
    rowItems.push({type:'cat',label:catDef.cat,ci});
    catDef.rows.forEach(rowDef=>{
      const rowActs=gameActs.filter(a=>rowDef.types.includes(a.type));
      const visActs=rowActs.filter(a=>{
        const s=new Date(a.startTime),e=new Date(a.endTime);
        return s<=new Date(year,month,daysInMonth,23,59,59)&&e>=new Date(year,month,1);
      });
      const subRows=visActs.length>0?packSubRows(visActs):[];
      if(subRows.length===0){
        rowItems.push({type:'row',label:rowDef.label,acts:[],ci,subRowIdx:0,totalSubRows:1});
      }else{
        subRows.forEach((srActs,sri)=>{
          rowItems.push({type:'row',label:sri===0?rowDef.label:`↳ 续行${sri+1}`,acts:srActs,ci,subRowIdx:sri,totalSubRows:subRows.length});
        });
      }
    });
  });

  // Color utilities
  function lighten(hex,amt=0.55){
    hex=hex.replace('#','');
    if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
    const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    return '#'+[r,g,b].map(v=>Math.round(v+(255-v)*amt).toString(16).padStart(2,'0')).join('');
  }

  // Build spans for each row item: [{sd, ed, act, isPreheat}]
  function buildSpans(item){
    const mS=new Date(year,month,1),mE=new Date(year,month,daysInMonth,23,59,59);
    const spans=[];
    item.acts.forEach(act=>{
      const s=new Date(act.startTime),e=new Date(act.endTime);
      if(s<=mE&&e>=mS){
        const sd=Math.max(1,s<mS?1:s.getDate());
        const ed=Math.min(daysInMonth,e>mE?daysInMonth:e.getDate());
        spans.push({sd,ed,act,isPreheat:false});
      }
      if(act.preheat){
        const ps=new Date(act.preheat),pe=new Date(act.startTime);
        if(ps<mE&&pe>mS){
          const psd=Math.max(1,ps<mS?1:ps.getDate());
          const ped=Math.min(daysInMonth,pe>mE?daysInMonth:Math.max(1,pe.getDate()-1));
          if(psd<=ped)spans.push({sd:psd,ed:ped,act,isPreheat:true});
        }
      }
    });
    return spans;
  }

  // ── Generate HTML that Excel can open preserving merged cells & colors ──
  let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:x="urn:schemas-microsoft-com:office:excel"
  xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8">
<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
<x:Name>${calGame} ${year}年${mNames[month]}</x:Name>
<x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
<style>
tr   { height:24pt; }
td,th{ font-family:"Microsoft YaHei",Arial,sans-serif; font-size:9pt; border:0.5pt solid #d0d0ce; vertical-align:middle; }
</style></head><body>
<table border="1" cellspacing="0" cellpadding="3">`;

  const totalCols = 1 + daysInMonth;

  // ── Row 1: Title ──
  html+=`<tr style="height:30pt"><td colspan="${totalCols}" style="font-size:13pt;font-weight:bold;background:#5046e4;color:#ffffff;text-align:center;border:1pt solid #3730a3;">${calGame} 排期日历 &nbsp;${year}年${mNames[month]}</td></tr>`;

  // ── Row 2: Day headers ──
  html+=`<tr style="height:36pt"><td style="font-weight:bold;background:#ece9ff;color:#3730a3;text-align:center;min-width:90pt;">活动类型</td>`;
  days.forEach(day=>{
    const bg=day.isToday?'#e8e6ff':day.isWe?'#fff0f0':'#f7f7f6';
    const tc=day.isToday?'#5046e4':day.isWe?'#d93025':'#595959';
    const fw=day.isToday?'bold':'normal';
    html+=`<td style="text-align:center;background:${bg};color:${tc};font-weight:${fw};min-width:28pt;width:28pt;">${day.d}<br>${DOW_ZH[day.dow]}</td>`;
  });
  html+=`</tr>`;

  // ── Data rows ──
  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=catBgColors[item.ci%catBgColors.length]||'#f3f4f6';
      const tc=catTxColors[item.ci%catTxColors.length]||'#374151';
      html+=`<tr style="height:20pt"><td colspan="${totalCols}" style="font-weight:bold;font-size:9pt;background:${bg};color:${tc};padding:2px 8px;border:0.5pt solid #d0d0ce;">${item.label}</td></tr>`;
      return;
    }

    // row type
    const labelBg=item.subRowIdx===0?'#fafafa':'#f3f4f6';
    const labelTc=item.subRowIdx===0?'#374151':'#9b9b9b';
    const labelFw=item.subRowIdx===0?'500':'normal';
    html+=`<tr style="height:22pt"><td style="background:${labelBg};color:${labelTc};font-weight:${labelFw};text-align:center;font-size:9pt;">${item.label}</td>`;

    const spans=buildSpans(item);
    // Build cell-by-cell: skip cells that are inside a span
    const coveredUntil={}; // day -> end day of span covering it (exclusive start)
    let d=1;
    while(d<=daysInMonth){
      // check if a span starts exactly on day d
      const span=spans.find(s=>s.sd===d);
      if(span){
        const colspan=span.ed-span.sd+1;
        const c=TYPE_COLORS[span.act.type]||{bg:'#e5e7eb',text:'#374151',border:'#9ca3af'};
        const cellBg=span.isPreheat?lighten(c.bg,0.45):c.bg;
        const cellTc=c.text;
        const bdStyle=span.isPreheat?`border:1pt dashed ${c.border};`:`border:0.5pt solid ${c.border};`;
        const fw=span.act.important?'bold':'normal';
        const label=span.isPreheat?`[预热]${span.act.name}`:span.act.name;
        html+=`<td colspan="${colspan}" style="background:${cellBg};color:${cellTc};${bdStyle}font-weight:${fw};font-size:8pt;overflow:hidden;white-space:nowrap;" title="${span.act.name}">${label}</td>`;
        d+=colspan;
      }else{
        // check if d is inside a span (not the start — already rendered)
        const inside=spans.find(s=>d>s.sd&&d<=s.ed);
        if(inside){
          // This shouldn't happen if colspan is correct; skip
          d++;
        }else{
          const day=days[d-1];
          const bg=day.isToday?'#f0eeff':day.isWe?'#fdf8f8':'#ffffff';
          html+=`<td style="background:${bg};"></td>`;
          d++;
        }
      }
    }
    html+=`</tr>`;
  });

  html+=`</table></body></html>`;

  const blob=new Blob(['\uFEFF'+html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const pad=v=>String(v).padStart(2,'0');
  const n=new Date();
  const stamp=`${n.getFullYear()}${pad(n.getMonth()+1)}${pad(n.getDate())}_${pad(n.getHours())}${pad(n.getMinutes())}`;
  a.download=`排期日历_${calGame}_${year}年${month+1}月_${stamp}.xls`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showNotif(`✅ 已导出：${calGame} ${year}年${mNames[month]} 排期日历`);
}

        </table>
      </div>
    </div>
  </div>`;
  refreshTable();
}

function refreshTable(){
  const q=(document.getElementById('searchInput')||{value:''}).value.toLowerCase();
  const sf=(document.getElementById('statusFilter')||{value:'all'}).value;
  const sb=(document.getElementById('sortBy')||{value:'startTime'}).value;
  const now=TODAY;
  let list=activities.filter(a=>{
    if(activeGameFilter!=='all'&&a.game!==activeGameFilter)return false;
    if(activeTypeFilter!=='all'&&a.type!==activeTypeFilter)return false;
    if(q&&!a.name.toLowerCase().includes(q)&&!a.game.includes(q)&&!a.type.includes(q))return false;
    if(sf==='active'&&!(new Date(a.startTime)<=now&&new Date(a.endTime)>=now))return false;
    if(sf==='upcoming'&&new Date(a.startTime)<=now)return false;
    if(sf==='ended'&&new Date(a.endTime)>=now)return false;
    return true;
  });
  list.sort((x,y)=>sb==='game'?x.game.localeCompare(y.game):new Date(y[sb])-new Date(x[sb]));
  const rc=document.getElementById('resultCount');
  if(rc)rc.textContent=`共 ${list.length} 条`;
  const tb=document.getElementById('tableBody');if(!tb)return;
  const canEdit=currentUser.role!=='viewer',canDel=currentUser.role!=='viewer';
  if(!list.length){tb.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">暂无符合条件的活动记录</td></tr>`;return;}
  tb.innerHTML=list.map(a=>{
    const st=getStatus(a);
    const starBadge=a.important?`<span title="重要活动" style="color:#f59e0b;margin-right:4px;font-size:13px">⭐</span>`:'';
    return`<tr ${a.important?'style="background:#fffdf0"':''}>
      <td style="font-weight:500">${a.game}</td>
      <td>${typeTag(a.type)}</td>
      <td title="${a.name}">${starBadge}${a.name}</td>
      <td><span class="tag" style="background:${st.bg};color:${st.color}">${st.label}</span></td>
      <td style="font-size:11px">${a.startTime.split(' ')[0]}</td>
      <td style="font-size:11px">${a.endTime.split(' ')[0]}</td>
      <td style="font-size:11px">${getDur(a)}天</td>
      <td style="font-size:11px;color:var(--text2)">${a.channels.join('/')}</td>
      <td>
        <button class="btn sm" onclick="showDetail('${getActivityRef(a)}')">详情</button>
        ${canEdit?`<button class="btn sm" onclick="showModal('edit','${getActivityRef(a)}')" style="margin-left:3px">编辑</button>`:''}
        ${canEdit?`<button class="btn sm" onclick="copyActivity('${getActivityRef(a)}')" style="margin-left:3px" title="复制此活动">复制</button>`:''}
        ${canDel?`<button class="btn sm danger" onclick="confirmDelete('${getActivityRef(a)}')" style="margin-left:3px">删除</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

function showAddGameDialog(){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return}
  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='modal-overlay';
  ov.innerHTML=`<div class="confirm-box" style="width:420px;text-align:left">
    <div class="confirm-title" style="text-align:left;margin-bottom:16px">新增竞品游戏</div>
    <div class="fg full" style="margin-bottom:16px">
      <div class="flabel">游戏名称 <span class="req">*</span></div>
      <input id="new-game-name" type="text" placeholder="如：蛋仔派对、英雄联盟手游" autofocus>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">新游戏会自动添加到排期日历的游戏切换栏</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="doAddGame()">确认新增</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('new-game-name')?.focus(),50);
}

function doAddGame(){
  const name=document.getElementById('new-game-name').value.trim();
  if(!name){showNotif('游戏名称不能为空',true);return}
  if(GAMES.includes(name)){showNotif(`「${name}」已存在，请勿重复添加`,true);return}
  GAMES.push(name);
  // add default cat config for new game
  GAME_CATS[name]=[
    {cat:'版本&活动',rows:ACT_TYPES.slice(0,4).map(t=>({label:t,types:[t]}))},
    {cat:'商业化',rows:ACT_TYPES.slice(4).map(t=>({label:t,types:[t]}))},
  ];
  GAME_CAT_COLORS[name]=['#dbeafe','#dcfce7','#fef9c3'];
  GAME_CAT_TEXT[name]=['#1d4ed8','#14532d','#713f12'];
  addLog(`新增了竞品游戏「${name}」`);
  showNotif(`新增成功：已添加竞品游戏「${name}」`);
  closeModal();renderMain();
}

function startEditGame(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return}
  const oldName=GAMES[idx];
  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='modal-overlay';
  ov.innerHTML=`<div class="confirm-box" style="width:420px;text-align:left">
    <div class="confirm-title" style="text-align:left;margin-bottom:16px">修改竞品游戏名称</div>
    <div class="fg full" style="margin-bottom:6px">
      <div class="flabel">游戏名称 <span class="req">*</span></div>
      <input id="edit-game-name" type="text" value="${oldName}">
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:16px">注意：修改名称后，已录入活动的「竞品游戏」字段会同步更新</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="doEditGame(${idx},'${oldName}')">保存修改</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const el=document.getElementById('edit-game-name');if(el){el.focus();el.select();}},50);
}

function doEditGame(idx,oldName){
  const newName=document.getElementById('edit-game-name').value.trim();
  if(!newName){showNotif('游戏名称不能为空',true);return}
  if(newName!==oldName&&GAMES.includes(newName)){showNotif(`「${newName}」已存在`,true);return}
  GAMES[idx]=newName;
  // migrate activities
  activities.forEach(a=>{if(a.game===oldName)a.game=newName});
  // migrate GAME_CATS, GAME_CAT_COLORS, GAME_CAT_TEXT
  if(GAME_CATS[oldName]){GAME_CATS[newName]=GAME_CATS[oldName];delete GAME_CATS[oldName]}
  if(GAME_CAT_COLORS[oldName]){GAME_CAT_COLORS[newName]=GAME_CAT_COLORS[oldName];delete GAME_CAT_COLORS[oldName]}
  if(GAME_CAT_TEXT[oldName]){GAME_CAT_TEXT[newName]=GAME_CAT_TEXT[oldName];delete GAME_CAT_TEXT[oldName]}
  if(calGame===oldName)calGame=newName;
  addLog(`将竞品游戏「${oldName}」重命名为「${newName}」`);
  showNotif(`修改成功：「${oldName}」已更名为「${newName}」`);
  closeModal();renderMain();
}

function confirmDeleteGame(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return}
  const name=GAMES[idx];
  const count=activities.filter(a=>a.game===name).length;
  const ov=document.createElement('div');

function doEditType(idx,oldName){
  const newName=document.getElementById('edit-type-name').value.trim();
  if(!newName){showNotif('类型名称不能为空',true);return}

  const ov=document.getElementById('modal-overlay');
  const colorIdx=ov?._selectedColorIdx||0;
  ACT_TYPES[idx]=newName;
  TYPE_COLORS[newName]=TYPE_COLOR_PRESETS[colorIdx%TYPE_COLOR_PRESETS.length];
  if(newName!==oldName)delete TYPE_COLORS[oldName];
  // migrate activities
  activities.forEach(a=>{if(a.type===oldName)a.type=newName});
  // migrate GAME_CATS rows
  Object.values(GAME_CATS).forEach(cats=>cats.forEach(cat=>cat.rows.forEach(row=>{
    row.types=row.types.map(t=>t===oldName?newName:t);
    if(row.label===oldName)row.label=newName;
  })));
  addLog(`将活动类型「${oldName}」修改为「${newName}」`);

// ===================== TYPE DRAG REORDER =====================
let _dragTypeIdx = null;

function typeDragStart(e, idx){
  _dragTypeIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.4';
}

function typeDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.style.background = 'var(--bg2)';
  e.currentTarget.style.borderTop = '2px solid #5046e4';
}

function typeDragLeave(e){
  e.currentTarget.style.background = '';
  e.currentTarget.style.borderTop = '';
}

function typeDrop(e, targetIdx){
  e.preventDefault();
  e.currentTarget.style.background = '';
  e.currentTarget.style.borderTop = '';
  if(_dragTypeIdx === null || _dragTypeIdx === targetIdx){ _dragTypeIdx=null; return; }

  // Reorder ACT_TYPES array
  const moved = ACT_TYPES.splice(_dragTypeIdx, 1)[0];
  ACT_TYPES.splice(targetIdx, 0, moved);

  // Also reorder rows in GAME_CATS to match new type order
  // Each game's cat rows: sort rows within each cat to follow ACT_TYPES order
  Object.values(GAME_CATS).forEach(cats=>{
    cats.forEach(cat=>{
      cat.rows.sort((a,b)=>{
        const ai = Math.min(...a.types.map(t=>ACT_TYPES.indexOf(t)).filter(i=>i>=0));
        const bi = Math.min(...b.types.map(t=>ACT_TYPES.indexOf(t)).filter(i=>i>=0));
        return (ai===-1?999:ai)-(bi===-1?999:bi);
      });
    });
  });

  _dragTypeIdx = null;
  addLog(`调整了活动类型排序`);
  showNotif('排序已更新，日历行顺序同步变化');
  saveData();
  refreshCatPanel();
}

        <div style="display:flex;align-items:center;gap:8px">

          <button class="btn sm" onclick="showAddTypeToCatDialog('${game}',${ci})" style="font-size:10px;padding:2px 8px">+ 添加类型</button>
          <button class="btn sm danger" onclick="confirmDeleteCat('${game}',${ci})" style="font-size:10px;padding:2px 8px">删除分组</button>
        </div>
      </div>
      <div style="padding:8px 12px;background:var(--bg);min-height:36px;display:flex;flex-wrap:wrap;align-items:center;gap:2px">
        ${typeChips || `<span style="font-size:11px;color:var(--text3)">暂无活动类型，点击「+ 添加类型」</span>`}
      </div>

  }).join('');

function canUndoLog(log){
  return currentUser.role==='admin' && !!log?.undo && !!log?.userId && log.userId!==currentUser.id && !log.undoMeta?.undoneAt;
}

function markLogUndone(log){
  log.undoMeta = {
    undoneAt: ts(),
    undoneBy: currentUser.name
  };
}

function undoLog(logId){
  const log = opLogs.find(l=>l.id===logId);
  if(!canUndoLog(log)){ showNotif('该日志当前不可撤销', true); return; }
  const undo = log.undo || {};
  try{
    if(undo.kind === 'activity_create'){
      const refSet = new Set(undo.refs || undo.ids || []);
      activities = activities.filter(a=>!refSet.has(getActivityRef(a)) && !refSet.has(a.id));
    }else if(undo.kind === 'activity_update'){
      const before = normalizeActivity(undo.before);
      const idx = findActivityIndexByRef(before?._akey || before?.id);
      if(!before){ throw new Error('缺少原始活动数据'); }
      if(idx >= 0) activities[idx] = before;
      else activities.unshift(before);
      ensureGameTypeVisible(before.game, before.type);
    }else if(undo.kind === 'activity_delete'){
      const deleted = normalizeActivity(undo.activity);
      if(!deleted){ throw new Error('缺少已删除活动数据'); }
      if(!activities.some(a=>a.id===deleted.id)) activities.unshift(deleted);
      ensureGameTypeVisible(deleted.game, deleted.type);
    }else{
      throw new Error('暂不支持撤销该操作');
    }
    markLogUndone(log);
    addLog(`撤销了 ${log.user} 的操作：${log.action}`);
    stageLatestLocalSnapshot();
    saveData();
    renderMain();
    showNotif('已撤销该操作');
  }catch(e){
    showNotif(`撤销失败：${e.message}`, true);
  }
}

function ensureGameTypeVisible(game, type){
  if(!game || !type) return;
  if(!GAME_CATS[game]) GAME_CATS[game] = [];

  const exists = (GAME_CATS[game] || []).some(cat =>
    (cat.rows || []).some(row =>
      row.label === type || (Array.isArray(row.types) && row.types.includes(type))
    )
  );
  if(exists) return;

  let fallbackIdx = (GAME_CATS[game] || []).findIndex(cat => cat.cat === '未分组活动');
  if(fallbackIdx < 0){
    GAME_CATS[game].push({cat:'未分组活动', rows:[]});
    fallbackIdx = GAME_CATS[game].length - 1;

    const cc = GAME_CAT_COLORS[game] || [];
    const ct = GAME_CAT_TEXT[game] || [];
    GAME_CAT_COLORS[game] = [...cc, '#f3f4f6'];
    GAME_CAT_TEXT[game] = [...ct, '#6b7280'];
  }

  GAME_CATS[game][fallbackIdx].rows.push({label:type, types:[type]});
}

function updateCyclePreview(){
  const preview=document.getElementById('cycle-preview');
  if(!preview) return;
  const sVal=document.getElementById('f-start')?.value.replace('T',' ');
  const eVal=document.getElementById('f-end')?.value.replace('T',' ');
  const gap=parseInt(document.getElementById('f-cycle-gap')?.value)||0;
  const until=document.getElementById('f-cycle-until')?.value;
  if(!sVal||!eVal||!until){
    preview.textContent='请填写开始/结束时间及循环截止日期';
    return;
  }
  const sDate=new Date(sVal), eDate=new Date(eVal);
  if(sDate>=eDate){preview.textContent='开始时间须早于结束时间';return;}
  const dur=Math.ceil((eDate-sDate)/86400000); // activity duration in days
  const step=dur+gap; // gap=0:seamless, gap=1:1 day between
  const untilDate=new Date(until+'T23:59:59');
  let count=0, cur=new Date(sDate);
  while(cur<=untilDate&&count<50){count++;cur=new Date(cur.getTime()+step*86400000);}
  const gapDesc=gap===0?'每天连续开启':`每次间隔 ${gap} 天`;
  preview.innerHTML=`🔁 ${gapDesc}，每次活动持续 <strong>${dur}</strong> 天，截止 ${until} 共创建 <strong>${count}</strong> 条活动`;
}

// Generate a unique activity ID that works for any game/type name.
// batchIds: array of IDs already created in the same batch (for cycle mode).
function generateUniqueActId(g, t, dc, batchIds){
  const gcMap={'王者荣耀':'WZRY','和平精英':'HPJY','原神':'YS','明日方舟':'MRF','崩坏：星穹铁道':'BHXQTD','第五人格':'DWRG','蛋仔派对':'DZPD'};
  const tcMap={'充值返利':'RECHARGE','版本更新':'UPDATE','节日活动':'EVENT','赛事活动':'ESPORTS','福利发放':'WELFARE','跨界联动':'COLLAB','新服开放':'NEWSVR','限时折扣':'DISCOUNT'};
  // Derive a short uppercase code from an arbitrary string.
  // Prefers ASCII letters; falls back to a 4-digit hex hash of the first few CJK chars.
  function abbr(str, fb){
    if(!str) return fb;
    const asc=str.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
    if(asc.length>=2) return asc.slice(0,8);
    let h=0; Array.from(str).slice(0,4).forEach(c=>{h=(h*31+c.codePointAt(0))&0xFFFF;});
    return h.toString(16).toUpperCase().padStart(4,'0');
  }
  const gCode=gcMap[g]||abbr(g,'GAME');
  const tCode=tcMap[t]||abbr(t,'ACT');
  const prefix=`${gCode}-${tCode}-${dc}-`;
  // Find max existing seq across ALL activity IDs with this prefix (including current batch).
  let maxSeq=0;
  const allIds=activities.map(a=>a.id).concat(batchIds||[]);
  allIds.forEach(id=>{
    if(id&&id.startsWith(prefix)){
      const n=parseInt(id.slice(prefix.length))||0;
      if(n>maxSeq) maxSeq=n;
    }
  });
  return `${prefix}${String(maxSeq+1).padStart(3,'0')}`;
}

function saveActivity(){
  const g=document.getElementById('f-game').value;
  const t=document.getElementById('f-type').value;
  const n=document.getElementById('f-name').value.trim();
  const s=document.getElementById('f-start').value.replace('T',' ');
  const e=document.getElementById('f-end').value.replace('T',' ');
  const ph=document.getElementById('f-preheat').value.replace('T',' ');
  const src=document.getElementById('f-source').value;
  const channels=[...document.getElementById('f-channels').selectedOptions].map(o=>o.value);
  const goals=[...document.getElementById('f-goals').selectedOptions].map(o=>o.value);
  const intensity=document.getElementById('f-intensity').value;
  const rules=document.getElementById('f-rules').value;
  const note=document.getElementById('f-note').value;
  const triggerType=normalizeTriggerType(document.getElementById('f-trigger-type')?.value);
  const important=document.getElementById('f-important').checked;
  if(!n){showNotif('活动名称不能为空',true);return}
  if(!s||!e){showNotif('时间不能为空',true);return}
  if(new Date(s)>new Date(e)){showNotif('结束时间不能早于开始时间，请修改',true);return}
  if(!channels.length){showNotif('请至少选择一个活动渠道',true);return}

  const now=ts();

  if(editingId){
    // Edit mode — single update
    const idx=findActivityIndexByRef(editingId);
    if(idx>=0){
      const before = deepClone(activities[idx]);
      ensureGameTypeVisible(g, t);
      activities[idx]=normalizeActivity({...activities[idx],game:g,type:t,name:n,startTime:s,endTime:e,preheat:ph,channels,goals,intensity,rules,note,source:src,triggerType,important,modifier:currentUser.name,modifyTime:now});
      addLog(`修改了《${g}》${n}`, {undo:{kind:'activity_update', before}});
      showNotif(`修改成功：${n}`);
    }
    stageLatestLocalSnapshot(); // immediate local save
    saveData();                 // async cloud sync (also re-saves locally after merge)
    activeGameFilter='all';
    activeTypeFilter='all';
    persistUiState();
    closeModal();renderMain();
    return;
  }

  // Check cycle mode
  const cycleOn = document.getElementById('f-cycle')?.checked;
  const gap     = parseInt(document.getElementById('f-cycle-gap')?.value)||0;
  const until   = document.getElementById('f-cycle-until')?.value;

  if(cycleOn && until){
    // Batch cycle creation
    ensureGameTypeVisible(g, t);
    const sDate    = new Date(s);
    const eDate    = new Date(e);
    const dur      = Math.ceil((eDate-sDate)/86400000);
    const step     = dur+gap; // gap=0:seamless, gap=1:1 day between
    const untilDate= new Date(until+'T23:59:59');
    const phOffset = ph ? (new Date(s)-new Date(ph)) : null; // preheat offset in ms

    // Helper: add days to a datetime string "YYYY-MM-DD HH:MM"
    function shiftDateStr(dateStr, daysOffset){
      if(!dateStr) return dateStr;
      const d=new Date(dateStr);
      d.setDate(d.getDate()+daysOffset);
      const pad=v=>String(v).padStart(2,'0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    let created=0, curShift=0;
    const newItems=[];
    while(true){
      const cycleStart=new Date(sDate.getTime()+curShift*86400000);
      if(cycleStart>untilDate || created>=50) break;
      const dc=cycleStart.toISOString().split('T')[0].replace(/-/g,'');
      const newId=generateUniqueActId(g, t, dc, newItems.map(i=>i.id));
      const newStart=shiftDateStr(s, curShift);
      const newEnd  =shiftDateStr(e, curShift);
      const newPh   =ph&&phOffset!==null ? shiftDateStr(ph, curShift) : ph;
      newItems.push(normalizeActivity({id:newId,game:g,type:t,name:n,startTime:newStart,endTime:newEnd,preheat:newPh,channels,goals,intensity,rules,note,source:src,triggerType,important,creator:currentUser.name,createTime:now,modifier:currentUser.name,modifyTime:now}));
      created++;
      curShift+=step;
    }
    // Insert all at front
    activities.unshift(...newItems.reverse());
    addLog(`循环创建了 ${created} 条《${g}》${t} · ${n}（间隔${gap}天）`, {undo:{kind:'activity_create', refs:newItems.map(item=>getActivityRef(item))}});
    showNotif(`循环创建成功：共生成 ${created} 条活动`);
  } else {
    // Single creation
    ensureGameTypeVisible(g, t);
    const dc=s.split(' ')[0].replace(/-/g,'');
    const newId=generateUniqueActId(g, t, dc, []);
    const createdActivity = normalizeActivity({id:newId,game:g,type:t,name:n,startTime:s,endTime:e,preheat:ph,channels,goals,intensity,rules,note,source:src,triggerType,important,creator:currentUser.name,createTime:now,modifier:currentUser.name,modifyTime:now});
    activities.unshift(createdActivity);
    addLog(`新增了《${g}》${n}`, {undo:{kind:'activity_create', refs:[getActivityRef(createdActivity)]}});
    showNotif(`新增成功：《${g}》${t} · ${n}`);
  }

  stageLatestLocalSnapshot(); // immediate local save
  saveData();                 // async cloud sync
  activeGameFilter='all';
  activeTypeFilter='all';
  calGame=g;currentTab='calendar';
  persistUiState();
  document.querySelectorAll('.nav-tab').forEach((tb,i)=>tb.classList.toggle('active',i===1));
  closeModal();renderMain();
}

function formatSize(bytes){
  if(!bytes) return '';
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return Math.round(bytes/1024)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

function genAttId(){return 'att_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}

// Drag-and-drop handlers

function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}

  processFiles([...e.dataTransfer.files], actId);
}

// ─── Supabase Storage helpers ───
// Images are uploaded to Supabase Storage bucket 'media'
// Path: {game}/{type}/{attId}_{filename}
// att.data stores the public URL (not base64) when Storage is available

const STORAGE_BUCKET = 'media';

function storageUrl(path){
  return `${_sbUrl}/storage/v1/object/public/${STORAGE_BUCKET}/${path}`;
}

async function uploadToStorage(path, blob, mimeType){
  const r = await fetch(`${_sbUrl}/storage/v1/object/${STORAGE_BUCKET}/${path}`, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + _sbKey,
      'Content-Type': mimeType,
      'x-upsert': 'true'
    },
    body: blob
  });
  if(!r.ok){ const t=await r.text(); throw new Error(`Storage 上传失败 ${r.status}: ${t.slice(0,100)}`); }
  return storageUrl(path);
}

async function deleteFromStorage(path){
  if(!path || !_sbUrl || !_sbKey) return;
  await fetch(`${_sbUrl}/storage/v1/object/${STORAGE_BUCKET}/${path}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + _sbKey }
  }).catch(()=>{});
}

// ─── Image compression ───
// Compress image to max 100KB using canvas
async function compressImage(file){
  return new Promise((resolve)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const TARGET = 80 * 1024; // 80KB target

      const tryWithDim = (maxDim, quality) => new Promise(res=>{
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(res, 'image/jpeg', quality);
      });

      (async ()=>{
        // Try progressively smaller dimensions + lower quality
        const attempts = [
          { maxDim: 800, quality: 0.7 },
          { maxDim: 600, quality: 0.6 },
          { maxDim: 480, quality: 0.5 },
          { maxDim: 360, quality: 0.4 },
          { maxDim: 320, quality: 0.3 },
          { maxDim: 240, quality: 0.2 },
          { maxDim: 200, quality: 0.15 },
          { maxDim: 160, quality: 0.1 },
        ];
        let bestBlob = null;
        for(const {maxDim, quality} of attempts){
          const blob = await tryWithDim(maxDim, quality);
          if(!bestBlob) bestBlob = blob;
          if(blob && blob.size <= TARGET){ resolve(blob); return; }
          if(blob && blob.size < (bestBlob?.size||Infinity)) bestBlob = blob;
        }
        resolve(bestBlob); // best effort — smallest we could get
      })();
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

// ─── Process uploaded files ───
async function processFiles(files, actId){
  const MAX = 50 * 1024 * 1024; // 50MB limit for videos
  const act = activities.find(a=>a.id===actId);
  const game = act?.game||'未知游戏';
  const type = act?.type||'未知类型';

  let uploaded = 0;
  const total = files.filter(f=>f.type.startsWith('image/')||f.type.startsWith('video/')).length;
  if(!total){ showNotif('没有可用的图片或视频文件',true); return; }

  showNotif(`正在处理 ${total} 个文件…`);

  for(const file of files){
    const isImg = file.type.startsWith('image/');
    const isVid = file.type.startsWith('video/');
    if(!isImg && !isVid){ showNotif(`「${file.name}」不是图片或视频，已跳过`,true); continue; }
    if(file.size > MAX){ showNotif(`「${file.name}」超过50MB限制，已跳过`,true); continue; }

    const attId = genAttId();
    let attData = null;
    let attSize = file.size;
    let attType = isImg ? 'image' : 'video';

    if(isImg){
      // Compress image to ≤100KB
      const compressed = await compressImage(file);
      if(!compressed){ showNotif(`「${file.name}」压缩失败，已跳过`,true); continue; }
      attSize = compressed.size;

      if(_sbReady && _sbUrl && _sbKey){
        // Upload to Supabase Storage
        try{
          const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g,'_');
          const path = `${game}/${type}/${attId}_${safeName}`;
          attData = await uploadToStorage(path, compressed, 'image/jpeg');
          // Store path for deletion later
          const att = { id:attId, name:file.name, type:'image', size:attSize,
                        data:attData, storagePath:path, addedBy:currentUser.name, addedAt:ts() };
          if(!attachments[actId]) attachments[actId]=[];
          attachments[actId].push(att);
          refreshAttachList(actId);
          // Save metadata to database (URL, not base64)
          saveAttachmentsFor(actId);
          uploaded++;
          if(uploaded===total) showNotif(`成功上传 ${uploaded} 张图片（已压缩至80KB以内）`);
          continue;
        }catch(e){
          console.warn('Storage upload failed, falling back to base64', e);
          showNotif(`图片上传云端失败，改用本地存储: ${e.message}`, true);
          // Fall through to base64 fallback
        }
      }
      // Fallback: store as base64 (localStorage only)
      const reader = new FileReader();
      await new Promise(resolve=>{
        reader.onload = ev=>{
          attData = ev.target.result;
          resolve();
        };
        reader.readAsDataURL(compressed);
      });
    } else {
      // Video: read as base64 (or could upload to storage too)
      const reader = new FileReader();
      await new Promise(resolve=>{
        reader.onload = ev=>{ attData = ev.target.result; resolve(); };
        reader.readAsDataURL(file);
      });
    }

    const att = { id:attId, name:file.name, type:attType,
                  size:attSize, data:attData, addedBy:currentUser.name, addedAt:ts() };
    if(!attachments[actId]) attachments[actId]=[];
    attachments[actId].push(att);
    refreshAttachList(actId);
    saveAttachmentsFor(actId);
    uploaded++;
    if(uploaded===total) showNotif(`成功添加 ${uploaded} 个附件`);
  }
}

function deleteAttachment(actId, attId){
  if(!attachments[actId]) return;
  const att = attachments[actId].find(x=>x.id===attId);
  attachments[actId]=attachments[actId].filter(x=>x.id!==attId);
  if(!attachments[actId].length) delete attachments[actId];
  // Delete from Storage if it was uploaded there
  if(att && att.storagePath && _sbReady && _sbUrl && _sbKey){
    deleteFromStorage(att.storagePath).catch(()=>{});
  }
  refreshAttachList(actId);
  saveAttachmentsFor(actId);
  showNotif('附件已删除');
}

function lbDeleteConfirmed(actId, attId){
  document.getElementById('lb-del-confirm')?.remove();

  if(!remaining.length){

    if(currentTab==='media') renderMain();

// ─── Media Library View ───
function renderMediaView(container){
  const allGames=['all',...GAMES];

  // Build items list
  const allItems=[];
  Object.entries(attachments).forEach(([actId,atts])=>{
    const act=activities.find(a=>a.id===actId);
    atts.forEach(att=>allItems.push({att,act,actId}));
  });

  // Filter by game
  const gameFiltered = mediaGame==='all'
    ? allItems
    : allItems.filter(({act})=>act&&act.game===mediaGame);

  // Collect types present in gameFiltered
  const presentTypes=[];
  ACT_TYPES.forEach(t=>{ if(gameFiltered.some(({act})=>act&&act.type===t)) presentTypes.push(t); });
  gameFiltered.forEach(({act})=>{ if(act&&!ACT_TYPES.includes(act.type)&&!presentTypes.includes(act.type)) presentTypes.push(act.type); });

  // Reset filter if it no longer exists
  if(mediaTypeFilter!=='all'&&!presentTypes.includes(mediaTypeFilter)) mediaTypeFilter='all';

  // Filter by type
  const filteredItems = mediaTypeFilter==='all'
    ? gameFiltered
    : gameFiltered.filter(({act})=>act&&act.type===mediaTypeFilter);

  // Count per game
  const gameCounts={all:allItems.length};
  GAMES.forEach(g=>{gameCounts[g]=allItems.filter(({act})=>act&&act.game===g).length;});

// ===================== MEDIA UPLOAD ZONE (drag + file + paste) =====================
function initMediaPasteZone(){
  const zone     = document.getElementById('media-paste-zone');
  const droparea = document.getElementById('media-droparea');
  if(!zone || !droparea) return;

  // Restore previously selected type
  const sel = document.getElementById('media-paste-type-select');
  if(sel && mediaPasteType) sel.value = mediaPasteType;

  // ── Shared upload helper ──
  async function uploadFiles(files){
    const actType = mediaPasteType;
    if(!actType){ showNotif('请先选择目标活动类型', true); return; }
    const imgFiles = [...files].filter(f => f.type.startsWith('image/'));
    if(!imgFiles.length){ showNotif('没有可上传的图片文件', true); return; }
    const candidates = activities
      .filter(a => a.type === actType && (mediaGame==='all' || a.game===mediaGame))
      .sort((a,b) => new Date(b.startTime) - new Date(a.startTime));
    if(!candidates.length){
      showNotif(`找不到「${actType}」类型的活动，请先创建相关活动`, true);
      return;
    }
    const actId = candidates[0].id;
    showNotif(`正在上传 ${imgFiles.length} 张图片到「${candidates[0].name}」…`);
    for(const file of imgFiles) await processFiles([file], actId);
    renderMain();
  }

  // ── Drag & drop on droparea ──
  droparea.addEventListener('dragover', e=>{
    e.preventDefault(); e.stopPropagation();
    e.dataTransfer.dropEffect = 'copy';
    zone.classList.add('drag-over');
    droparea.classList.add('drag-over');
  });
  droparea.addEventListener('dragleave', e=>{
    e.stopPropagation();
    zone.classList.remove('drag-over');
    droparea.classList.remove('drag-over');
  });
  droparea.addEventListener('drop', async e=>{
    e.preventDefault(); e.stopPropagation();
    zone.classList.remove('drag-over');
    droparea.classList.remove('drag-over');
    await uploadFiles(e.dataTransfer.files);
  });

  // ── Global paste handler (always active while media tab open) ──
  const pasteHandler = async (e) => {
    // Only intercept if not typing in an input/select/textarea
    if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;
    const items = (e.clipboardData || e.originalEvent?.clipboardData)?.items;
    if(!items) return;
    const imageItems = [...items].filter(it => it.type.startsWith('image/'));
    if(!imageItems.length) return;
    e.preventDefault();
    const fileList = imageItems.map(it => it.getAsFile()).filter(Boolean);
    await uploadFiles(fileList);
  };
  document.addEventListener('paste', pasteHandler);

  // ── Cleanup on tab switch ──
  const prev = window._mediaPasteCleanup;
  if(prev) prev();
  window._mediaPasteCleanup = () => document.removeEventListener('paste', pasteHandler);
}

// Called by the file input's onchange
async function mediaFileSelected(e){
  const files = e.target.files;
  if(!files || !files.length) return;
  const actType = mediaPasteType;
  if(!actType){ showNotif('请先选择目标活动类型', true); e.target.value=''; return; }
  const candidates = activities
    .filter(a => a.type === actType && (mediaGame==='all' || a.game===mediaGame))
    .sort((a,b) => new Date(b.startTime) - new Date(a.startTime));
  if(!candidates.length){
    showNotif(`找不到「${actType}」类型的活动，请先创建相关活动`, true);
    e.target.value=''; return;
  }
  const actId = candidates[0].id;
  const imgFiles = [...files].filter(f => f.type.startsWith('image/'));
  if(!imgFiles.length){ showNotif('请选择图片文件', true); e.target.value=''; return; }
  showNotif(`正在上传 ${imgFiles.length} 张图片到「${candidates[0].name}」…`);
  for(const file of imgFiles) await processFiles([file], actId);
  e.target.value = '';
  renderMain();
}

// ── Export all images as ZIP ──
async function exportAllImages(game){
  const items=[];
  Object.entries(attachments).forEach(([actId,atts])=>{
    const act=activities.find(a=>a.id===actId);
    if(game!=='all'&&(!act||act.game!==game)) return;
    atts.filter(att=>att.type==='image').forEach(att=>items.push({att,act}));
  });
  if(!items.length){showNotif('当前没有可导出的图片',true);return;}
  showNotif(`正在打包 ${items.length} 张图片，请稍候…`);

  try{
    await new Promise((resolve,reject)=>{
      if(window.JSZip){resolve();return;}
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=resolve; s.onerror=reject;
      document.head.appendChild(s);
    });
    const zip=new JSZip();
    const folderName=game==='all'?'全部游戏':game;
    const folder=zip.folder(folderName);
    const safe=(s)=>s.replace(/[\/\\:*?"<>|]/g,'_').slice(0,30);

    for(let i=0;i<items.length;i++){
      const {att,act}=items[i];
      const fname=`${String(i+1).padStart(3,'0')}_${safe(act?.name||'未知活动')}.jpg`;
      if(att.data.startsWith('data:')){
        // base64 stored locally
        const base64=att.data.split(',')[1];
        folder.file(fname, base64, {base64:true});
      } else {
        // URL from Supabase Storage — fetch the blob
        try{
          const resp=await fetch(att.data);
          const blob=await resp.blob();
          folder.file(fname, blob);
        }catch(e){
          console.warn('Failed to fetch image for export',att.data,e);
        }
      }
    }
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:3}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`${folderName}_图片_${ts().replace(/[: ]/g,'-')}.zip`;
    a.click();
    URL.revokeObjectURL(url);
    showNotif(`✓ 已打包导出 ${items.length} 张图片`);
  }catch(e){
    console.warn('Export failed',e);
    showNotif(`导出失败：${e.message}`,true);
  }
}

function doDelete(id){
  const a=findActivityByRef(id);
  if(!a){ closeModal(); return; }
  const key = getActivityRef(a);
  // Record tombstone BEFORE filtering — so merge never brings this back
  if(key) _deletedKeys[key] = Date.now();
  activities=activities.filter(x=>getActivityRef(x)!==id && x.id!==id);
  if(a)addLog(`删除了《${a.game}》${a.name}`, {undo:{kind:'activity_delete', activity:deepClone(a)}});
  closeModal();showNotif('删除成功');
  saveData(); // save immediately so tombstone reaches cloud ASAP
  renderMain();
}

// ===================== DAILY RECOMMENDATIONS =====================
// 每次进入「每日推荐」Tab，从活动库随机抽6条展示
// 抽取策略：优先当前进行中 + 即将开始的活动，以重要活动优先
function renderDailyView(container){
  const now=TODAY;

  // Pool: active + upcoming, important first, then shuffle rest
  const active  = activities.filter(a=>new Date(a.startTime)<=now&&new Date(a.endTime)>=now);
  const upcoming= activities.filter(a=>new Date(a.startTime)>now);
  const ended   = activities.filter(a=>new Date(a.endTime)<now);

  const important = [...active,...upcoming,...ended].filter(a=>a.important);
  const rest      = [...active,...upcoming,...ended].filter(a=>!a.important);
  // Date-seeded shuffle — same day always produces same order
  // Seed = YYYYMMDD integer, giving consistent results all day
  const seed = parseInt(TODAY_STR.replace(/-/g,''));
  function seededRand(s){ s=Math.sin(s)*10000; return s-Math.floor(s); }
  const shuffle = arr => {
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(seededRand(seed+i)*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  };
  const picked = [...shuffle(important),...shuffle(rest)].slice(0,6);

  if(!picked.length){
    container.innerHTML=`<div class="daily-view"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px">
      <div style="font-size:40px">📋</div>
      <div style="font-size:14px">暂无活动数据</div>
      <div style="font-size:12px">先在「活动列表」录入活动，再来查看每日推荐</div>
    </div></div>`;
    return;
  }

  function getReason(a){
    const s=new Date(a.startTime),e=new Date(a.endTime);
    const dStart=Math.ceil((s-now)/86400000);
    const dEnd  =Math.ceil((e-now)/86400000);
    if(a.important) return '⭐ 重要活动，值得重点关注';
    if(s<=now&&e>=now){
      if(dEnd<=2) return `🔴 活动即将结束，仅剩 ${dEnd} 天`;
      if(dEnd<=7) return `🟡 活动进行中，还有 ${dEnd} 天结束`;
      return '🟢 活动进行中';
    }
    if(dStart<=3) return `🔵 即将在 ${dStart} 天后开始${a.preheat?'，预热已启动':''}`;
    if(dStart<=7) return `⏳ 本周开始，提前关注`;
    return '📌 近期活动，建议追踪';
  }

  // Get up to 3 image attachments for an activity
  function getImages(actId){
    return (attachments[actId]||[]).filter(att=>att.type==='image').slice(0,3);
  }

  const cards=picked.map((a,i)=>{
    const st=getStatus(a);
    const c=TYPE_COLORS[a.type]||{bg:'#f3f4f6',text:'#6b7280',border:'#d1d5db'};
    const imgs=getImages(a.id);
    const ssId=`ss-${a.id}-${i}`;

    // Slideshow HTML — only render if there are images
    const slideshowHtml = imgs.length>0 ? `
      <div class="dc-slideshow" id="${ssId}">
        ${imgs.map((img,si)=>`
          <div class="dc-slide${si===0?' active':''}" data-idx="${si}">
            <img src="${img.data}" alt="${img.name}" loading="lazy">
          </div>`).join('')}
        ${imgs.length>1?`<div class="dc-dots">
          ${imgs.map((_,si)=>`<div class="dc-dot${si===0?' active':''}" data-ss="${ssId}" data-idx="${si}"></div>`).join('')}
        </div>`:''}
      </div>` : '';

    return`<div class="daily-card ${a.important?'important-card':''}" onclick="showDetail('${getActivityRef(a)}')">
      ${slideshowHtml}
      <div class="daily-card-body">
        <div class="daily-card-num">${i+1}</div>
        <div class="daily-card-meta">
          <span class="tag" style="background:${c.bg};color:${c.text}">${a.type}</span>
          <span class="tag" style="background:${st.bg};color:${st.color}">${st.label}</span>
          <span style="font-size:10px;color:var(--text3)">${a.game}</span>
        </div>
        <div class="daily-card-name">${a.important?'⭐ ':''}${a.name}</div>
        <div class="daily-card-detail">
          <span>📅 ${a.startTime.split(' ')[0]} ~ ${a.endTime.split(' ')[0]}</span>
          ${a.intensity?`&nbsp;·&nbsp;<span>💪 ${a.intensity}</span>`:''}
          ${a.channels?.length?`&nbsp;·&nbsp;<span>📡 ${a.channels.join('/')}</span>`:''}
        </div>
        <div class="daily-card-reason">${getReason(a)}</div>
      </div>
    </div>`;
  }).join('');

  const importantCount=activities.filter(a=>a.important).length;

  container.innerHTML=`<div class="daily-view">
    <div class="daily-header">
      <div>
        <div class="daily-title">📋 每日活动推荐</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">
          从 ${activities.length} 条活动中抽选 ${picked.length} 条
          ${importantCount?`，其中 ${importantCount} 条重要活动优先展示`:''}
          · 每日固定，次日自动更新
        </div>
      </div>
      <button class="btn primary" onclick="renderMain()" style="font-size:12px">🔀 换一批</button>
    </div>
    <div class="daily-grid">${cards}</div>
  </div>`;

  // Start auto-slideshows for cards that have images
  picked.forEach((a,i)=>{
    const imgs=getImages(a.id);
    if(imgs.length<=1) return;
    const ssId=`ss-${a.id}-${i}`;
    let cur=0;
    const timer=setInterval(()=>{
      const ss=document.getElementById(ssId);
      if(!ss){ clearInterval(timer); return; } // card removed
      const slides=ss.querySelectorAll('.dc-slide');
      const dots=ss.querySelectorAll('.dc-dot');
      slides[cur].classList.remove('active');
      dots[cur]?.classList.remove('active');
      cur=(cur+1)%slides.length;
      slides[cur].classList.add('active');
      dots[cur]?.classList.add('active');
    }, 3000);
  });
}
// ===================== END DAILY RECOMMENDATIONS =====================

function genReportId(){ return 'rpt_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

// ── Render Report View ──
function renderReportView(container){
  const canEdit = currentUser.role!=='viewer';

  let list = reports.filter(r=>{

    if(q){
      const ql=q.toLowerCase();
      const inTitle=r.title.toLowerCase().includes(ql);
      const inDesc=(r.desc||'').toLowerCase().includes(ql);
      const inKw=(r.keywords||'').toLowerCase().includes(ql);
      const inTags=r.tags.some(t=>t.toLowerCase().includes(ql));
      if(!inTitle&&!inDesc&&!inKw&&!inTags) return false;
    }
    return true;
  });

  // Tag counts for sidebar
  const tagCounts={};
  reports.forEach(r=>r.tags.forEach(t=>tagCounts[t]=(tagCounts[t]||0)+1));

    </button>
    ${REPORT_TAGS.map(t=>`
      <button class="rtag-filter ${reportTagFilter===t?'active':''}" onclick="reportTagFilter='${t}';renderMain()">

        <div style="font-size:40px">📄</div>
        <div style="font-size:14px">${reports.length===0?'暂无调研报告':'没有匹配的报告'}</div>

      </div>`

          <div class="report-card-thumb">${thumbHtml}</div>
          <div class="report-card-body">
            <div class="report-card-title">${r.title}</div>
            <div class="report-card-meta">${r.uploader} · ${r.uploadTime.split(' ')[0]}</div>
            <div class="report-tags">
              ${r.tags.map(t=>`<span class="rtag" style="background:${tagColor(t).bg};color:${tagColor(t).text}">${t}</span>`).join('')}
            </div>
          </div>
        </div>`;
      }).join('');

  container.innerHTML=`<div class="report-view">
    <div class="report-sidebar">${sidebarHtml}</div>
    <div class="report-main">
      <div class="report-toolbar">
        <div style="display:flex;align-items:center;gap:6px;flex:1;max-width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:0 10px">
          <span style="color:var(--text3)">⌕</span>
          <input id="report-search-val" type="text" placeholder="搜索标题、关键词、标签…" value="${q}"
            style="border:none;background:transparent;outline:none;font-size:12px;padding:7px 0;flex:1;color:var(--text)"
            oninput="renderMain()">
        </div>
        <span style="font-size:11px;color:var(--text3)">${list.length} 份报告</span>
        ${canEdit?`<button class="btn primary" onclick="showUploadReportDialog()" style="margin-left:auto">+ 上传报告</button>`:''}
      </div>

          <button class="btn ${ov._linkMode?'primary':''}" id="rpt-link-btn" onclick="setRptMode(true)" style="font-size:11px">粘贴链接</button>
        </div>
        <div id="rpt-file-area">
          <label style="display:block;border:2px dashed var(--border2);border-radius:7px;padding:14px;text-align:center;cursor:pointer;font-size:12px;color:var(--text2)">
            <input type="file" accept=".pdf,image/*" style="display:none" id="rpt-file-input" onchange="onRptFileSelect(event)">
            <span id="rpt-file-label">${r?'点击重新选择文件（当前已有文件）':'点击选择 PDF 或图片文件，最大 20MB'}</span>
          </label>
        </div>
        <div id="rpt-link-area" style="display:none">

        </div>

      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveReport('${editId||''}')">保存</button>
    </div>
  </div>`;
  ov._linkMode=false;
  ov._selectedTags=new Set(r?.tags||[]);
  ov._fileData=null; ov._fileType=null; ov._thumb=null;
  document.body.appendChild(ov);
}

function setRptMode(linkMode){
  const ov=document.getElementById('modal-overlay');
  if(ov) ov._linkMode=linkMode;
  document.getElementById('rpt-file-area').style.display=linkMode?'none':'';
  document.getElementById('rpt-link-area').style.display=linkMode?'':'none';
  document.getElementById('rpt-file-btn').className='btn'+(linkMode?'':' primary');
  document.getElementById('rpt-link-btn').className='btn'+(linkMode?' primary':'');
}

function toggleReportTagSel(tag){
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const sel=ov._selectedTags;
  const c=REPORT_TAG_COLORS[tag]||{bg:'#f3f4f6',text:'#6b7280'};
  const el=document.getElementById('rptag-'+tag.replace(/\s/g,'_'));
  if(sel.has(tag)){
    sel.delete(tag);
    if(el){el.style.background='var(--bg2)';el.style.color='var(--text3)';el.style.borderColor='var(--border2)';}
  } else {
    sel.add(tag);
    if(el){el.style.background=c.bg;el.style.color=c.text;el.style.borderColor=c.text+'44';}
  }
}

function onRptFileSelect(e){
  const file=e.target.files[0]; if(!file)return;
  if(file.size>20*1024*1024){showNotif('文件超过20MB限制',true);return;}
  const label=document.getElementById('rpt-file-label');
  if(label) label.textContent=`已选择：${file.name}（${(file.size/1024/1024).toFixed(1)}MB）`;
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    ov._fileData=ev.target.result;
    ov._fileType=file.type.startsWith('image/')?'image':'pdf';
    ov._thumb=ov._fileType==='image'?ev.target.result:null;
  };
  reader.readAsDataURL(file);
}

async function saveReport(editId){
  const title=(document.getElementById('rpt-title').value||'').trim();
  if(!title){showNotif('请填写报告标题',true);return;}
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const desc=document.getElementById('rpt-desc').value||'';
  const keywords=document.getElementById('rpt-kw').value||'';
  const tags=[...ov._selectedTags];
  const linkMode=ov._linkMode;
  const linkVal=(document.getElementById('rpt-link-val').value||'').trim();

  let fileData=ov._fileData, fileType=ov._fileType, thumb=ov._thumb;

  if(editId){
    // editing — keep old file if no new one selected
    const old=reports.find(r=>r.id===editId);
    if(!fileData&&old){ fileData=old.fileData; fileType=old.fileType; thumb=old.thumb; }
  }

  if(linkMode){
    if(!linkVal){showNotif('请填写报告链接',true);return;}
    fileData=linkVal; fileType='link'; thumb=null;
  } else if(!fileData){
    showNotif('请选择报告文件',true);return;
  }

  const now=ts();
  if(editId){
    const idx=reports.findIndex(r=>r.id===editId);
    if(idx>=0){
      reports[idx]={...reports[idx],title,desc,keywords,tags,fileData,fileType,thumb,modifier:currentUser.name,modifyTime:now};
      addLog(`编辑了调研报告「${title}」`);
      showNotif('报告已更新');
    }
  } else {
    reports.unshift({id:genReportId(),title,desc,keywords,tags,fileData,fileType,thumb,uploader:currentUser.name,uploadTime:now});
    addLog(`上传了调研报告「${title}」`);
    showNotif('报告上传成功');
  }
  closeModal(); saveData(); renderMain();
}

function confirmDeleteReport(id){
  const r=reports.find(x=>x.id===id); if(!r)return;
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  ov.innerHTML=`<div class="confirm-box">
    <div class="confirm-title">确认删除报告</div>

    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn danger" onclick="doDeleteReport('${id}')">确认删除</button>

}

function doDeleteReport(id){
  const r=reports.find(x=>x.id===id);
  reports=reports.filter(x=>x.id!==id);
  if(r) addLog(`删除了调研报告「${r.title}」`);
  closeModal(); showNotif('报告已删除'); saveData(); renderMain();
}

  ov.innerHTML=`<div class="confirm-box" style="width:420px;text-align:left">
    <div class="confirm-title" style="margin-bottom:14px">新增报告标签</div>
    <div class="fg full" style="margin-bottom:10px">
      <div class="flabel">标签名称 <span class="req">*</span></div>
      <input id="new-rpt-tag" type="text" placeholder="如：竞品分析">
    </div>
    <div class="fg full" style="margin-bottom:16px">
      <div class="flabel">标签颜色</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${swatches}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="doAddReportTag()">确认新增</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('new-rpt-tag')?.focus(),50);
}

function selectRptColor(idx){
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const old=ov._selectedRptColorIdx;
  const c=REPORT_TAG_PRESETS[idx];
  document.getElementById(`rpc-${old}`)?.style.setProperty('border','2px solid transparent');
  document.getElementById(`rpc-${idx}`)?.style.setProperty('border',`2px solid ${c.text}`);
  ov._selectedRptColorIdx=idx;
}

function doAddReportTag(){
  const name=(document.getElementById('new-rpt-tag').value||'').trim();
  if(!name){showNotif('标签名称不能为空',true);return;}
  if(REPORT_TAGS.includes(name)){showNotif(`「${name}」已存在`,true);return;}
  const ov=document.getElementById('modal-overlay');
  const c=REPORT_TAG_PRESETS[ov?._selectedRptColorIdx||0];
  REPORT_TAGS.push(name);
  REPORT_TAG_COLORS[name]=c;
  addLog(`新增了报告标签「${name}」`);
  showNotif(`标签「${name}」已新增`);
  closeModal(); saveData(); renderMain();
}

function showEditReportTagDialog(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const oldName=REPORT_TAGS[idx];
  const curC=REPORT_TAG_COLORS[oldName]||REPORT_TAG_PRESETS[0];
  const curIdx=REPORT_TAG_PRESETS.findIndex(c=>c.bg===curC.bg);
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  const swatches=REPORT_TAG_PRESETS.map((c,i)=>
    `<div onclick="selectRptColor(${i})" id="rpc-${i}" style="width:22px;height:22px;border-radius:4px;background:${c.bg};border:2px solid ${i===curIdx?c.text:'transparent'};cursor:pointer"></div>`
  ).join('');
  ov._selectedRptColorIdx=curIdx>=0?curIdx:0;
  ov.innerHTML=`<div class="confirm-box" style="width:420px;text-align:left">
    <div class="confirm-title" style="margin-bottom:14px">修改报告标签</div>
    <div class="fg full" style="margin-bottom:10px">
      <div class="flabel">标签名称 <span class="req">*</span></div>
      <input id="edit-rpt-tag" type="text" value="${oldName}">
    </div>
    <div class="fg full" style="margin-bottom:16px">
      <div class="flabel">标签颜色</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${swatches}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="doEditReportTag(${idx},'${oldName}')">保存</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const el=document.getElementById('edit-rpt-tag');if(el){el.focus();el.select();}},50);
}

function doEditReportTag(idx,oldName){
  const newName=(document.getElementById('edit-rpt-tag').value||'').trim();
  if(!newName){showNotif('标签名称不能为空',true);return;}
  if(newName!==oldName&&REPORT_TAGS.includes(newName)){showNotif(`「${newName}」已存在`,true);return;}
  const ov=document.getElementById('modal-overlay');
  const c=REPORT_TAG_PRESETS[ov?._selectedRptColorIdx||0];
  REPORT_TAGS[idx]=newName;
  REPORT_TAG_COLORS[newName]=c;
  if(newName!==oldName){
    delete REPORT_TAG_COLORS[oldName];
    reports.forEach(r=>{r.tags=r.tags.map(t=>t===oldName?newName:t);});
  }
  addLog(`将报告标签「${oldName}」改为「${newName}」`);
  showNotif('标签已更新');
  closeModal(); saveData(); renderMain();
}

function confirmDeleteReportTag(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const name=REPORT_TAGS[idx];
  const count=reports.filter(r=>r.tags.includes(name)).length;
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  ov.innerHTML=`<div class="confirm-box">
    <div class="confirm-title">确认删除标签</div>
    <div class="confirm-desc">确定删除标签「${name}」吗？${count>0?`<br><span style="color:#d93025">${count} 份报告使用了此标签，删除后标签会从这些报告上移除。</span>`:'该标签暂无报告使用。'}</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn danger" onclick="doDeleteReportTag(${idx})">确认删除</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function doDeleteReportTag(idx){
  const name=REPORT_TAGS[idx];
  REPORT_TAGS.splice(idx,1);
  delete REPORT_TAG_COLORS[name];
  reports.forEach(r=>{r.tags=r.tags.filter(t=>t!==name);});
  addLog(`删除了报告标签「${name}」`);
  showNotif(`标签「${name}」已删除`);
  closeModal(); saveData(); renderMain();
}
// ===================== END REPORT MODULE =====================

// ===================== INIT =====================
initStatusBar();

(function(){
  const ld=document.createElement('div');
  ld.id='cloud-loader';
  ld.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:14px';
  ld.innerHTML=`
    <div style="width:38px;height:38px;border:3px solid #e8e6ff;border-top-color:#5046e4;border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="font-size:13px;color:#5046e4;font-weight:500">正在初始化…</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  document.body.appendChild(ld);
})();

async function init(){
  await loadData();
  getSB(); // initialize client
  const ld=document.getElementById('cloud-loader');

  if(getSB()){
    // Supabase is configured — check if already logged in
    const loggedIn = await checkAuthState();
    if(ld) ld.remove();
    if(!loggedIn){
      // Show login/register screen — all visitors see this, no admin bypass
      currentUser={id:'',name:'',role:'none',email:''};
      updateTopbarUser();
      showAuthOverlay('login');
    }
    // handleAuthUser() calls renderMain() on successful login
  } else {
    // Supabase not yet configured in this file
    // Only the admin who is setting up for the first time should see the setup form
    if(ld) ld.remove();
    currentUser={id:'',name:'',role:'none',email:''};
    updateTopbarUser();
    showAuthOverlay('nosupabase');
  }
}

init();
</script>
