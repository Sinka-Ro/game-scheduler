<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞品游戏运营活动排期工具 v32-fixed-20260318-01</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f6;--bg3:#efefed;
  --text:#1a1a1a;--text2:#595959;--text3:#9b9b9b;
  --border:#e5e5e3;--border2:#d0d0ce;
  --primary:#5046e4;--primary-light:#ece9ff;
  --row-h:32px;--label-w:160px;--day-w:50px;
  --header-h:30px;--subheader-h:34px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;color:var(--text);background:var(--bg);overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;gap:12px}
.logo{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap}
.badge-beta{font-size:10px;padding:1px 6px;border-radius:10px;background:#e8e6ff;color:#5046e4;margin-left:6px;font-weight:500}
.topbar-mid{display:flex;gap:0;border-bottom:none}
.nav-tab{padding:0 14px;height:48px;display:flex;align-items:center;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
.nav-tab:hover:not(.active){color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;background:var(--bg);color:var(--text);white-space:nowrap;transition:background .1s;line-height:1.5}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.primary:hover{background:#3d34c8}
.btn.sm{padding:3px 8px;font-size:11px}
.btn.danger{color:#d93025;border-color:#f5c6c3}
.btn.danger:hover{background:#fce8e6}
.avatar{width:26px;height:26px;border-radius:50%;background:#e8e6ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#5046e4;flex-shrink:0;cursor:pointer}

/* MAIN AREA */
#mainArea{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ===== LIST VIEW ===== */
.list-view{display:flex;height:100%;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;padding:10px 8px;gap:8px;overflow-y:auto}
.sidebar-section-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;padding:4px 6px 2px}
.filter-item{padding:5px 8px;font-size:12px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;color:var(--text2);transition:background .1s}
.filter-item:hover{background:var(--bg2)}
.filter-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.filter-count{font-size:11px;opacity:.7}
.list-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.list-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{padding:5px 10px 5px 28px;font-size:12px;border:1px solid var(--border2);border-radius:5px;outline:none;background:var(--bg);color:var(--text);width:220px}
.search-wrap input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.list-table-wrap{flex:1;overflow:auto}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.stat-card{background:var(--bg2);border-radius:6px;padding:10px 14px}
.stat-card .val{font-size:20px;font-weight:600;line-height:1.2}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:2px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:7px 12px;font-size:11px;font-weight:500;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;position:sticky;top:0;z-index:5}
td{padding:7px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:var(--bg2)}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:500}

/* ===== GANTT CALENDAR ===== */
.cal-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.cal-toolbar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;flex-wrap:wrap}
.cal-title{font-size:13px;font-weight:600;white-space:nowrap}
.game-switcher{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden;flex-shrink:0}
.game-tab{padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);background:var(--bg);border-right:1px solid var(--border2);transition:background .1s;white-space:nowrap}
.game-tab:last-child{border-right:none}
.game-tab.active{background:var(--primary);color:#fff;font-weight:500}
.game-tab:hover:not(.active){background:var(--bg2)}
.month-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.mnav-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2)}
.mnav-btn:hover{background:var(--bg2)}
.mnav-label{font-size:12px;min-width:64px;text-align:center;color:var(--text)}

.gantt-container{flex:1;display:flex;overflow:hidden}
.gantt-left{width:var(--label-w);flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--border2);position:relative;z-index:10;background:var(--bg)}
.gantt-right{flex:1;overflow-x:auto;overflow-y:auto;position:relative}
.gantt-right-inner{min-width:max-content;position:relative}

/* Frozen left headers */
.left-top{height:calc(var(--header-h) + var(--subheader-h));flex-shrink:0;border-bottom:2px solid var(--border2);display:flex;align-items:flex-end;padding:0 10px 6px;font-size:11px;color:var(--text3);font-weight:500;background:var(--bg2)}
.left-rows{flex:1;overflow-y:hidden;overflow-x:hidden}
.left-cat-header{height:26px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;letter-spacing:.3px;border-bottom:1px solid var(--border);flex-shrink:0}
.left-row{height:var(--row-h);display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.left-row:hover{background:var(--bg2)}

/* Right header */
.right-header{height:calc(var(--header-h) + var(--subheader-h));border-bottom:2px solid var(--border2);background:var(--bg2);position:sticky;top:0;z-index:8}
.week-header-row{height:var(--header-h);display:flex;border-bottom:1px solid var(--border)}
.week-block{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);font-weight:600;border-right:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.day-header-row{height:var(--subheader-h);display:flex}
.day-hcell{width:var(--day-w);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);border-right:1px solid var(--border);cursor:default;flex-direction:column;gap:1px}
.day-hcell.weekend{color:#d93025;background:rgba(217,48,37,.04)}
.day-hcell.today{background:#e8e6ff;color:var(--primary);font-weight:700}

/* Right body rows */
.right-cat-header{height:26px;border-bottom:1px solid var(--border);display:flex;position:relative}
.right-cat-header .day-bg{width:var(--day-w);flex-shrink:0;border-right:1px solid var(--border);height:100%}
.right-row{height:var(--row-h);border-bottom:1px solid var(--border);display:flex;position:relative}
.right-row .day-bg{width:var(--day-w);flex-shrink:0;border-right:1px solid var(--border);height:100%;flex-shrink:0}
.right-row .day-bg.weekend{background:rgba(0,0,0,.018)}
.right-row .day-bg.today{background:rgba(80,70,228,.06)}
.right-row:hover .day-bg{background:rgba(0,0,0,.025)}
.right-row:hover .day-bg.today{background:rgba(80,70,228,.1)}

/* Activity bars */
.act-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:2;transition:filter .1s;pointer-events:all}
.act-bar:hover{filter:brightness(.93)}
.preheat-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;border:1.5px dashed;display:flex;align-items:center;padding:0 5px;font-size:10px;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:1;opacity:.7}

/* Today line */
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--primary);z-index:9;pointer-events:none}

/* Scrollbar sync helper */
.gantt-left .left-rows{scrollbar-width:none}
.gantt-left .left-rows::-webkit-scrollbar{display:none}

/* Tooltip */
.tip{position:fixed;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:10px 14px;font-size:12px;z-index:9999;pointer-events:none;max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none}
.tip-title{font-weight:600;font-size:13px;margin-bottom:6px;color:var(--text)}
.tip-row{color:var(--text2);margin-bottom:3px;line-height:1.5}
.tip-row span{color:var(--text);font-weight:500}

/* Stats view */
.stats-view{padding:20px;overflow-y:auto;height:100%}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-big{background:var(--bg2);border-radius:8px;padding:14px 16px}
.stat-big .num{font-size:24px;font-weight:700}
.stat-big .lbl{font-size:11px;color:var(--text3);margin-top:3px}
.stats-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px}
.panel-title{font-size:13px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--text3);min-width:20px;text-align:right}

/* Collab view */
.collab-view{padding:20px;overflow-y:auto;height:100%}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg);border-radius:10px;width:660px;max-width:95vw;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.flabel{font-size:11px;color:var(--text2);font-weight:600}
.flabel .req{color:#d93025}
input[type=text],input[type=datetime-local],select,textarea{font-size:12px;padding:6px 9px;border:1px solid var(--border2);border-radius:5px;outline:none;color:var(--text);background:var(--bg);font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:64px}
.close-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px}
.close-x:hover{background:var(--bg2);color:var(--text)}
.confirm-box{background:var(--bg);border-radius:10px;padding:28px;width:380px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.confirm-title{font-size:15px;font-weight:600;margin-bottom:8px}
.confirm-desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}

/* Notif */
.notif{position:fixed;top:16px;right:16px;z-index:2000;background:var(--bg);border:1px solid;border-radius:7px;padding:10px 16px;font-size:13px;max-width:340px;transition:opacity .3s;display:none;box-shadow:var(--shadow)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Media library */
.media-view{padding:0;overflow:hidden;height:100%;display:flex;flex-direction:column}
.media-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.media-game-tabs{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.media-game-tab{padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);background:var(--bg);border-right:1px solid var(--border2);white-space:nowrap}
.media-game-tab:last-child{border-right:none}
.media-game-tab.active{background:var(--primary);color:#fff;font-weight:500}
.media-game-tab:hover:not(.active){background:var(--bg2)}
.media-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,150px);gap:10px;align-content:start}
.media-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;width:150px}
.media-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1)}
.media-thumb{width:150px;height:350px;object-fit:cover;display:block;background:var(--bg2)}
.media-thumb-video{width:150px;height:350px;display:flex;align-items:center;justify-content:center;background:#1a1a2e;font-size:28px}
.media-card-body{padding:6px 8px}
.media-card-name{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.media-card-meta{font-size:10px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Attachment zone in detail modal */
.attach-zone{border:2px dashed var(--border2);border-radius:8px;padding:18px 14px;text-align:center;cursor:pointer;transition:border-color .15s;background:var(--bg2);position:relative}
.attach-zone:hover,.attach-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.attach-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.attach-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.attach-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)}
.attach-thumb{width:44px;height:34px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--bg3)}
.attach-thumb-vid{width:44px;height:34px;border-radius:4px;flex-shrink:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:16px}
.attach-info{flex:1;min-width:0}
.attach-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-size{font-size:10px;color:var(--text3)}
.attach-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;border-radius:3px;flex-shrink:0}
.attach-del:hover{background:var(--bg3);color:#d93025}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lightbox img,.lightbox video{max-width:92vw;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-caption{color:#e5e7eb;font-size:13px;max-width:600px;text-align:center}
.lightbox-nav{display:flex;gap:8px}
.lightbox-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:12px}
.lightbox-nav button:hover{background:rgba(255,255,255,.3)}
/* ── Auth ── */
.auth-overlay{position:fixed;inset:0;background:#f0eff7;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.auth-card{background:#fff;border:1px solid #ddd;border-radius:14px;width:100%;max-width:420px;padding:36px 40px;box-shadow:0 8px 32px rgba(80,70,228,.1)}
.auth-logo{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-.3px}
.auth-sub{font-size:12px;color:#9b9b9b;margin:4px 0 26px}
.auth-tabs{display:flex;border-bottom:1px solid #e5e5e3;margin-bottom:22px}
.atab{padding:8px 18px;font-size:13px;cursor:pointer;color:#9b9b9b;border-bottom:2px solid transparent;transition:color .15s}
.atab.active{color:#5046e4;border-bottom-color:#5046e4;font-weight:500}
.afield{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.alabel{font-size:11px;font-weight:600;color:#595959}
.ainput{padding:9px 12px;border:1px solid #d0d0ce;border-radius:7px;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
.ainput:focus{border-color:#5046e4;box-shadow:0 0 0 3px rgba(80,70,228,.1)}
.abtn{width:100%;padding:11px;background:#5046e4;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit;letter-spacing:.2px}
.abtn:hover{background:#3d34c8}
.abtn:disabled{background:#c7c4f0;cursor:not-allowed}
.amsg{font-size:12px;padding:9px 12px;border-radius:7px;margin-top:10px;line-height:1.6}
.amsg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.amsg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.amsg.warn{background:#fffbeb;color:#713f12;border:1px solid #fde68a}
.fs-login-btn{width:100%;padding:11px;background:#fff;color:#1a1a1a;border:1.5px solid #d0d0ce;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,border-color .15s}
.fs-login-btn:hover{background:#f0f0ff;border-color:#5046e4}
.fs-login-btn:disabled{opacity:.6;cursor:not-allowed}
/* role badges */
.rbadge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.rb-admin{background:#fee2e2;color:#991b1b}
.rb-editor{background:#dbeafe;color:#1d4ed8}
.rb-viewer{background:#f3f4f6;color:#6b7280}
.rb-pending{background:#fffbeb;color:#713f12}
/* ── Daily Recommendations ── */
.daily-view{padding:20px;overflow-y:auto;height:100%}
.daily-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.daily-title{font-size:16px;font-weight:600}
.daily-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.daily-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative}
.daily-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#5046e4}
.daily-card.important-card{border-color:#f59e0b;background:#fffdf0}
.daily-card-body{padding:14px 16px}
.daily-card-num{position:absolute;top:10px;right:12px;font-size:20px;font-weight:700;color:rgba(0,0,0,.08);line-height:1;z-index:1}
.daily-card-meta{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.daily-card-name{font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4}
.daily-card-detail{font-size:11px;color:var(--text2);line-height:1.7}
.daily-card-reason{font-size:11px;background:var(--bg2);padding:7px 10px;border-radius:6px;color:var(--text2);margin-top:8px;line-height:1.6;border-left:3px solid #5046e4}
/* Slideshow */
.dc-slideshow{width:100%;aspect-ratio:1/3;position:relative;overflow:hidden;background:#1a1a2e;flex-shrink:0}
.dc-slide{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;display:flex;align-items:center;justify-content:center}
.dc-slide.active{opacity:1}

// ===================== AUTH MODULE（飞书 OAuth）=====================
// 认证流程：

//   5. 第一个登录的用户自动成为管理员

const FS_API = 'https://open.feishu.cn/open-apis';
const FS_SESSION_KEY = 'fs_user_session';
const CLOUD_SYNC_POLL_MS = 5000;

let _fsTenantToken = '';
let _fsTenantTokenExp = 0;
let _fsRecordIdCache = {};  // { 'main_data': 'recXXXX', ... }

let _clientId = '';
let _syncPollTimer = null;
let _syncReloadTimer = null;

function isFsConfigured(){
  const cfg = getFsConfig();
  return !!(cfg.appId && cfg.appSecret && cfg.bitableToken && cfg.tableId);
}

function getFsConfig(){
  const local = lsLoad() || {};
  return {
    appId:            _fsAppId            || local._fsAppId            || '',
    appSecret:        _fsAppSecret        || local._fsAppSecret        || '',
    bitableToken:     _fsBitableToken     || local._fsBitableToken     || '',
    tableId:          _fsTableId         || local._fsTableId          || '',
    userTableId:      _fsUserTableId      || local._fsUserTableId      || '',
    driveFolderToken: _fsDriveFolderToken || local._fsDriveFolderToken || ''
  };
}

// 获取/刷新飞书租户 token（用于多维表格操作）
async function getFsTenantToken(){
  const now = Date.now();
  if(_fsTenantToken && _fsTenantTokenExp > now + 60000) return _fsTenantToken;
  const cfg = getFsConfig();
  if(!cfg.appId || !cfg.appSecret) throw new Error('飞书应用未配置，请先在存储设置中填写 App ID 和 App Secret');
  const r = await fetch(`${FS_API}/auth/v3/tenant_access_token/internal`,{
    method:'POST',
    headers:{'Content-Type':'application/json; charset=utf-8'},
    body: JSON.stringify({app_id: cfg.appId, app_secret: cfg.appSecret})
  });
  if(!r.ok) throw new Error(`获取飞书 Token 失败 (HTTP ${r.status})`);
  const d = await r.json();
  if(d.code !== 0) throw new Error(`获取飞书 Token 失败: ${d.msg}`);
  _fsTenantToken = d.tenant_access_token;
  _fsTenantTokenExp = now + Math.max(0, (d.expire || 7200) - 120) * 1000;
  return _fsTenantToken;
}

function saveFsSession(s){ sessionStorage.setItem(FS_SESSION_KEY, JSON.stringify(s)); }
function clearFsSession(){ sessionStorage.removeItem(FS_SESSION_KEY); }

function authLoginFeishu(){
  const cfg = getFsConfig();
  if(!cfg.appId){
    setAuthMsg('a-login-msg','未配置飞书 App ID，请联系管理员在「存储设置」中配置','err');
    return;
  }
  const btn = document.getElementById('a-login-btn');

  const state = Math.random().toString(36).slice(2,10);
  sessionStorage.setItem('fs_oauth_state', state);
  const redirectUri = encodeURIComponent(location.href.split('?')[0].split('#')[0]);
  window.location.href = `${FS_API}/authen/v1/authorize?app_id=${cfg.appId}&redirect_uri=${redirectUri}&state=${state}`;
}

// OAuth code 换 user_access_token
async function exchangeFsCode(code){
  const cfg = getFsConfig();
  const r = await fetch(`${FS_API}/authen/v1/oidc/access_token`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json; charset=utf-8',
      'Authorization': 'Basic ' + btoa(`${cfg.appId}:${cfg.appSecret}`)
    },
    body: JSON.stringify({grant_type:'authorization_code', code})
  });
  if(!r.ok) throw new Error(`OAuth 请求失败 (HTTP ${r.status})`);
  const d = await r.json();
  if(d.code !== 0) throw new Error(`OAuth 授权失败: ${d.msg}`);
  return d.data;
}

async function getFsUserInfo(accessToken){
  const r = await fetch(`${FS_API}/authen/v1/user_info`,{
    headers:{'Authorization':'Bearer '+accessToken}
  });
  const d = await r.json();
  if(d.code !== 0) throw new Error(`获取飞书用户信息失败: ${d.msg}`);
  return d.data;
}

async function refreshFsUserToken(refreshToken){
  const cfg = getFsConfig();
  const r = await fetch(`${FS_API}/authen/v1/oidc/refresh_access_token`,{
    method:'POST',
    headers:{
      'Content-Type':'application/json; charset=utf-8',
      'Authorization': 'Basic ' + btoa(`${cfg.appId}:${cfg.appSecret}`)
    },
    body: JSON.stringify({grant_type:'refresh_token', refresh_token: refreshToken})
  });
  if(!r.ok) throw new Error(`Token 刷新失败 (HTTP ${r.status})`);
  const d = await r.json();
  if(d.code !== 0) throw new Error(`Token 刷新失败: ${d.msg}`);
  return d.data;
}

// 处理 OAuth 回调，返回用户信息
async function handleFsOAuthCallback(code, state){
  const savedState = sessionStorage.getItem('fs_oauth_state');
  sessionStorage.removeItem('fs_oauth_state');
  if(savedState && state && savedState !== state) throw new Error('OAuth state 校验失败，请重试');

  const tokenData = await exchangeFsCode(code);
  const userInfo = await getFsUserInfo(tokenData.access_token);

  saveFsSession({
    accessToken:  tokenData.access_token,
    refreshToken: tokenData.refresh_token,
    tokenExp:     Date.now() + Math.max(0, (tokenData.expires_in || 7200) - 120) * 1000,
    userId:       userInfo.open_id || userInfo.user_id,
    name:         userInfo.name || userInfo.en_name || '',
    email:        userInfo.email || userInfo.enterprise_email || '',
    avatarUrl:    userInfo.avatar_url || ''
  });
  return userInfo;
}

// 校验权限并进入系统
async function handleAuthUser(userInfo){
  const userId   = userInfo.open_id || userInfo.user_id || '';
  const userName = userInfo.name || userInfo.en_name || '用户';
  const userEmail= userInfo.email || userInfo.enterprise_email || '';
  const avatarUrl= userInfo.avatar_url || '';

  if(!isFsConfigured()){
    // 未配置飞书多维表格 — 以管理员身份进入本地模式
    currentUser = {id: userId||'local', name: userName, role:'admin', email: userEmail};
    document.getElementById('auth-overlay').style.display='none';
    updateTopbarUser(); addLog('登录系统（本地模式）'); renderMain();
    return;
  }

  try{
    const cfg = getFsConfig();
    if(!cfg.userTableId){
      // 未配置用户表 — 直接以管理员身份进入
      currentUser = {id: userId||'local', name: userName, role:'admin', email: userEmail};
      document.getElementById('auth-overlay').style.display='none';
      updateTopbarUser(); addLog('登录系统'); renderMain(); startCloudSync();
      return;
    }

    let profile = await fsReadUserProfile(userId);

    if(!profile){
      // 首次登录：检查是否是第一个用户（自动成为管理员）
      const allUsers = await fsListUserProfiles();
      const isFirst  = !allUsers || allUsers.length === 0;
      const role = isFirst ? 'admin' : 'pending';
      profile = {fs_user_id:userId, name:userName, email:userEmail, avatar_url:avatarUrl, role, reason:'', created_at:new Date().toISOString()};
      await fsCreateUserProfile(profile);
      if(!isFirst){
        opLogs.unshift({time:ts(), user:'系统', action:`新用户登录请求：${userName}（${userEmail}）`});
        saveData();
        showAuthOverlay('pending');
        return;
      }
      // 重新读取以获取 _recordId
      profile = await fsReadUserProfile(userId) || profile;
    }

    if(profile.role === 'pending'){ showAuthOverlay('pending'); return; }
    if(profile.role === 'revoked'){ showAuthOverlay('revoked'); return; }

    // 更新用户信息（如飞书头像/名字有变化）
    if(profile._recordId && (profile.name !== userName || profile.email !== userEmail)){
      fsUpdateUserProfile(profile._recordId, {name:userName, email:userEmail, avatar_url:avatarUrl}).catch(()=>{});
    }

    currentUser = {id:userId, name:userName, role:profile.role, email:userEmail};
    document.getElementById('auth-overlay').style.display='none';

async function checkPendingApprovals(){
  if(!isFsConfigured()) return;
  try{
    const cfg = getFsConfig(); if(!cfg.userTableId) return;
    const pending = await fsListUserProfilesByRole('pending');
    if(pending && pending.length>0)
      setTimeout(()=>showNotif(`有 ${pending.length} 个账号申请待审批，请前往「协作管理」处理`), 800);
  }catch(e){ console.warn('checkPendingApprovals failed', e); }
}

async function checkAuthState(){
  const sess = getFsSession();
  if(!sess || !sess.userId) return false;
  const now = Date.now();
  let accessToken = sess.accessToken;
  if(!accessToken || sess.tokenExp <= now + 60000){
    if(!sess.refreshToken){ clearFsSession(); return false; }
    try{
      const d = await refreshFsUserToken(sess.refreshToken);
      accessToken = d.access_token;
      saveFsSession({...sess, accessToken, refreshToken: d.refresh_token||sess.refreshToken,
        tokenExp: Date.now() + Math.max(0,(d.expires_in||7200)-120)*1000});
    }catch(e){ clearFsSession(); return false; }
  }
  try{
    const userInfo = await getFsUserInfo(accessToken);
    await handleAuthUser({...userInfo, open_id: sess.userId});
    return true;
  }catch(e){ console.warn('checkAuthState failed', e); clearFsSession(); return false; }
}

        </div>
        <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;overflow:hidden">
          ${pending.map(p=>`
            <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #fde68a">
              <div style="width:30px;height:30px;border-radius:50%;background:#fef9c3;color:#713f12;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${(p.name||'?')[0].toUpperCase()}</div>

                ${p.reason?`<div style="font-size:11px;color:var(--text2);margin-top:2px">申请说明：${p.reason}</div>`:''}
                <div style="font-size:10px;color:var(--text3);margin-top:1px">${(p.created_at||'').split('T')[0]} 申请</div>
              </div>
              <div style="display:flex;gap:5px;flex-shrink:0">
                <button class="btn sm" style="background:#dcfce7;color:#166534;border-color:#bbf7d0" onclick="approveUser('${p._recordId}','editor','${p.name}')">批准·编辑者</button>

      <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)">全部成员（${active.length}）</div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden">

async function approveUser(recordId, role, name){
  try{
    await fsUpdateUserProfile(recordId, {role});
    addLog(`审批通过了 ${name} 的申请，角色：${role==='editor'?'编辑者':'查看者'}`);
    showNotif(`已批准 ${name}，角色：${role==='editor'?'编辑者':'查看者'}`);
    loadAndRenderUsers();
  }catch(e){ showNotif(`操作失败：${e.message}`, true); }
}

async function rejectUser(recordId, name){
  try{
    await fsUpdateUserProfile(recordId, {role:'revoked'});
    addLog(`拒绝了 ${name} 的账号申请`);
    showNotif(`已拒绝 ${name} 的申请`);
    loadAndRenderUsers();
  }catch(e){ showNotif(`操作失败：${e.message}`, true); }
}

async function changeUserRole(recordId, role, name){
  try{
    await fsUpdateUserProfile(recordId, {role});
    const label={admin:'管理员',editor:'编辑者',viewer:'查看者',revoked:'撤销访问'};
    addLog(`将 ${name} 的权限修改为「${label[role]||role}」`);
    showNotif(`${name} 的权限已更新为：${label[role]||role}`);
    loadAndRenderUsers();
  }catch(e){ showNotif(`操作失败：${e.message}`, true); }
}

function showAuthOverlay(state){
  const overlay = document.getElementById('auth-overlay');
  if(!overlay) return;
  overlay.style.display = 'flex';
  ['aform-login','aform-pending','aform-noconfig'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const sub = document.getElementById('auth-sub-text');

  if(state === 'notconfigured'){
    if(sub) sub.textContent = '工具尚未配置';
    const el=document.getElementById('aform-noconfig'); if(el) el.style.display='';
  } else if(state === 'pending'){
    if(sub) sub.textContent = '账号待审批';
    const el=document.getElementById('aform-pending'); if(el) el.style.display='';
    const msg=el?.querySelector('.amsg');
    if(msg) msg.innerHTML='⏳ 您的账号正在等待管理员审批，审批通过后请刷新页面登录。<br><br>如有疑问请联系管理员。';
  } else if(state === 'revoked'){
    if(sub) sub.textContent = '访问已被撤销';
    const el=document.getElementById('aform-pending'); if(el) el.style.display='';
    const msg=el?.querySelector('.amsg');
    if(msg) msg.innerHTML='❌ 您的账号访问权限已被撤销，如有疑问请联系管理员。';
  } else {
    if(sub) sub.textContent = '请使用飞书账号登录';
    const el=document.getElementById('aform-login'); if(el) el.style.display='';
    const btn=document.getElementById('a-login-btn');
    if(btn){ btn.disabled=false; btn.innerHTML='<svg width="18" height="18" viewBox="0 0 200 200" fill="none"><path d="M100 10L20 55v90l80 45 80-45V55L100 10z" fill="#3370FF"/><path d="M100 10v180M20 55l80 45 80-45" stroke="white" stroke-width="8" stroke-linejoin="round"/></svg> 使用飞书账号登录'; }
  }
}

function getSnapshotRevision(d){
  const rev = Number(d?._meta?.revision || d?.savedAtMs || 0);
  if(Number.isFinite(rev) && rev > 0) return rev;
  const parsed = d?.savedAt ? Date.parse(String(d.savedAt).replace(' ','T')) : NaN;
  return Number.isFinite(parsed) ? parsed : 0;
}

function getAttachmentsSignature(src){
  const obj = src || {};
  return Object.keys(obj).sort().map(actId=>{
    const arr = Array.isArray(obj[actId]) ? obj[actId] : [];
    const items = arr.map(att=>[
      att.id || '',
      att.type || '',
      att.name || '',
      att.addedAt || '',
      att.size || 0,
      String(att.data || '').length
    ].join(':')).join(',');
    return `${actId}[${items}]`;
  }).join('|');
}

function shouldDelayCloudApply(){

async function refreshCloudState(opts){
  const options = opts || {};
  if(!_fsReady || !isFsConfigured()) return false;
  if(_syncBusy) return false;
  if(shouldDelayCloudApply() && !options.force){
    const alreadyDeferred = _syncDeferred;
    _syncDeferred = true;
    if(options.notify !== false && !alreadyDeferred){
      showNotif(document.getElementById('modal-overlay')
        ? '检测到团队更新，关闭当前弹窗后会自动刷新'
        : '检测到团队更新，当前修改保存后会自动刷新');
    }
    return false;
  }

  if(_saveTimer){
    clearTimeout(_saveTimer);
    _saveTimer = null;
    try{ await _doSave(); }catch(e){ console.warn('Pre-refresh flush failed', e); }
    return true;
  }

  _syncBusy = true;
  try{
    const cloud = await fsReadRecord('main_data');
    if(!cloud) return false;
    await fsReadAttachments();
    const nextRev = getSnapshotRevision(cloud);
    const nextAttSig = getAttachmentsSignature(attachments);
    const changed = !!options.force || nextRev > _syncLastMainRev || nextAttSig !== _syncLastAttachmentSig;
    if(!changed) return false;
    const ownMainWrite = nextRev && nextRev === _lastLocalSaveRev;
    const ownAttachmentWrite = nextAttSig && nextAttSig === _lastLocalAttachmentSig;

    applySnapshot(cloud, { merge: true });
    persistSnapshotToLocal(buildSnapshot());
    _syncLastMainRev = nextRev;
    _syncLastAttachmentSig = nextAttSig;
    updateTopbarUser();
    if(currentUser.id) renderMain();
    updateBarTs();
    setBarState('cloud', ownMainWrite || ownAttachmentWrite ? '云端已连接（飞书多维表格）' : `已接收团队更新 · ${ts()}`);
    if(options.notify !== false && !ownMainWrite && !ownAttachmentWrite){
      showNotif(options.message || '检测到团队更新，页面已自动刷新');
    }
    return true;
  }catch(e){
    console.warn('Cloud refresh failed', e);
    if(options.reportError) setBarState('error', `云端同步检查失败：${e.message}`);
    return false;
  }finally{
    _syncBusy = false;
  }
}

function scheduleCloudRefresh(reason, opts){
  const options = opts || {};
  if(!_fsReady || !isFsConfigured()) return;
  if(_syncReloadTimer) clearTimeout(_syncReloadTimer);
  _syncReloadTimer = setTimeout(()=>{
    refreshCloudState({
      force: !!options.force,
      notify: options.notify,
      message: options.message,
      reportError: !!options.reportError,
      reason
    });
  }, reason === 'poll' ? 0 : 250);
}

function flushDeferredCloudRefresh(){
  if(!_syncDeferred) return;
  _syncDeferred = false;
  scheduleCloudRefresh('deferred', { notify:true, message:'已应用团队刚刚的更新' });
}

function stopCloudSync(){
  if(_syncReloadTimer){ clearTimeout(_syncReloadTimer); _syncReloadTimer = null; }
  if(_syncPollTimer){ clearInterval(_syncPollTimer); _syncPollTimer = null; }
}

function startCloudSync(){
  if(!_fsReady || !isFsConfigured() || !currentUser.id) return;
  stopCloudSync();
  const local = lsLoad() || {};
  if(local._snapshot) _syncLastMainRev = getSnapshotRevision(local._snapshot);
  _syncLastAttachmentSig = getAttachmentsSignature(local._attachments || attachments);
  _syncPollTimer = setInterval(()=>{
    if(document.hidden) return;
    scheduleCloudRefresh('poll', { notify:false });
  }, CLOUD_SYNC_POLL_MS);
  if(!_syncVisibilityBound){
    document.addEventListener('visibilitychange', ()=>{
      if(!document.hidden) scheduleCloudRefresh('focus', { notify:false });
    });
    _syncVisibilityBound = true;
  }
  scheduleCloudRefresh('sync-start', { notify:false });
}

// ─── Snapshot ───
function buildSnapshot(){
  // Attachments saved separately — keep main snapshot small
  const revision = Date.now();
  // Prune tombstones older than 30 days to keep snapshot lean
  const cutoff = Date.now() - 30*24*60*60*1000;
  const prunedDeleted = {};
  Object.entries(_deletedKeys).forEach(([k,ts])=>{ if(ts>cutoff) prunedDeleted[k]=ts; });
  _deletedKeys = prunedDeleted;
  return { activities:activities.map(normalizeActivity), GAMES, ACT_TYPES, TYPE_COLORS,
           GAME_CATS, GAME_CAT_COLORS, GAME_CAT_TEXT,
           opLogs:opLogs.slice(0,300),
           reports, REPORT_TAGS, REPORT_TAG_COLORS,
           _deletedKeys,
           savedAt:ts(), savedAtMs:revision,
           _meta:{ revision, clientId:getClientId(), userId:currentUser.id||'', userName:currentUser.name||'' } };
}

// Merge two activity arrays.
// localWins=true  → used when SAVING: our edits are authoritative, also absorb remote-only additions.
// localWins=false → used when LOADING: remote wins for shared records, keep local-only additions.
// tombstones (_deletedKeys) prevent deleted items from being resurrected.
function mergeActivities(localActs, remoteActs, deletedKeys, localWins){
  const tombstones = deletedKeys || _deletedKeys || {};
  const remoteMap = new Map();
  (remoteActs||[]).forEach(a=>{
    const norm = normalizeActivity(a);
    const k = getActivityRef(norm);
    if(k && !tombstones[k]) remoteMap.set(k, norm);
  });
  const localMap = new Map();
  (localActs||[]).forEach(a=>{
    const k = getActivityRef(a);
    if(k && !tombstones[k]) localMap.set(k, a);
  });

  if(localWins){
    // SAVE scenario: local is authoritative for additions/edits.
    // Start with local activities (local wins for shared records).
    const merged = [...localMap.values()].map(a => normalizeActivity(a));
    // Absorb remote-only activities (teammate's new additions not yet in our local).
    remoteMap.forEach((act, key)=>{
      if(!localMap.has(key)) merged.push(act);
    });
    return merged;
  } else {
    // LOAD scenario: remote wins for shared records.
    // Start with all remote activities.
    const merged = [...remoteMap.values()];
    // Add local-only activities (not yet pushed to cloud — new local additions).
    localMap.forEach((act, key)=>{
      if(!remoteMap.has(key)) merged.unshift(normalizeActivity(act));
    });
    return merged;
  }
}

function applySnapshot(d, opts){
  if(!d) return false;
  const merge = opts && opts.merge;
  const localWins = opts && opts.localWins;

  // Always merge tombstones from incoming snapshot — union of all clients' deletions
  if(d._deletedKeys && typeof d._deletedKeys === 'object'){
    Object.entries(d._deletedKeys).forEach(([k,ts])=>{
      if(!_deletedKeys[k] || ts > _deletedKeys[k]) _deletedKeys[k] = ts;
    });
  }

  if(Array.isArray(d.activities)){
    if(merge && activities.length > 0){
      // Pass merged tombstone set so merge respects all known deletions.
      // localWins=true when our local snapshot is newer (unsaved edit before refresh).
      activities = mergeActivities(activities, d.activities, _deletedKeys, localWins);
    } else {
      // Full replace — still filter out tombstoned items
      activities = d.activities.map(normalizeActivity).filter(a=>!_deletedKeys[getActivityRef(a)]);
    }
  }
  if(Array.isArray(d.GAMES)&&d.GAMES.length) GAMES=d.GAMES;
  if(Array.isArray(d.ACT_TYPES)&&d.ACT_TYPES.length) ACT_TYPES=d.ACT_TYPES;
  if(d.TYPE_COLORS)     Object.assign(TYPE_COLORS,d.TYPE_COLORS);
  if(d.GAME_CATS)       Object.assign(GAME_CATS,d.GAME_CATS);
  if(d.GAME_CAT_COLORS) Object.assign(GAME_CAT_COLORS,d.GAME_CAT_COLORS);
  if(d.GAME_CAT_TEXT)   Object.assign(GAME_CAT_TEXT,d.GAME_CAT_TEXT);
  if(Array.isArray(d.opLogs)) opLogs=d.opLogs;
  // attachments loaded separately via fsReadAttachments()
  if(Array.isArray(d.reports)) reports=d.reports;
  if(Array.isArray(d.REPORT_TAGS)&&d.REPORT_TAGS.length) REPORT_TAGS=d.REPORT_TAGS;
  if(d.REPORT_TAG_COLORS) Object.assign(REPORT_TAG_COLORS,d.REPORT_TAG_COLORS);
  return true;
}

async function fsBitableReq(method, path, body){
  const token = await getFsTenantToken();
  const opts = {
    method,
    headers: {'Authorization':'Bearer '+token, 'Content-Type':'application/json; charset=utf-8'}
  };
  if(body != null) opts.body = JSON.stringify(body);
  const r = await fetch(`${FS_API}${path}`, opts);
  if(!r.ok){ const t=await r.text(); throw new Error(`飞书 API ${r.status}: ${t.slice(0,120)}`); }
  const d = await r.json();
  if(d.code !== 0) throw new Error(`飞书 API 错误 (${d.code}): ${d.msg}`);
  return d.data || d;
}

// 通过 rid 字段查找记录，返回 {recordId, fields} 或 null
async function fsGetRecordByRid(tableId, rid){
  const cfg = getFsConfig();
  const filter = encodeURIComponent(`CurrentValue.[rid]="${rid}"`);
  const d = await fsBitableReq('GET', `/bitable/v1/apps/${cfg.bitableToken}/tables/${tableId}/records?filter=${filter}&page_size=1`);
  if(!d.items || d.items.length===0) return null;
  return {recordId: d.items[0].record_id, fields: d.items[0].fields};
}

// 读取数据记录（返回 payload 解析后的对象，或 null）
async function fsReadRecord(rid){
  const cfg = getFsConfig();
  if(_fsRecordIdCache[rid]){
    try{
      const d = await fsBitableReq('GET', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.tableId}/records/${_fsRecordIdCache[rid]}`);
      const raw = d.record?.fields?.payload || d.fields?.payload;
      if(raw) return JSON.parse(Array.isArray(raw) ? (raw[0]?.text||raw[0]||'') : raw);
    }catch(e){ delete _fsRecordIdCache[rid]; }
  }
  const rec = await fsGetRecordByRid(cfg.tableId, rid);
  if(!rec) return null;
  _fsRecordIdCache[rid] = rec.recordId;
  const raw = rec.fields.payload;
  const str = Array.isArray(raw) ? (raw[0]?.text||raw[0]||'') : (raw||'');
  return str ? JSON.parse(str) : null;
}

// 写入/更新数据记录（upsert）
async function fsUpsertRecord(rid, dataObj){
  const cfg = getFsConfig();
  const payload = JSON.stringify(dataObj);
  if(_fsRecordIdCache[rid]){
    await fsBitableReq('PUT', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.tableId}/records/${_fsRecordIdCache[rid]}`, {fields:{rid,payload}});
    return;
  }
  const existing = await fsGetRecordByRid(cfg.tableId, rid);
  if(existing){
    _fsRecordIdCache[rid] = existing.recordId;
    await fsBitableReq('PUT', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.tableId}/records/${existing.recordId}`, {fields:{rid,payload}});
  } else {
    const d = await fsBitableReq('POST', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.tableId}/records`, {fields:{rid,payload}});
    _fsRecordIdCache[rid] = d.record?.record_id;
  }
}

// 删除数据记录
async function fsDeleteRecord(rid){
  const cfg = getFsConfig();
  let recordId = _fsRecordIdCache[rid];
  if(!recordId){ const rec=await fsGetRecordByRid(cfg.tableId,rid); if(!rec) return; recordId=rec.recordId; }
  await fsBitableReq('DELETE', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.tableId}/records/${recordId}`);
  delete _fsRecordIdCache[rid];
}

// 读取所有附件记录（rid 以 att_ 开头）
async function fsReadAttachments(){
  const cfg = getFsConfig();
  const filter = encodeURIComponent('CurrentValue.[rid].contains("att_")');
  let allItems=[], pageToken='';
  do{
    const url = `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.tableId}/records?filter=${filter}&page_size=100${pageToken?'&page_token='+pageToken:''}`;
    const d = await fsBitableReq('GET', url);
    if(d.items) allItems.push(...d.items);
    pageToken = d.has_more ? d.page_token : '';
  }while(pageToken);

  const nextAttachments = {};
  allItems.forEach(item=>{
    const rid = item.fields?.rid;
    if(!rid||!String(rid).startsWith('att_')) return;
    _fsRecordIdCache[rid] = item.record_id;
    const actId = String(rid).slice(4);
    const raw = item.fields?.payload;
    const str = Array.isArray(raw) ? (raw[0]?.text||raw[0]||'') : (raw||'');
    if(str) try{ const a=JSON.parse(str); if(Array.isArray(a)&&a.length) nextAttachments[actId]=a; }catch(e){}
  });
  attachments = nextAttachments;
  return { items: attachments, signature: getAttachmentsSignature(attachments) };
}

// 保存指定活动的附件
async function fsSaveAttachments(actId){
  if(!_fsReady || !isFsConfigured()) return;
  const atts = attachments[actId];
  if(!atts || !atts.length){ try{ await fsDeleteRecord(`att_${actId}`); }catch(e){} return; }
  await fsUpsertRecord(`att_${actId}`, atts);
}

// ── 用户 Profile 操作（多维表格用户表）──
async function fsReadUserProfile(fsUserId){
  const cfg = getFsConfig(); if(!cfg.userTableId) return null;
  const filter = encodeURIComponent(`CurrentValue.[fs_user_id]="${fsUserId}"`);
  const d = await fsBitableReq('GET', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.userTableId}/records?filter=${filter}&page_size=1`);
  if(!d.items || d.items.length===0) return null;
  const item = d.items[0];
  const fields = item.fields || {};
  const flatten = v => Array.isArray(v) ? (v[0]?.text??v[0]??'') : (v??'');
  return {_recordId:item.record_id, fs_user_id:flatten(fields.fs_user_id), name:flatten(fields.name),
    email:flatten(fields.email), role:flatten(fields.role), reason:flatten(fields.reason),
    avatar_url:flatten(fields.avatar_url), created_at:flatten(fields.created_at)};
}

async function fsListUserProfiles(){
  const cfg = getFsConfig(); if(!cfg.userTableId) return [];
  let allItems=[], pageToken='';
  do{
    const url = `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.userTableId}/records?page_size=100${pageToken?'&page_token='+pageToken:''}`;
    const d = await fsBitableReq('GET', url);
    if(d.items) allItems.push(...d.items);
    pageToken = d.has_more ? d.page_token : '';
  }while(pageToken);
  const flatten = v => Array.isArray(v) ? (v[0]?.text??v[0]??'') : (v??'');
  return allItems.map(item=>{
    const f=item.fields||{};
    return {_recordId:item.record_id, fs_user_id:flatten(f.fs_user_id), name:flatten(f.name),
      email:flatten(f.email), role:flatten(f.role), reason:flatten(f.reason),
      avatar_url:flatten(f.avatar_url), created_at:flatten(f.created_at)};
  });
}

async function fsListUserProfilesByRole(role){
  const all = await fsListUserProfiles();
  return all.filter(p=>p.role===role);
}

async function fsCreateUserProfile(profile){
  const cfg = getFsConfig(); if(!cfg.userTableId) return;
  const d = await fsBitableReq('POST', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.userTableId}/records`, {fields:profile});
  return d.record?.record_id;
}

async function fsUpdateUserProfile(recordId, fields){
  const cfg = getFsConfig(); if(!cfg.userTableId||!recordId) return;
  await fsBitableReq('PUT', `/bitable/v1/apps/${cfg.bitableToken}/tables/${cfg.userTableId}/records/${recordId}`, {fields});
}

// ─── Load ───
async function loadData(){
  let local = lsLoad();
  if(local && local._snapshot)    applySnapshot(local._snapshot);
  if(local && local._attachments) Object.assign(attachments, local._attachments);
  if(local && local._ui) applyUiState(local._ui);

  // 优先使用 HTML 中硬编码的值，其次用 localStorage 中保存的值
  if(!_fsAppId            && local?._fsAppId)            _fsAppId            = local._fsAppId;
  if(!_fsAppSecret        && local?._fsAppSecret)        _fsAppSecret        = local._fsAppSecret;
  if(!_fsBitableToken     && local?._fsBitableToken)     _fsBitableToken     = local._fsBitableToken;
  if(!_fsTableId          && local?._fsTableId)          _fsTableId          = local._fsTableId;
  if(!_fsUserTableId      && local?._fsUserTableId)      _fsUserTableId      = local._fsUserTableId;
  if(!_fsDriveFolderToken && local?._fsDriveFolderToken) _fsDriveFolderToken = local._fsDriveFolderToken;

  if(isFsConfigured()){
    try{
      const cloud = await fsReadRecord('main_data');
      if(cloud && cloud.savedAt){
        const cloudRev = getSnapshotRevision(cloud);
        const localRev = local?._snapshot ? getSnapshotRevision(local._snapshot) : 0;
        applySnapshot(cloud, { merge: true, localWins: localRev > cloudRev });
      }
      _fsReady = true;
      if(cloud) persistSnapshotToLocal(buildSnapshot());
      updateSyncMarkers(cloud || local?._snapshot || {});
      setBarState('cloud','云端已连接（飞书多维表格）');
      fsReadAttachments().then(()=>{
        const latest = lsLoad() || {};
        latest._attachments = attachments;
        lsSave(latest);
        _syncLastAttachmentSig = getAttachmentsSignature(attachments);
        if(currentUser.id) renderMain();
      }).catch(e=>console.warn('附件加载失败', e));
    }catch(e){
      console.warn('飞书数据加载失败', e);
      setBarState('error',`云端读取失败，使用本地数据（${e.message}）`);
    }
    return true;
  }

  if(local && local._snapshot){
    setBarState('local','本地自动保存已启用，数据刷新后不丢失');
    return true;
  }
  setBarState('local','本地自动保存已启用 · 可在「存储设置」中接入飞书多维表格云端');
  return false;
}

// ─── Save ───
async function saveData(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_doSave, 800);
}

// 附件修改后调用（本地+云端同步）
async function saveAttachmentsFor(actId){
  const local = lsLoad()||{};
  local._attachments = attachments;
  lsSave(local);
  if(_fsReady && isFsConfigured()){
    _lastLocalAttachmentSig = getAttachmentsSignature(attachments);
    fsSaveAttachments(actId).catch(e=>{
      console.warn('附件云端同步失败', e);
      showNotif(`附件云端同步失败（本地已保存）: ${e.message}`, true);
    }).finally(()=>{ _syncLastAttachmentSig = _lastLocalAttachmentSig; });
  }
}

async function _doSave(){
  _saveTimer = null;
  if(!_fsReady || !isFsConfigured()){
    const snapshot = buildSnapshot();
    _lastLocalSaveRev = getSnapshotRevision(snapshot);
    persistSnapshotToLocal(snapshot);
    updateBarTs();
    setBarState('local');
    return;
  }

  setBarState('saving');
  try{
    // 先读云端最新数据，合并本地修改后再写入，防止覆盖队友的改动
    let base = null;
    try{ base = await fsReadRecord('main_data'); }catch(e){ console.warn('Pre-save read failed', e); }

    let finalActivities;
    if(base && base.savedAtMs){
      if(base._deletedKeys && typeof base._deletedKeys==='object'){
        Object.entries(base._deletedKeys).forEach(([k,t])=>{ if(!_deletedKeys[k]||t>_deletedKeys[k]) _deletedKeys[k]=t; });
      }
      finalActivities = mergeActivities(activities, base.activities||[], _deletedKeys, true);
    } else {
      finalActivities = activities.map(normalizeActivity).filter(a=>!_deletedKeys[getActivityRef(a)]);
    }

    const savedActivities = activities;
    activities = finalActivities;
    const snapshot = buildSnapshot();
    activities = savedActivities;

    _lastLocalSaveRev = getSnapshotRevision(snapshot);
    persistSnapshotToLocal(snapshot);
    updateBarTs();

    await fsUpsertRecord('main_data', snapshot);
    _syncLastMainRev = _lastLocalSaveRev;
    _syncLastAttachmentSig = getAttachmentsSignature(attachments);
    setBarState('saved', `已同步到云端 · ${ts()}`);
    activities = finalActivities;
    flushDeferredCloudRefresh();
  }catch(e){
    console.warn('飞书保存失败', e);
    const snapshot = buildSnapshot();
    persistSnapshotToLocal(snapshot);
    setBarState('error', `云端同步失败（本地已保存）: ${e.message}`);
  }
}

async function doConnectCloud(){
  const appId            = (document.getElementById('fs-app-id').value||'').trim();
  const appSecret        = (document.getElementById('fs-app-secret').value||'').trim();
  const bitableToken     = (document.getElementById('fs-bitable-token').value||'').trim();
  const tableId          = (document.getElementById('fs-table-id').value||'').trim();
  const userTableId      = (document.getElementById('fs-user-table-id').value||'').trim();
  const driveFolderToken = (document.getElementById('fs-drive-folder')?.value||'').trim();
  if(!appId||!appSecret||!bitableToken||!tableId||!userTableId){
    showNotif('请填写所有必填字段', true); return;
  }

  closeModal();
  setBarState('loading','正在测试飞书连接…');

  _fsAppId=appId; _fsAppSecret=appSecret; _fsBitableToken=bitableToken;
  _fsTableId=tableId; _fsUserTableId=userTableId; _fsDriveFolderToken=driveFolderToken;
  _fsTenantToken=''; _fsTenantTokenExp=0;

  try{
    const token = await getFsTenantToken();
    if(!token) throw new Error('无法获取飞书 Token，请检查 App ID 和 App Secret');

    // 保存配置到 localStorage
    const local = lsLoad() || {};
    Object.assign(local, {_fsAppId:appId, _fsAppSecret:appSecret, _fsBitableToken:bitableToken,
                           _fsTableId:tableId, _fsUserTableId:userTableId, _fsDriveFolderToken:driveFolderToken});
    lsSave(local);

    // 将当前数据上传到飞书
    await fsUpsertRecord('main_data', buildSnapshot());
    _fsReady=true;

    const driveNote = driveFolderToken ? '，图片将存入云空间' : '';
    setBarState('cloud','云端已连接！数据已上传到飞书多维表格');
    showNotif(`🎉 飞书多维表格连接成功${driveNote}！团队成员用飞书账号登录后即可协作`);
    startCloudSync();
  }catch(e){
    _fsAppId=''; _fsAppSecret=''; _fsBitableToken=''; _fsTableId=''; _fsUserTableId=''; _fsDriveFolderToken='';
    _fsReady=false;
    setBarState('error','连接失败：'+e.message);
    showNotif('连接失败：'+e.message, true);
  }
}

function disconnectCloud(){
  stopCloudSync();
  const local=lsLoad()||{};
  ['_fsAppId','_fsAppSecret','_fsBitableToken','_fsTableId','_fsUserTableId','_fsDriveFolderToken'].forEach(k=>delete local[k]);
  lsSave(local);
  _fsAppId=''; _fsAppSecret=''; _fsBitableToken=''; _fsTableId=''; _fsUserTableId=''; _fsDriveFolderToken='';
  _fsReady=false; _fsFileCache={};
  closeModal();
  setBarState('local');
  showNotif('已断开云端，切换为本地存储模式');
}

function renderCalendarView(container){
  const year=calYear, month=calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const gameActs=activities.filter(a=>a.game===calGame);
  const cats=GAME_CATS[calGame]||[];
  const catColors=GAME_CAT_COLORS[calGame]||[];
  const catTexts=GAME_CAT_TEXT[calGame]||[];

  // build days array
  const days=[];
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    const dow=dt.getDay();
    days.push({d,dow,isWe:dow===0||dow===6,isToday:year===TODAY.getFullYear()&&month===TODAY.getMonth()&&d===TODAY.getDate()});
  }
  const totalW=days.length*50; // var(--day-w)=50px

  // week labels for header
  function buildWeekBlocks(){
    const blocks=[];let cur=null;
    days.forEach(day=>{
      const weekNum=getWeekNum(new Date(year,month,day.d));
      if(!cur||cur.wn!==weekNum){
        if(cur)blocks.push(cur);
        cur={wn:weekNum,start:day.d,count:1};
      } else {cur.count++;}
    });
    if(cur)blocks.push(cur);
    return blocks;
  }
  function getWeekNum(d){
    const jan1=new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  }
  const weekBlocks=buildWeekBlocks();

  // compute bar left/width in px given day column positions
  function barGeom(startStr,endStr){
    const s=new Date(startStr), e=new Date(endStr);
    const mStart=new Date(year,month,1), mEnd=new Date(year,month,daysInMonth,23,59,59);
    if(s>mEnd||e<mStart)return null;
    const sd=Math.max(1,(s<mStart?1:s.getDate()));
    const ed=Math.min(daysInMonth,(e>mEnd?daysInMonth:e.getDate()));
    const left=(sd-1)*50;
    const width=(ed-sd+1)*50-2;
    return{left,width};
  }

  // ── Row splitting: detect overlapping bars and assign to sub-rows ──
  // Two activities "overlap in the calendar" if their visible date ranges intersect this month.
  function actsOverlap(a, b){
    const mStart=new Date(year,month,1), mEnd=new Date(year,month,daysInMonth,23,59,59);
    const as=new Date(a.startTime), ae=new Date(a.endTime);
    const bs=new Date(b.startTime), be=new Date(b.endTime);
    const visAs=as<mStart?mStart:as, visAe=ae>mEnd?mEnd:ae;
    const visBs=bs<mStart?mStart:bs, visBe=be>mEnd?mEnd:be;
    if(visAs>mEnd||visAe<mStart||visBs>mEnd||visBe<mStart)return false;
    return visAs<=visBe && visBs<=visAe;
  }

  // Pack acts into non-overlapping sub-rows using greedy interval packing
  function packIntoSubRows(acts){
    const subRows=[]; // each subRow is array of acts
    acts.forEach(act=>{
      // find first subRow where act doesn't overlap any existing act
      let placed=false;
      for(const sr of subRows){
        if(!sr.some(existing=>actsOverlap(act,existing))){
          sr.push(act);placed=true;break;
        }
      }
      if(!placed) subRows.push([act]);
    });
    return subRows;
  }

  // build flat row list with cat separators — each type row may expand into multiple sub-rows
  const rowItems=[];
  cats.forEach((catDef,ci)=>{
    rowItems.push({type:'cat',label:catDef.cat,ci});
    catDef.rows.forEach(rowDef=>{
      const rowActs=gameActs.filter(a=>rowDef.types.includes(a.type));
      // filter to acts visible this month
      const visActs=rowActs.filter(a=>{
        const s=new Date(a.startTime),e=new Date(a.endTime);
        return s<=new Date(year,month,daysInMonth,23,59,59)&&e>=new Date(year,month,1);
      });
      const subRows=visActs.length>0?packIntoSubRows(visActs):[];
      if(subRows.length===0){
        // empty row — show one blank row
        rowItems.push({type:'row',label:rowDef.label,acts:[],types:rowDef.types,ci,subRowIdx:0,totalSubRows:1,allActs:rowActs});
      } else {
        subRows.forEach((srActs,sri)=>{
          rowItems.push({
            type:'row',
            label:sri===0?rowDef.label:'',  // label only on first sub-row
            acts:srActs,
            types:rowDef.types,
            ci,
            subRowIdx:sri,
            totalSubRows:subRows.length,
            allActs:rowActs
          });
        });
      }
    });
  });

  // render game tabs
  const gameTabs=GAMES.map(g=>`<div class="game-tab ${g===calGame?'active':''}" onclick="switchCalGame('${g}')">${g}</div>`).join('');

  // Month names
  const mNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  // Left column HTML
  let leftTop=`<div class="left-top">活动类型</div>`;
  let leftRows='';
  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=catColors[item.ci%catColors.length]||'#f3f4f6';
      const tc=catTexts[item.ci%catTexts.length]||'#374151';
      leftRows+=`<div class="left-cat-header" style="background:${bg};color:${tc}">${item.label}</div>`;
    } else {
      // For sub-rows after the first, show a continuation indicator
      if(item.subRowIdx===0){
        // first sub-row: show label, with row-count badge if multiple
        const badge=item.totalSubRows>1
          ?`<span style="margin-left:4px;font-size:9px;background:var(--bg3);color:var(--text3);padding:1px 5px;border-radius:8px">${item.totalSubRows}</span>`
          :'';
        leftRows+=`<div class="left-row" title="${item.label}">${item.label}${badge}</div>`;
      } else {
        // continuation row — subtle indent indicator
        leftRows+=`<div class="left-row" style="opacity:.55;font-size:10px;padding-left:18px">↳ 续行 ${item.subRowIdx+1}</div>`;
      }
    }
  });

  // Right column header HTML
  let weekHeaderHtml='';
  weekBlocks.forEach(wb=>{
    weekHeaderHtml+=`<div class="week-block" style="width:${wb.count*50}px">W${wb.wn}</div>`;
  });
  const DOW_EN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let dayHeaderHtml='';
  days.forEach(day=>{
    const cls=(day.isWe?'weekend':'')+(day.isToday?' today':'');
    const dowStr=DOW_EN[day.dow];
    dayHeaderHtml+=`<div class="day-hcell ${cls}" style="flex-direction:column;gap:1px">
      <span>${day.d}</span>
      <span style="font-size:9px;opacity:.7">${dowStr}</span>
    </div>`;
  });

  // Right body rows HTML
  let rightBodyHtml='';
  // Today line position
  const todayPos=TODAY.getFullYear()===year&&TODAY.getMonth()===month?(TODAY.getDate()-1)*50+25:-1;

  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=catColors[item.ci%catColors.length]||'#f3f4f6';
      let dayCells='';
      days.forEach(day=>{
        dayCells+=`<div class="day-bg" style="background:${bg};opacity:.5"></div>`;
      });
      rightBodyHtml+=`<div class="right-cat-header" style="background:${bg};opacity:.7">${dayCells}</div>`;
    } else {
      let dayCells='';
      days.forEach(day=>{
        const cls=(day.isWe?' weekend':'')+(day.isToday?' today':'');
        dayCells+=`<div class="day-bg${cls}"></div>`;
      });
      // bars for this row
      let bars='';
      item.acts.forEach(act=>{
        // main bar
        const geom=barGeom(act.startTime,act.endTime);
        if(geom){
          const c=TYPE_COLORS[act.type]||{bg:'#e5e7eb',text:'#374151',border:'#9ca3af'};
          const escaped=act.name.replace(/'/g,"\\'");
          const starMark=act.important?'⭐ ':'';
          const importantStyle=act.important?`box-shadow:0 0 0 2px #f59e0b;font-weight:600;`:'';
          bars+=`<div class="act-bar" style="left:${geom.left}px;width:${geom.width}px;background:${c.bg};color:${c.text};border:1px solid ${c.border};${importantStyle}" 
            onmouseenter="showTip(event,'${getActivityRef(act)}')" onmouseleave="hideTip()" onclick="showDetail('${getActivityRef(act)}')">${starMark}${act.name}</div>`;
        }
        // preheat bar
        if(act.preheat){
          const pGeom=barGeom(act.preheat,act.startTime);
          if(pGeom&&pGeom.width>4){
            const c=TYPE_COLORS[act.type]||{border:'#9ca3af',text:'#6b7280'};
            bars+=`<div class="preheat-bar" style="left:${pGeom.left}px;width:${pGeom.width-2}px;border-color:${c.border};color:${c.text}" 
              onmouseenter="showTip(event,'${getActivityRef(act)}','preheat')" onmouseleave="hideTip()">预热</div>`;
          }
        }
      });
      rightBodyHtml+=`<div class="right-row">
        ${dayCells}
        ${bars}
        ${todayPos>=0?`<div class="today-line" style="left:${todayPos}px"></div>`:''}
      </div>`;
    }
  });

  container.innerHTML=`
  <div class="cal-view">
    <div class="cal-toolbar">
      <div class="cal-title">${year}年 ${mNames[month]} — ${calGame}</div>
      <div class="game-switcher">${gameTabs}</div>
      <div class="month-nav">
        <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
        <span class="mnav-label">${year}/${month+1}</span>
        <button class="mnav-btn" onclick="changeMonth(1)">›</button>
        <button class="btn sm" onclick="goToToday()" style="margin-left:4px">今天</button>
        <button class="btn sm" onclick="showModal('add')" style="margin-left:4px">+ 新增</button>
        <button class="btn sm" onclick="exportCalendarToExcel()" style="margin-left:4px;color:#14532d;border-color:#86efac">⬇ 导出Excel</button>
      </div>
    </div>
    <div class="gantt-container" id="ganttContainer">
      <div class="gantt-left" id="ganttLeft">
        ${leftTop}
        <div class="left-rows" id="leftRows">${leftRows}</div>
      </div>
      <div class="gantt-right" id="ganttRight">
        <div class="gantt-right-inner" style="width:${totalW}px">
          <div class="right-header">
            <div class="week-header-row">${weekHeaderHtml}</div>
            <div class="day-header-row">${dayHeaderHtml}</div>
          </div>
          <div id="rightBody">${rightBodyHtml}</div>
        </div>
      </div>
    </div>
  </div>`;

  // sync scroll between left and right
  const gr=document.getElementById('ganttRight');
  const lr=document.getElementById('leftRows');
  if(gr&&lr){
    gr.addEventListener('scroll',()=>{lr.scrollTop=gr.scrollTop});
    // Auto-scroll to show today (or first day if today is not in this month)
    if(todayPos>=0){
      setTimeout(()=>{gr.scrollLeft=Math.max(0,todayPos-Math.floor(gr.clientWidth/3));},0);
    }
  }
}

// ===================== EXPORT CALENDAR TO EXCEL =====================
async function exportCalendarToExcel(){
  showNotif('正在生成Excel，请稍候…');
  // Lazy-load xlsx-js-style (supports cell fill colors & borders)
  await new Promise((resolve,reject)=>{
    if(window.XLSXStyle){resolve();return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
    s.onload=()=>{window.XLSXStyle=window.XLSX;resolve();};
    s.onerror=reject;
    document.head.appendChild(s);
  });

  const year=calYear, month=calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const cats=GAME_CATS[calGame]||[];
  const catColors=GAME_CAT_COLORS[calGame]||[];
  const catTexts=GAME_CAT_TEXT[calGame]||[];
  const gameActs=activities.filter(a=>a.game===calGame);

  // Build days array
  const DOW_ZH=['日','一','二','三','四','五','六'];
  const days=[];
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    days.push({d,dow:dt.getDay(),isWe:dt.getDay()===0||dt.getDay()===6,
      isToday:year===TODAY.getFullYear()&&month===TODAY.getMonth()&&d===TODAY.getDate()});
  }

  // Week blocks
  function _weekNum(d){const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
  const weekBlocks=[];let _cur=null;
  days.forEach(day=>{
    const wn=_weekNum(new Date(year,month,day.d));
    if(!_cur||_cur.wn!==wn){if(_cur)weekBlocks.push(_cur);_cur={wn,startDay:day.d,count:1};}
    else _cur.count++;
  });
  if(_cur)weekBlocks.push(_cur);

  // Overlap & pack helpers
  function _actsOverlap(a,b){
    const mS=new Date(year,month,1),mE=new Date(year,month,daysInMonth,23,59,59);
    const as=new Date(a.startTime),ae=new Date(a.endTime);
    const bs=new Date(b.startTime),be=new Date(b.endTime);
    const vAs=as<mS?mS:as,vAe=ae>mE?mE:ae;
    const vBs=bs<mS?mS:bs,vBe=be>mE?mE:be;
    if(vAs>mE||vAe<mS||vBs>mE||vBe<mS)return false;
    return vAs<=vBe&&vBs<=vAe;
  }
  function _pack(acts){
    const rows=[];
    acts.forEach(act=>{
      let placed=false;
      for(const row of rows){if(!row.some(e=>_actsOverlap(act,e))){row.push(act);placed=true;break;}}
      if(!placed)rows.push([act]);
    });
    return rows;
  }

  // Build rowItems
  const rowItems=[];
  cats.forEach((catDef,ci)=>{
    rowItems.push({type:'cat',label:catDef.cat,ci});
    catDef.rows.forEach(rowDef=>{
      const rowActs=gameActs.filter(a=>rowDef.types.includes(a.type));
      const visActs=rowActs.filter(a=>{
        const s=new Date(a.startTime),e=new Date(a.endTime);
        return s<=new Date(year,month,daysInMonth,23,59,59)&&e>=new Date(year,month,1);
      });
      const subRows=visActs.length>0?_pack(visActs):[];
      if(subRows.length===0){
        rowItems.push({type:'row',label:rowDef.label,acts:[],ci,subRowIdx:0});
      } else {
        subRows.forEach((srActs,sri)=>{
          rowItems.push({type:'row',label:sri===0?rowDef.label:'↳',acts:srActs,ci,subRowIdx:sri});
        });
      }
    });
  });

  // Helpers
  function hex2argb(h){const c=h.replace('#','');return'FF'+(c.length===6?c:c.slice(0,6)).toUpperCase();}
  function barDays(startStr,endStr){
    const s=new Date(startStr),e=new Date(endStr);
    const mS=new Date(year,month,1),mE=new Date(year,month,daysInMonth,23,59,59);
    if(s>mE||e<mS)return null;
    return{sd:Math.max(1,s<mS?1:s.getDate()),ed:Math.min(daysInMonth,e>mE?daysInMonth:e.getDate())};
  }

  // Worksheet build
  const ws={};
  const merges=[];
  const colWidths=[{wch:16}];
  for(let i=0;i<daysInMonth;i++)colWidths.push({wch:5.5});
  const rowHeights=[];

  const bdrGray={style:'thin',color:{rgb:'D0D0CE'}};
  const bdrBase={top:bdrGray,bottom:bdrGray,left:bdrGray,right:bdrGray};

  function sc(r,c,val,style){
    const addr=XLSXStyle.utils.encode_cell({r,c});
    ws[addr]={v:val,t:'s',s:style||{}};
  }
  // Fill a row of cells with same style (for merged visual blocks)
  function fillRow(r,cFrom,cTo,val,style){
    sc(r,cFrom,val,style);
    for(let c=cFrom+1;c<=cTo;c++)sc(r,c,'',style);
    if(cFrom<cTo)merges.push({s:{r,c:cFrom},e:{r,c:cTo}});
  }

  let r=0;

  // ── Row 0: Title ──
  const titleStyle={font:{bold:true,sz:13,color:{rgb:'1A1A1A'}},fill:{fgColor:{rgb:'EFEFED'}},
    alignment:{horizontal:'center',vertical:'center'},border:bdrBase};
  fillRow(r,0,daysInMonth,`${year}年${month+1}月 — ${calGame} 排期日历`,titleStyle);
  rowHeights.push({hpt:26});r++;

  // ── Row 1: Week labels ──
  sc(r,0,'',{fill:{fgColor:{rgb:'EFEFED'}},border:bdrBase});
  weekBlocks.forEach(wb=>{
    const cS=wb.startDay,cE=wb.startDay+wb.count-1;
    const wStyle={font:{bold:true,sz:10,color:{rgb:'9B9B9B'}},fill:{fgColor:{rgb:'EFEFED'}},
      alignment:{horizontal:'center',vertical:'center'},border:bdrBase};
    fillRow(r,cS,cE,`W${wb.wn}`,wStyle);
  });
  rowHeights.push({hpt:20});r++;

  // ── Row 2: Day headers ──
  sc(r,0,'活动类型',{font:{bold:true,sz:10,color:{rgb:'595959'}},fill:{fgColor:{rgb:'EFEFED'}},
    alignment:{horizontal:'center',vertical:'center'},border:bdrBase});
  days.forEach(day=>{
    let bg='EFEFED',fc='595959';
    if(day.isWe){bg='FFEAEA';fc='D93025';}
    if(day.isToday){bg='E8E6FF';fc='5046E4';}
    sc(r,day.d,`${day.d}\n${DOW_ZH[day.dow]}`,{
      font:{bold:day.isToday,sz:9,color:{rgb:fc}},fill:{fgColor:{rgb:bg}},
      alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bdrBase});
  });
  rowHeights.push({hpt:28});r++;

  // ── Category and activity rows ──
  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=hex2argb(catColors[item.ci%catColors.length]||'#F3F4F6');
      const tc=hex2argb(catTexts[item.ci%catTexts.length]||'#374151');
      const catStyle={font:{bold:true,sz:10,color:{rgb:tc}},fill:{fgColor:{rgb:bg}},
        alignment:{horizontal:'left',vertical:'center',indent:1},border:bdrBase};
      fillRow(r,0,daysInMonth,item.label,catStyle);
      rowHeights.push({hpt:20});r++;
    } else {
      // Label cell
      const labelBg='FFFFFF';
      sc(r,0,item.label,{font:{sz:10,color:{rgb:'595959'}},fill:{fgColor:{rgb:labelBg}},
        alignment:{horizontal:'left',vertical:'center',indent:1},border:bdrBase});
      // Day background cells
      days.forEach(day=>{
        let bg='FFFFFF';
        if(day.isWe)bg='F9F9F9';
        if(day.isToday)bg='F0EEFF';
        sc(r,day.d,'',{fill:{fgColor:{rgb:bg}},border:bdrBase});
      });
      // Activity bars (colored merged cells)
      item.acts.forEach(act=>{
        const range=barDays(act.startTime,act.endTime);
        if(!range)return;
        const c=TYPE_COLORS[act.type]||{bg:'#E5E7EB',text:'#374151',border:'#9CA3AF'};
        const actBg=hex2argb(c.bg);
        const actFc=hex2argb(c.text);
        const actBdr={style:'thin',color:{rgb:hex2argb(c.border||c.bg)}};
        const actBdrAll={top:actBdr,bottom:actBdr,left:actBdr,right:actBdr};
        const label=(act.important?'⭐ ':'')+act.name;
        const actStyle={font:{bold:!!act.important,sz:9,color:{rgb:actFc}},fill:{fgColor:{rgb:actBg}},
          alignment:{horizontal:'left',vertical:'center',wrapText:false},border:actBdrAll};
        sc(r,range.sd,label,actStyle);
        for(let cc=range.sd+1;cc<=range.ed;cc++)
          sc(r,cc,'',{fill:{fgColor:{rgb:actBg}},border:actBdrAll});
        if(range.sd<range.ed)merges.push({s:{r,c:range.sd},e:{r,c:range.ed}});
      });
      rowHeights.push({hpt:22});r++;
    }
  });

  ws['!ref']=XLSXStyle.utils.encode_range({s:{r:0,c:0},e:{r:r-1,c:daysInMonth}});
  ws['!cols']=colWidths;
  ws['!rows']=rowHeights;
  ws['!merges']=merges;

  const wb2=XLSXStyle.utils.book_new();
  XLSXStyle.utils.book_append_sheet(wb2,ws,`${year}年${month+1}月`);
  const fileName=`排期日历_${calGame}_${year}年${month+1}月.xlsx`;
  XLSXStyle.writeFile(wb2,fileName);
  showNotif(`已导出：${fileName}`);
}

    ${a.intensity?`<div class="tip-row">力度：<span>${a.intensity}</span></div>`:''}

function moveTip(e){
  const t=document.getElementById('tip');
  const x=Math.min(e.clientX+14,window.innerWidth-280);
  const y=Math.min(e.clientY+14,window.innerHeight-140);
  t.style.left=x+'px';t.style.top=y+'px';
}
function hideTip(){document.getElementById('tip').style.display='none'}
document.addEventListener('mousemove',e=>{const t=document.getElementById('tip');if(t.style.display!=='none')moveTip(e)});

function refreshTable(){
  const q=(document.getElementById('searchInput')||{value:''}).value.toLowerCase();
  const sf=(document.getElementById('statusFilter')||{value:'all'}).value;
  const sb=(document.getElementById('sortBy')||{value:'startTime'}).value;
  const now=TODAY;
  let list=activities.filter(a=>{
    if(activeGameFilter!=='all'&&a.game!==activeGameFilter)return false;
    if(activeTypeFilter!=='all'&&a.type!==activeTypeFilter)return false;
    if(q&&!a.name.toLowerCase().includes(q)&&!a.game.includes(q)&&!a.type.includes(q))return false;
    if(sf==='active'&&!(new Date(a.startTime)<=now&&new Date(a.endTime)>=now))return false;
    if(sf==='upcoming'&&new Date(a.startTime)<=now)return false;
    if(sf==='ended'&&new Date(a.endTime)>=now)return false;
    return true;
  });
  list.sort((x,y)=>sb==='game'?x.game.localeCompare(y.game):new Date(y[sb])-new Date(x[sb]));
  const rc=document.getElementById('resultCount');
  if(rc)rc.textContent=`共 ${list.length} 条`;
  const tb=document.getElementById('tableBody');if(!tb)return;
  const canEdit=currentUser.role!=='viewer',canDel=currentUser.role!=='viewer';
  if(!list.length){tb.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">暂无符合条件的活动记录</td></tr>`;return;}
  tb.innerHTML=list.map(a=>{
    const st=getStatus(a);
    const starBadge=a.important?`<span title="重要活动" style="color:#f59e0b;margin-right:4px;font-size:13px">⭐</span>`:'';
    return`<tr ${a.important?'style="background:#fffdf0"':''}>
      <td style="font-weight:500">${a.game}</td>
      <td>${typeTag(a.type)}</td>
      <td title="${a.name}">${starBadge}${a.name}</td>
      <td><span class="tag" style="background:${st.bg};color:${st.color}">${st.label}</span></td>
      <td style="font-size:11px">${a.startTime.split(' ')[0]}</td>
      <td style="font-size:11px">${a.endTime.split(' ')[0]}</td>
      <td style="font-size:11px">${getDur(a)}天</td>
      <td style="font-size:11px;color:var(--text2)">${a.channels.join('/')}</td>
      <td>
        <button class="btn sm" onclick="showDetail('${getActivityRef(a)}')">详情</button>
        ${canEdit?`<button class="btn sm" onclick="showModal('edit','${getActivityRef(a)}')" style="margin-left:3px">编辑</button>`:''}
        ${canEdit?`<button class="btn sm" onclick="copyActivity('${getActivityRef(a)}')" style="margin-left:3px" title="复制此活动">复制</button>`:''}
        ${canDel?`<button class="btn sm danger" onclick="confirmDelete('${getActivityRef(a)}')" style="margin-left:3px">删除</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

// ===================== TYPE DRAG REORDER =====================
let _dragTypeIdx = null;

function typeDragStart(e, idx){
  _dragTypeIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.4';
}

function typeDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.style.background = 'var(--bg2)';
  e.currentTarget.style.borderTop = '2px solid #5046e4';
}

function typeDragLeave(e){
  e.currentTarget.style.background = '';
  e.currentTarget.style.borderTop = '';
}

function typeDrop(e, targetIdx){
  e.preventDefault();
  e.currentTarget.style.background = '';
  e.currentTarget.style.borderTop = '';
  if(_dragTypeIdx === null || _dragTypeIdx === targetIdx){ _dragTypeIdx=null; return; }

  // Reorder ACT_TYPES array
  const moved = ACT_TYPES.splice(_dragTypeIdx, 1)[0];
  ACT_TYPES.splice(targetIdx, 0, moved);

  // Also reorder rows in GAME_CATS to match new type order
  // Each game's cat rows: sort rows within each cat to follow ACT_TYPES order
  Object.values(GAME_CATS).forEach(cats=>{
    cats.forEach(cat=>{
      cat.rows.sort((a,b)=>{
        const ai = Math.min(...a.types.map(t=>ACT_TYPES.indexOf(t)).filter(i=>i>=0));
        const bi = Math.min(...b.types.map(t=>ACT_TYPES.indexOf(t)).filter(i=>i>=0));
        return (ai===-1?999:ai)-(bi===-1?999:bi);
      });
    });
  });

  _dragTypeIdx = null;
  addLog(`调整了活动类型排序`);
  showNotif('排序已更新，日历行顺序同步变化');
  saveData();
  refreshCatPanel();
}
// ===================== END TYPE DRAG REORDER =====================

// ===================== CATEGORY GROUP MANAGEMENT =====================

function renderCatPanelHtml(game){
  const cats = GAME_CATS[game] || [];
  const catColors = GAME_CAT_COLORS[game] || [];
  const catTexts  = GAME_CAT_TEXT[game]   || [];
  if(!cats.length) return `<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px">该游戏暂无分组，点击「新增分组」创建</div>`;

  return cats.map((cat,ci)=>{
    const bg = catColors[ci % catColors.length] || '#f3f4f6';
    const tc = catTexts[ci % catTexts.length]   || '#374151';
    const typeChips = cat.rows.map((row,ri)=>`
      <span style="display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border2);border-radius:14px;padding:2px 8px;font-size:11px;cursor:pointer;margin:2px"
        onclick="showMoveTypeDialog('${game}',${ci},${ri})"
        title="点击移动到其他分组">
        ${row.label}
        <span style="color:var(--text3);font-size:10px">⇄</span>
      </span>`).join('');

    return`<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden"
      draggable="true" data-ci="${ci}"
      ondragstart="catDragStart(event,${ci},'${game}')"
      ondragover="catDragOver(event)"
      ondragleave="catDragLeave(event)"

function catDrop(e, targetCi, game){

function canUndoLog(log){
  return currentUser.role==='admin' && !!log?.undo && !!log?.userId && log.userId!==currentUser.id && !log.undoMeta?.undoneAt;
}

function markLogUndone(log){
  log.undoMeta = {
    undoneAt: ts(),
    undoneBy: currentUser.name
  };
}

function undoLog(logId){
  const log = opLogs.find(l=>l.id===logId);
  if(!canUndoLog(log)){ showNotif('该日志当前不可撤销', true); return; }
  const undo = log.undo || {};
  try{
    if(undo.kind === 'activity_create'){
      const refSet = new Set(undo.refs || undo.ids || []);
      activities = activities.filter(a=>!refSet.has(getActivityRef(a)) && !refSet.has(a.id));
    }else if(undo.kind === 'activity_update'){
      const before = normalizeActivity(undo.before);
      const idx = findActivityIndexByRef(before?._akey || before?.id);
      if(!before){ throw new Error('缺少原始活动数据'); }
      if(idx >= 0) activities[idx] = before;
      else activities.unshift(before);
      ensureGameTypeVisible(before.game, before.type);
    }else if(undo.kind === 'activity_delete'){
      const deleted = normalizeActivity(undo.activity);
      if(!deleted){ throw new Error('缺少已删除活动数据'); }
      if(!activities.some(a=>a.id===deleted.id)) activities.unshift(deleted);
      ensureGameTypeVisible(deleted.game, deleted.type);
    }else{
      throw new Error('暂不支持撤销该操作');
    }
    markLogUndone(log);
    addLog(`撤销了 ${log.user} 的操作：${log.action}`);
    stageLatestLocalSnapshot();
    saveData();
    renderMain();
    showNotif('已撤销该操作');
  }catch(e){
    showNotif(`撤销失败：${e.message}`, true);
  }
}

function ensureGameTypeVisible(game, type){
  if(!game || !type) return;
  if(!GAME_CATS[game]) GAME_CATS[game] = [];

  const exists = (GAME_CATS[game] || []).some(cat =>
    (cat.rows || []).some(row =>
      row.label === type || (Array.isArray(row.types) && row.types.includes(type))
    )
  );
  if(exists) return;

  let fallbackIdx = (GAME_CATS[game] || []).findIndex(cat => cat.cat === '未分组活动');
  if(fallbackIdx < 0){
    GAME_CATS[game].push({cat:'未分组活动', rows:[]});
    fallbackIdx = GAME_CATS[game].length - 1;

    const cc = GAME_CAT_COLORS[game] || [];
    const ct = GAME_CAT_TEXT[game] || [];
    GAME_CAT_COLORS[game] = [...cc, '#f3f4f6'];
    GAME_CAT_TEXT[game] = [...ct, '#6b7280'];
  }

  GAME_CATS[game][fallbackIdx].rows.push({label:type, types:[type]});
}
