  </div>`;
  document.body.appendChild(ov);
}

function toggleCyclePanel(){
  const cb=document.getElementById('f-cycle');
  const panel=document.getElementById('cycle-panel');
  if(!cb||!panel) return;
  // clicking the parent div toggles the checkbox
  if(event&&event.target&&event.target.id!=='f-cycle'){cb.checked=!cb.checked;}
  panel.style.display=cb.checked?'block':'none';
  if(cb.checked) updateCyclePreview();
}

function updateCyclePreview(){
  const preview=document.getElementById('cycle-preview');
  if(!preview) return;
  const sVal=document.getElementById('f-start')?.value.replace('T',' ');
  const eVal=document.getElementById('f-end')?.value.replace('T',' ');
  const gap=parseInt(document.getElementById('f-cycle-gap')?.value)||0;
  const until=document.getElementById('f-cycle-until')?.value;
  if(!sVal||!eVal||!until){
    preview.textContent='请填写开始/结束时间及循环截止日期';
    return;
  }
  const sDate=new Date(sVal), eDate=new Date(eVal);
  if(sDate>=eDate){preview.textContent='开始时间须早于结束时间';return;}
  const dur=Math.ceil((eDate-sDate)/86400000); // activity duration in days
  const step=dur+gap; // gap=0:seamless, gap=1:1 day between
  const untilDate=new Date(until+'T23:59:59');
  let count=0, cur=new Date(sDate);
  while(cur<=untilDate&&count<50){count++;cur=new Date(cur.getTime()+step*86400000);}
  const gapDesc=gap===0?'每天连续开启':`每次间隔 ${gap} 天`;
  preview.innerHTML=`🔁 ${gapDesc}，每次活动持续 <strong>${dur}</strong> 天，截止 ${until} 共创建 <strong>${count}</strong> 条活动`;
}

// Generate a unique activity ID that works for any game/type name.
// batchIds: array of IDs already created in the same batch (for cycle mode).
function generateUniqueActId(g, t, dc, batchIds){
  const gcMap={'王者荣耀':'WZRY','和平精英':'HPJY','原神':'YS','明日方舟':'MRF','崩坏：星穹铁道':'BHXQTD','第五人格':'DWRG','蛋仔派对':'DZPD'};
  const tcMap={'充值返利':'RECHARGE','版本更新':'UPDATE','节日活动':'EVENT','赛事活动':'ESPORTS','福利发放':'WELFARE','跨界联动':'COLLAB','新服开放':'NEWSVR','限时折扣':'DISCOUNT'};
  // Derive a short uppercase code from an arbitrary string.
  // Prefers ASCII letters; falls back to a 4-digit hex hash of the first few CJK chars.
  function abbr(str, fb){
    if(!str) return fb;
    const asc=str.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
    if(asc.length>=2) return asc.slice(0,8);
    let h=0; Array.from(str).slice(0,4).forEach(c=>{h=(h*31+c.codePointAt(0))&0xFFFF;});
    return h.toString(16).toUpperCase().padStart(4,'0');
  }
  const gCode=gcMap[g]||abbr(g,'GAME');
  const tCode=tcMap[t]||abbr(t,'ACT');
  const prefix=`${gCode}-${tCode}-${dc}-`;
  // Find max existing seq across ALL activity IDs with this prefix (including current batch).
  let maxSeq=0;
  const allIds=activities.map(a=>a.id).concat(batchIds||[]);
  allIds.forEach(id=>{
    if(id&&id.startsWith(prefix)){
      const n=parseInt(id.slice(prefix.length))||0;
      if(n>maxSeq) maxSeq=n;
    }
  });
  return `${prefix}${String(maxSeq+1).padStart(3,'0')}`;
}

function saveActivity(){
  const g=document.getElementById('f-game').value;
  const t=document.getElementById('f-type').value;
  const n=document.getElementById('f-name').value.trim();
  const s=document.getElementById('f-start').value.replace('T',' ');
  const e=document.getElementById('f-end').value.replace('T',' ');
  const ph=document.getElementById('f-preheat').value.replace('T',' ');
  const src=document.getElementById('f-source').value;
  const channels=[...document.getElementById('f-channels').selectedOptions].map(o=>o.value);
  const goals=[...document.getElementById('f-goals').selectedOptions].map(o=>o.value);
  const intensity=document.getElementById('f-intensity').value;
  const rules=document.getElementById('f-rules').value;
  const note=document.getElementById('f-note').value;
  const triggerType=normalizeTriggerType(document.getElementById('f-trigger-type')?.value);
  const important=document.getElementById('f-important').checked;
  if(!n){showNotif('活动名称不能为空',true);return}
  if(!s||!e){showNotif('时间不能为空',true);return}
  if(new Date(s)>new Date(e)){showNotif('结束时间不能早于开始时间，请修改',true);return}
  if(!channels.length){showNotif('请至少选择一个活动渠道',true);return}

  const now=ts();

  if(editingId){
    // Edit mode — single update
    const idx=findActivityIndexByRef(editingId);
    if(idx>=0){
      const before = deepClone(activities[idx]);
      ensureGameTypeVisible(g, t);
      activities[idx]=normalizeActivity({...activities[idx],game:g,type:t,name:n,startTime:s,endTime:e,preheat:ph,channels,goals,intensity,rules,note,source:src,triggerType,important,modifier:currentUser.name,modifyTime:now});
      addLog(`修改了《${g}》${n}`, {undo:{kind:'activity_update', before}});
      showNotif(`修改成功：${n}`);
    }
    stageLatestLocalSnapshot(); // immediate local save
    saveData();                 // async cloud sync (also re-saves locally after merge)
    activeGameFilter='all';
    activeTypeFilter='all';
    persistUiState();
    closeModal();renderMain();
    return;
  }

  // Check cycle mode
  const cycleOn = document.getElementById('f-cycle')?.checked;
  const gap     = parseInt(document.getElementById('f-cycle-gap')?.value)||0;
  const until   = document.getElementById('f-cycle-until')?.value;

  if(cycleOn && until){
    // Batch cycle creation
    ensureGameTypeVisible(g, t);
    const sDate    = new Date(s);
    const eDate    = new Date(e);
    const dur      = Math.ceil((eDate-sDate)/86400000);
    const step     = dur+gap; // gap=0:seamless, gap=1:1 day between
    const untilDate= new Date(until+'T23:59:59');
    const phOffset = ph ? (new Date(s)-new Date(ph)) : null; // preheat offset in ms

    // Helper: add days to a datetime string "YYYY-MM-DD HH:MM"
    function shiftDateStr(dateStr, daysOffset){
      if(!dateStr) return dateStr;
      const d=new Date(dateStr);
      d.setDate(d.getDate()+daysOffset);
      const pad=v=>String(v).padStart(2,'0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    let created=0, curShift=0;
    const newItems=[];
    while(true){
      const cycleStart=new Date(sDate.getTime()+curShift*86400000);
      if(cycleStart>untilDate || created>=50) break;
      const dc=cycleStart.toISOString().split('T')[0].replace(/-/g,'');
      const newId=generateUniqueActId(g, t, dc, newItems.map(i=>i.id));
      const newStart=shiftDateStr(s, curShift);
      const newEnd  =shiftDateStr(e, curShift);
      const newPh   =ph&&phOffset!==null ? shiftDateStr(ph, curShift) : ph;
      newItems.push(normalizeActivity({id:newId,game:g,type:t,name:n,startTime:newStart,endTime:newEnd,preheat:newPh,channels,goals,intensity,rules,note,source:src,triggerType,important,creator:currentUser.name,createTime:now,modifier:currentUser.name,modifyTime:now}));
      created++;
      curShift+=step;
    }
    // Insert all at front
    activities.unshift(...newItems.reverse());
    addLog(`循环创建了 ${created} 条《${g}》${t} · ${n}（间隔${gap}天）`, {undo:{kind:'activity_create', refs:newItems.map(item=>getActivityRef(item))}});
    showNotif(`循环创建成功：共生成 ${created} 条活动`);
  } else {
    // Single creation
    ensureGameTypeVisible(g, t);
    const dc=s.split(' ')[0].replace(/-/g,'');
    const newId=generateUniqueActId(g, t, dc, []);
    const createdActivity = normalizeActivity({id:newId,game:g,type:t,name:n,startTime:s,endTime:e,preheat:ph,channels,goals,intensity,rules,note,source:src,triggerType,important,creator:currentUser.name,createTime:now,modifier:currentUser.name,modifyTime:now});
    activities.unshift(createdActivity);
    addLog(`新增了《${g}》${n}`, {undo:{kind:'activity_create', refs:[getActivityRef(createdActivity)]}});
    showNotif(`新增成功：《${g}》${t} · ${n}`);
  }

  stageLatestLocalSnapshot(); // immediate local save
  saveData();                 // async cloud sync
  activeGameFilter='all';
  activeTypeFilter='all';
  calGame=g;currentTab='calendar';
  persistUiState();
  document.querySelectorAll('.nav-tab').forEach((tb,i)=>tb.classList.toggle('active',i===1));
  closeModal();renderMain();
}

function formatSize(bytes){
  if(!bytes) return '';
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return Math.round(bytes/1024)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

function genAttId(){return 'att_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}

// ─── 附件存储说明 ───
// 图片优先上传到飞书云空间（配置了 driveFolderToken 时），以 fileToken 引用；
// 未配置云空间时退回 base64（≤80KB），仅本地可见。
// 视频支持粘贴外链（B站/YouTube/MP4直链），本地视频文件以 base64 存储（≤50MB）。

// ─── 飞书云空间 Drive API ───
let _fsFileCache = {};  // { [fileToken]: blobUrl } 内存缓存，刷新后重新加载

// 上传图片/文件到飞书云空间，返回 file_token
async function fsUploadToDrive(blob, fileName){
  const cfg = getFsConfig();
  if(!cfg.driveFolderToken) throw new Error('未配置飞书云空间文件夹 Token');
  const token = await getFsTenantToken();
  const form = new FormData();
  form.append('file_name', fileName);
  form.append('parent_type', 'explorer');
  form.append('parent_node', cfg.driveFolderToken);
  form.append('size', String(blob.size));
  form.append('file', blob, fileName);
  const r = await fetch(`${FS_API}/drive/v1/files/upload_all`,{
    method:'POST',
    headers:{'Authorization':'Bearer '+token},
    body: form
  });
  if(!r.ok){ const t=await r.text(); throw new Error(`云空间上传失败 ${r.status}: ${t.slice(0,100)}`); }
  const d = await r.json();
  if(d.code !== 0) throw new Error(`云空间上传失败 (${d.code}): ${d.msg}`);
  return d.data.file_token;
}

// 下载飞书云空间文件，返回 blobUrl（内存缓存）
async function fsDownloadFromDrive(fileToken){
  if(_fsFileCache[fileToken]) return _fsFileCache[fileToken];
  const token = await getFsTenantToken();
  const r = await fetch(`${FS_API}/drive/v1/medias/${fileToken}/download`,{
    headers:{'Authorization':'Bearer '+token}
  });
  if(!r.ok) throw new Error(`云空间下载失败 ${r.status}`);
  const blob = await r.blob();
  const blobUrl = URL.createObjectURL(blob);
  _fsFileCache[fileToken] = blobUrl;
  return blobUrl;
}

// 删除飞书云空间文件
async function fsDeleteFromDrive(fileToken){
  if(!fileToken) return;
  try{
    const token = await getFsTenantToken();
    await fetch(`${FS_API}/drive/v1/files/${fileToken}?type=file`,{
      method:'DELETE',
      headers:{'Authorization':'Bearer '+token}
    });
    delete _fsFileCache[fileToken];
  }catch(e){ console.warn('删除云空间文件失败', e); }
}

// 获取图片显示用的 src（base64 或从 Drive 加载）
// 返回 Promise<string|null>
async function fsGetImageSrc(att){
  if(att.data && String(att.data).startsWith('data:')) return att.data;
  if(!att.fileToken) return null;
  try{ return await fsDownloadFromDrive(att.fileToken); }catch(e){ return null; }
}

// 异步将 fileToken 图片渲染到已存在的 <img id="fsimg-{attId}"> 元素中
function fsLoadImgEl(att){
  if(!att.fileToken) return;
  const el = document.getElementById('fsimg-'+att.id);
  if(!el) return;
  if(_fsFileCache[att.fileToken]){ el.src=_fsFileCache[att.fileToken]; return; }
  el.src=''; el.style.background='#e8e6ff';
  fsDownloadFromDrive(att.fileToken).then(src=>{ const e2=document.getElementById('fsimg-'+att.id); if(e2) e2.src=src; }).catch(()=>{});
}

// ─── Image compression ───
// Compress image to max 100KB using canvas（base64 fallback mode）
async function compressImage(file, targetKB){
  return new Promise((resolve)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const TARGET = (targetKB || 80) * 1024; // 默认 80KB（base64 fallback），Drive 模式传 2048

      const tryWithDim = (maxDim, quality) => new Promise(res=>{
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(res, 'image/jpeg', quality);
      });

      (async ()=>{
        // Try progressively smaller dimensions + lower quality
        const attempts = TARGET >= 1024*1024
          ? [ // Drive 模式（≤2MB），保留更高画质
              { maxDim: 9999, quality: 0.92 },
              { maxDim: 2400, quality: 0.85 },
              { maxDim: 1920, quality: 0.80 },
              { maxDim: 1280, quality: 0.75 },
              { maxDim: 1024, quality: 0.70 },
            ]
          : [ // Base64 模式（≤80KB），激进压缩
              { maxDim: 800, quality: 0.7 },
              { maxDim: 600, quality: 0.6 },
              { maxDim: 480, quality: 0.5 },
              { maxDim: 360, quality: 0.4 },
              { maxDim: 320, quality: 0.3 },
              { maxDim: 240, quality: 0.2 },
              { maxDim: 200, quality: 0.15 },
              { maxDim: 160, quality: 0.1 },
            ];
        let bestBlob = null;
        for(const {maxDim, quality} of attempts){
          const blob = await tryWithDim(maxDim, quality);
          if(!bestBlob) bestBlob = blob;
          if(blob && blob.size <= TARGET){ resolve(blob); return; }
          if(blob && blob.size < (bestBlob?.size||Infinity)) bestBlob = blob;
        }
        resolve(bestBlob); // best effort — smallest we could get
      })();
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

// ─── Process uploaded files ───
async function processFiles(files, actId){
  const MAX = 50 * 1024 * 1024; // 50MB limit for videos
  const act = activities.find(a=>a.id===actId);

  const useDrive = !!getFsConfig().driveFolderToken; // 是否启用飞书云空间存图

  let uploaded = 0;
  const total = files.filter(f=>f.type.startsWith('image/')||f.type.startsWith('video/')).length;
  if(!total){ showNotif('没有可用的图片或视频文件',true); return; }

  showNotif(`正在处理 ${total} 个文件…`);

  for(const file of files){
    const isImg = file.type.startsWith('image/');
    const isVid = file.type.startsWith('video/');
    if(!isImg && !isVid){ showNotif(`「${file.name}」不是图片或视频，已跳过`,true); continue; }
    if(file.size > MAX){ showNotif(`「${file.name}」超过50MB限制，已跳过`,true); continue; }

    const attId = genAttId();
    let attData = null;
    let attFileToken = null;
    let attSize = file.size;
    const attType = isImg ? 'image' : 'video';

    if(isImg){
      if(useDrive){
        // ── 方案A：上传到飞书云空间，只保存 fileToken ──
        showNotif(`正在上传「${file.name}」到云空间…`);
        try{
          // 压缩到 ≤2MB 保留较高画质
          const compressed = await compressImage(file, 2048);
          const blob = compressed || file;
          attSize = blob.size;
          // 生成上传文件名（带扩展名保持 JPEG）
          const uploadName = file.name.replace(/\.[^.]+$/, '') + '.jpg';
          attFileToken = await fsUploadToDrive(blob, uploadName);
        }catch(err){
          showNotif(`「${file.name}」云空间上传失败，转为本地存储: ${err.message}`,true);
          // Fallback to base64
          const compressed = await compressImage(file, 80);
          if(!compressed){ showNotif(`「${file.name}」压缩失败，已跳过`,true); continue; }
          attSize = compressed.size;
          attData = await new Promise(res=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(compressed); });
        }
      } else {
        // ── 方案B：base64 fallback（≤80KB）──
        const compressed = await compressImage(file, 80);
        if(!compressed){ showNotif(`「${file.name}」压缩失败，已跳过`,true); continue; }
        attSize = compressed.size;
        attData = await new Promise(res=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(compressed); });
      }
    } else {
      // Video: read as base64
      attData = await new Promise(res=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(file); });
    }

    const att = { id:attId, name:file.name, type:attType,
                  size:attSize, data:attData, fileToken:attFileToken||null,
                  addedBy:currentUser.name, addedAt:ts() };
    if(!attachments[actId]) attachments[actId]=[];
    attachments[actId].push(att);
    refreshAttachList(actId);
    saveAttachmentsFor(actId);
    uploaded++;
    if(uploaded===total) showNotif(`成功添加 ${uploaded} 个附件${useDrive?' (已存入飞书云空间)':''}`);
  }
}

// ── Export all images as ZIP ──
async function exportAllImages(game){
  const items=[];
  Object.entries(attachments).forEach(([actId,atts])=>{
    const act=activities.find(a=>a.id===actId);
    if(game!=='all'&&(!act||act.game!==game)) return;
    atts.filter(att=>att.type==='image').forEach(att=>items.push({att,act}));
  });
  if(!items.length){showNotif('当前没有可导出的图片',true);return;}
  showNotif(`正在打包 ${items.length} 张图片，请稍候…`);

  try{
    await new Promise((resolve,reject)=>{
      if(window.JSZip){resolve();return;}
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=resolve; s.onerror=reject;
      document.head.appendChild(s);
    });
    const zip=new JSZip();
    const folderName=game==='all'?'全部游戏':game;
    const folder=zip.folder(folderName);
    const safe=(s)=>s.replace(/[\/\\:*?"<>|]/g,'_').slice(0,30);

    for(let i=0;i<items.length;i++){
      const {att,act}=items[i];
      const fname=`${String(i+1).padStart(3,'0')}_${safe(act?.name||'未知活动')}.jpg`;
      if(att.fileToken){
        // 从飞书云空间下载
        try{
          const src=await fsDownloadFromDrive(att.fileToken);
          const resp=await fetch(src);
          folder.file(fname, await resp.blob());
        }catch(e){ console.warn('从云空间下载图片失败',att.fileToken,e); }
      } else if(att.data && att.data.startsWith('data:')){
        // base64 stored locally
        const base64=att.data.split(',')[1];
        folder.file(fname, base64, {base64:true});
      } else if(att.data){
        // URL attachment — fetch the blob
        try{
          const resp=await fetch(att.data);
          folder.file(fname, await resp.blob());
        }catch(e){ console.warn('Failed to fetch image for export',att.data,e); }
      }
    }
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:3}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`${folderName}_图片_${ts().replace(/[: ]/g,'-')}.zip`;
    a.click();
    URL.revokeObjectURL(url);
    showNotif(`✓ 已打包导出 ${items.length} 张图片`);
  }catch(e){
    console.warn('Export failed',e);
    showNotif(`导出失败：${e.message}`,true);
  }
}

function doDelete(id){
  const a=findActivityByRef(id);
  if(!a){ closeModal(); return; }
  const key = getActivityRef(a);
  // Record tombstone BEFORE filtering — so merge never brings this back
  if(key) _deletedKeys[key] = Date.now();
  activities=activities.filter(x=>getActivityRef(x)!==id && x.id!==id);
  if(a)addLog(`删除了《${a.game}》${a.name}`, {undo:{kind:'activity_delete', activity:deepClone(a)}});
  closeModal();showNotif('删除成功');
  saveData(); // save immediately so tombstone reaches cloud ASAP
  renderMain();
}

// ===================== DAILY RECOMMENDATIONS =====================
// 每次进入「每日推荐」Tab，从活动库随机抽6条展示
// 抽取策略：优先当前进行中 + 即将开始的活动，以重要活动优先
function renderDailyView(container){
  const now=TODAY;

  // Pool: active + upcoming, important first, then shuffle rest
  const active  = activities.filter(a=>new Date(a.startTime)<=now&&new Date(a.endTime)>=now);
  const upcoming= activities.filter(a=>new Date(a.startTime)>now);
  const ended   = activities.filter(a=>new Date(a.endTime)<now);

  const important = [...active,...upcoming,...ended].filter(a=>a.important);
  const rest      = [...active,...upcoming,...ended].filter(a=>!a.important);
  // Date-seeded shuffle — same day always produces same order
  // Seed = YYYYMMDD integer, giving consistent results all day
  const seed = parseInt(TODAY_STR.replace(/-/g,''));
  function seededRand(s){ s=Math.sin(s)*10000; return s-Math.floor(s); }
  const shuffle = arr => {
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(seededRand(seed+i)*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  };
  const picked = [...shuffle(important),...shuffle(rest)].slice(0,6);

  if(!picked.length){
    container.innerHTML=`<div class="daily-view"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px">
      <div style="font-size:40px">📋</div>
      <div style="font-size:14px">暂无活动数据</div>
      <div style="font-size:12px">先在「活动列表」录入活动，再来查看每日推荐</div>
    </div></div>`;
    return;
  }

  function getReason(a){
    const s=new Date(a.startTime),e=new Date(a.endTime);
    const dStart=Math.ceil((s-now)/86400000);
    const dEnd  =Math.ceil((e-now)/86400000);
    if(a.important) return '⭐ 重要活动，值得重点关注';
    if(s<=now&&e>=now){
      if(dEnd<=2) return `🔴 活动即将结束，仅剩 ${dEnd} 天`;
      if(dEnd<=7) return `🟡 活动进行中，还有 ${dEnd} 天结束`;
      return '🟢 活动进行中';
    }
    if(dStart<=3) return `🔵 即将在 ${dStart} 天后开始${a.preheat?'，预热已启动':''}`;
    if(dStart<=7) return `⏳ 本周开始，提前关注`;
    return '📌 近期活动，建议追踪';
  }

  // Get up to 3 image attachments for an activity
  function getImages(actId){
    return (attachments[actId]||[]).filter(att=>att.type==='image').slice(0,3);
  }

  const cards=picked.map((a,i)=>{
    const st=getStatus(a);
    const c=TYPE_COLORS[a.type]||{bg:'#f3f4f6',text:'#6b7280',border:'#d1d5db'};
    const imgs=getImages(a.id);
    const ssId=`ss-${a.id}-${i}`;

    // Slideshow HTML — only render if there are images
    const slideshowHtml = imgs.length>0 ? `
      <div class="dc-slideshow" id="${ssId}">
        ${imgs.map((img,si)=>`
          <div class="dc-slide${si===0?' active':''}" data-idx="${si}">
            <img src="${img.data}" alt="${img.name}" loading="lazy">
          </div>`).join('')}
        ${imgs.length>1?`<div class="dc-dots">
          ${imgs.map((_,si)=>`<div class="dc-dot${si===0?' active':''}" data-ss="${ssId}" data-idx="${si}"></div>`).join('')}
        </div>`:''}
      </div>` : '';

    return`<div class="daily-card ${a.important?'important-card':''}" onclick="showDetail('${getActivityRef(a)}')">
      ${slideshowHtml}
      <div class="daily-card-body">
        <div class="daily-card-num">${i+1}</div>
        <div class="daily-card-meta">
          <span class="tag" style="background:${c.bg};color:${c.text}">${a.type}</span>
          <span class="tag" style="background:${st.bg};color:${st.color}">${st.label}</span>
          <span style="font-size:10px;color:var(--text3)">${a.game}</span>
        </div>
        <div class="daily-card-name">${a.important?'⭐ ':''}${a.name}</div>
        <div class="daily-card-detail">
          <span>📅 ${a.startTime.split(' ')[0]} ~ ${a.endTime.split(' ')[0]}</span>
          ${a.intensity?`&nbsp;·&nbsp;<span>💪 ${a.intensity}</span>`:''}
          ${a.channels?.length?`&nbsp;·&nbsp;<span>📡 ${a.channels.join('/')}</span>`:''}
        </div>
        <div class="daily-card-reason">${getReason(a)}</div>
      </div>
    </div>`;
  }).join('');

  const importantCount=activities.filter(a=>a.important).length;

  container.innerHTML=`<div class="daily-view">
    <div class="daily-header">
      <div>
        <div class="daily-title">📋 每日活动推荐</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">
          从 ${activities.length} 条活动中抽选 ${picked.length} 条
          ${importantCount?`，其中 ${importantCount} 条重要活动优先展示`:''}
          · 每日固定，次日自动更新
        </div>
      </div>
      <button class="btn primary" onclick="renderMain()" style="font-size:12px">🔀 换一批</button>
    </div>
    <div class="daily-grid">${cards}</div>
  </div>`;

  // Start auto-slideshows for cards that have images
  picked.forEach((a,i)=>{
    const imgs=getImages(a.id);
    if(imgs.length<=1) return;
    const ssId=`ss-${a.id}-${i}`;
    let cur=0;
    const timer=setInterval(()=>{
      const ss=document.getElementById(ssId);
      if(!ss){ clearInterval(timer); return; } // card removed
      const slides=ss.querySelectorAll('.dc-slide');
      const dots=ss.querySelectorAll('.dc-dot');
      slides[cur].classList.remove('active');
      dots[cur]?.classList.remove('active');
      cur=(cur+1)%slides.length;
      slides[cur].classList.add('active');
      dots[cur]?.classList.add('active');
    }, 3000);
  });
}
// ===================== END DAILY RECOMMENDATIONS =====================

      const inDesc=(r.desc||'').toLowerCase().includes(ql);
      const inKw=(r.keywords||'').toLowerCase().includes(ql);
      const inTags=r.tags.some(t=>t.toLowerCase().includes(ql));
      if(!inTitle&&!inDesc&&!inKw&&!inTags) return false;

  });

  // Tag counts for sidebar
  const tagCounts={};
  reports.forEach(r=>r.tags.forEach(t=>tagCounts[t]=(tagCounts[t]||0)+1));

            <div class="report-card-meta">${r.uploader} · ${r.uploadTime.split(' ')[0]}</div>
            <div class="report-tags">
              ${r.tags.map(t=>`<span class="rtag" style="background:${tagColor(t).bg};color:${tagColor(t).text}">${t}</span>`).join('')}

    <div class="report-main">
      <div class="report-toolbar">

          <span style="color:var(--text3)">⌕</span>

            style="border:none;background:transparent;outline:none;font-size:12px;padding:7px 0;flex:1;color:var(--text)"
            oninput="renderMain()">

        ${canEdit?`<button class="btn primary" onclick="showUploadReportDialog()" style="margin-left:auto">+ 上传报告</button>`:''}

            <span id="rpt-file-label">${r?'点击重新选择文件（当前已有文件）':'点击选择 PDF 或图片文件，最大 20MB'}</span>

    </div>
  </div>`;

  ov._selectedTags=new Set(r?.tags||[]);

function setRptMode(linkMode){
  const ov=document.getElementById('modal-overlay');
  if(ov) ov._linkMode=linkMode;
  document.getElementById('rpt-file-area').style.display=linkMode?'none':'';
  document.getElementById('rpt-link-area').style.display=linkMode?'':'none';
  document.getElementById('rpt-file-btn').className='btn'+(linkMode?'':' primary');
  document.getElementById('rpt-link-btn').className='btn'+(linkMode?' primary':'');
}

function toggleReportTagSel(tag){
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const sel=ov._selectedTags;
  const c=REPORT_TAG_COLORS[tag]||{bg:'#f3f4f6',text:'#6b7280'};
  const el=document.getElementById('rptag-'+tag.replace(/\s/g,'_'));
  if(sel.has(tag)){
    sel.delete(tag);
    if(el){el.style.background='var(--bg2)';el.style.color='var(--text3)';el.style.borderColor='var(--border2)';}
  } else {
    sel.add(tag);
    if(el){el.style.background=c.bg;el.style.color=c.text;el.style.borderColor=c.text+'44';}
  }
}

function onRptFileSelect(e){
  const file=e.target.files[0]; if(!file)return;
  if(file.size>20*1024*1024){showNotif('文件超过20MB限制',true);return;}
  const label=document.getElementById('rpt-file-label');
  if(label) label.textContent=`已选择：${file.name}（${(file.size/1024/1024).toFixed(1)}MB）`;
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    ov._fileData=ev.target.result;
    ov._fileType=file.type.startsWith('image/')?'image':'pdf';
    ov._thumb=ov._fileType==='image'?ev.target.result:null;
  };
  reader.readAsDataURL(file);
}

async function saveReport(editId){
  const title=(document.getElementById('rpt-title').value||'').trim();
  if(!title){showNotif('请填写报告标题',true);return;}
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const desc=document.getElementById('rpt-desc').value||'';
  const keywords=document.getElementById('rpt-kw').value||'';
  const tags=[...ov._selectedTags];
  const linkMode=ov._linkMode;
  const linkVal=(document.getElementById('rpt-link-val').value||'').trim();

  let fileData=ov._fileData, fileType=ov._fileType, thumb=ov._thumb;

  if(editId){
    // editing — keep old file if no new one selected
    const old=reports.find(r=>r.id===editId);
    if(!fileData&&old){ fileData=old.fileData; fileType=old.fileType; thumb=old.thumb; }
  }

  if(linkMode){
    if(!linkVal){showNotif('请填写报告链接',true);return;}
    fileData=linkVal; fileType='link'; thumb=null;
  } else if(!fileData){
    showNotif('请选择报告文件',true);return;
  }

  const now=ts();
  if(editId){
    const idx=reports.findIndex(r=>r.id===editId);
    if(idx>=0){
      reports[idx]={...reports[idx],title,desc,keywords,tags,fileData,fileType,thumb,modifier:currentUser.name,modifyTime:now};
      addLog(`编辑了调研报告「${title}」`);
      showNotif('报告已更新');
    }
  } else {
    reports.unshift({id:genReportId(),title,desc,keywords,tags,fileData,fileType,thumb,uploader:currentUser.name,uploadTime:now});
    addLog(`上传了调研报告「${title}」`);
    showNotif('报告上传成功');
  }
  closeModal(); saveData(); renderMain();
}

      <div style="font-size:32px;margin-bottom:8px">🔗</div>
      <div style="font-size:13px;margin-bottom:10px;color:var(--text2)">${r.fileData}</div>
      <a href="${r.fileData}" target="_blank" class="btn primary" style="text-decoration:none">在新标签页打开</a>
    </div>`;
  }

  ov.innerHTML=`<div class="modal" style="width:760px">
    <div class="modal-hd">
      <div class="modal-title">${r.title}</div>
      <button class="close-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      ${previewHtml}
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">
        ${r.tags.map(t=>`<span class="rtag" style="background:${tagColor(t).bg};color:${tagColor(t).text}">${t}</span>`).join('')}
      </div>
      ${r.desc?`<div style="font-size:12px;color:var(--text2);line-height:1.7;background:var(--bg2);padding:10px;border-radius:6px">${r.desc}</div>`:''}
      ${r.keywords?`<div style="font-size:11px;color:var(--text3)">关键词：${r.keywords}</div>`:''}
      <div style="font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:8px">上传：${r.uploader} · ${r.uploadTime}${r.modifyTime?` · 最后编辑：${r.modifier} ${r.modifyTime}`:''}</div>
    </div>
    <div class="modal-ft">
      ${canEdit&&currentUser.role==='admin'?`<button class="btn danger" style="margin-right:auto" onclick="confirmDeleteReport('${r.id}')">删除</button>`:''}
      <button class="btn" onclick="closeModal()">关闭</button>
      ${canEdit?`<a href="${r.fileData}" download="${r.title}" class="btn" style="text-decoration:none" ${r.fileType==='link'?'target="_blank"':''}>下载</a>`:''}
      ${canEdit?`<button class="btn primary" onclick="closeModal();showUploadReportDialog('${r.id}')">编辑</button>`:''}
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function confirmDeleteReport(id){
  const r=reports.find(x=>x.id===id); if(!r)return;
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  ov.innerHTML=`<div class="confirm-box">
    <div class="confirm-title">确认删除报告</div>
    <div class="confirm-desc">确定删除「${r.title}」吗？此操作不可恢复。</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn danger" onclick="doDeleteReport('${id}')">确认删除</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function doDeleteReport(id){
  const r=reports.find(x=>x.id===id);
  reports=reports.filter(x=>x.id!==id);
  if(r) addLog(`删除了调研报告「${r.title}」`);
  closeModal(); showNotif('报告已删除'); saveData(); renderMain();
}

// ── Report Tag Management (in CollabView) ──
const REPORT_TAG_PRESETS=[
  {bg:'#fee2e2',text:'#991b1b'},{bg:'#dbeafe',text:'#1d4ed8'},{bg:'#dcfce7',text:'#166534'},
  {bg:'#ede9fe',text:'#5b21b6'},{bg:'#fef9c3',text:'#713f12'},{bg:'#ffedd5',text:'#9a3412'},
  {bg:'#fce7f3',text:'#9d174d'},{bg:'#ccfbf1',text:'#0f766e'},{bg:'#f0fdf4',text:'#14532d'},
  {bg:'#eff6ff',text:'#1e40af'},{bg:'#fdf4ff',text:'#6b21a8'},{bg:'#fff7ed',text:'#9a3412'}
];

function showAddReportTagDialog(){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  const swatches=REPORT_TAG_PRESETS.map((c,i)=>
    `<div onclick="selectRptColor(${i})" id="rpc-${i}" style="width:22px;height:22px;border-radius:4px;background:${c.bg};border:2px solid ${i===0?c.text:'transparent'};cursor:pointer"></div>`
  ).join('');
  ov._selectedRptColorIdx=0;
  ov.innerHTML=`<div class="confirm-box" style="width:420px;text-align:left">
    <div class="confirm-title" style="margin-bottom:14px">新增报告标签</div>
    <div class="fg full" style="margin-bottom:10px">
      <div class="flabel">标签名称 <span class="req">*</span></div>
      <input id="new-rpt-tag" type="text" placeholder="如：竞品分析">
    </div>
    <div class="fg full" style="margin-bottom:16px">
      <div class="flabel">标签颜色</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${swatches}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="doAddReportTag()">确认新增</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('new-rpt-tag')?.focus(),50);
}

function selectRptColor(idx){
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const old=ov._selectedRptColorIdx;
  const c=REPORT_TAG_PRESETS[idx];
  document.getElementById(`rpc-${old}`)?.style.setProperty('border','2px solid transparent');
  document.getElementById(`rpc-${idx}`)?.style.setProperty('border',`2px solid ${c.text}`);
  ov._selectedRptColorIdx=idx;
}

function doAddReportTag(){
  const name=(document.getElementById('new-rpt-tag').value||'').trim();
  if(!name){showNotif('标签名称不能为空',true);return;}
  if(REPORT_TAGS.includes(name)){showNotif(`「${name}」已存在`,true);return;}
  const ov=document.getElementById('modal-overlay');
  const c=REPORT_TAG_PRESETS[ov?._selectedRptColorIdx||0];
  REPORT_TAGS.push(name);
  REPORT_TAG_COLORS[name]=c;
  addLog(`新增了报告标签「${name}」`);
  showNotif(`标签「${name}」已新增`);
  closeModal(); saveData(); renderMain();
}

function showEditReportTagDialog(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const oldName=REPORT_TAGS[idx];
  const curC=REPORT_TAG_COLORS[oldName]||REPORT_TAG_PRESETS[0];
  const curIdx=REPORT_TAG_PRESETS.findIndex(c=>c.bg===curC.bg);
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  const swatches=REPORT_TAG_PRESETS.map((c,i)=>
    `<div onclick="selectRptColor(${i})" id="rpc-${i}" style="width:22px;height:22px;border-radius:4px;background:${c.bg};border:2px solid ${i===curIdx?c.text:'transparent'};cursor:pointer"></div>`
  ).join('');
  ov._selectedRptColorIdx=curIdx>=0?curIdx:0;
  ov.innerHTML=`<div class="confirm-box" style="width:420px;text-align:left">
    <div class="confirm-title" style="margin-bottom:14px">修改报告标签</div>
    <div class="fg full" style="margin-bottom:10px">
      <div class="flabel">标签名称 <span class="req">*</span></div>
      <input id="edit-rpt-tag" type="text" value="${oldName}">
    </div>
    <div class="fg full" style="margin-bottom:16px">
      <div class="flabel">标签颜色</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${swatches}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="doEditReportTag(${idx},'${oldName}')">保存</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const el=document.getElementById('edit-rpt-tag');if(el){el.focus();el.select();}},50);
}

function doEditReportTag(idx,oldName){
  const newName=(document.getElementById('edit-rpt-tag').value||'').trim();
  if(!newName){showNotif('标签名称不能为空',true);return;}
  if(newName!==oldName&&REPORT_TAGS.includes(newName)){showNotif(`「${newName}」已存在`,true);return;}
  const ov=document.getElementById('modal-overlay');
  const c=REPORT_TAG_PRESETS[ov?._selectedRptColorIdx||0];
  REPORT_TAGS[idx]=newName;
  REPORT_TAG_COLORS[newName]=c;
  if(newName!==oldName){
    delete REPORT_TAG_COLORS[oldName];
    reports.forEach(r=>{r.tags=r.tags.map(t=>t===oldName?newName:t);});
  }
  addLog(`将报告标签「${oldName}」改为「${newName}」`);
  showNotif('标签已更新');
  closeModal(); saveData(); renderMain();
}

function confirmDeleteReportTag(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const name=REPORT_TAGS[idx];
  const count=reports.filter(r=>r.tags.includes(name)).length;
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  ov.innerHTML=`<div class="confirm-box">
    <div class="confirm-title">确认删除标签</div>
    <div class="confirm-desc">确定删除标签「${name}」吗？${count>0?`<br><span style="color:#d93025">${count} 份报告使用了此标签，删除后标签会从这些报告上移除。</span>`:'该标签暂无报告使用。'}</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn danger" onclick="doDeleteReportTag(${idx})">确认删除</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function doDeleteReportTag(idx){
  const name=REPORT_TAGS[idx];
  REPORT_TAGS.splice(idx,1);
  delete REPORT_TAG_COLORS[name];
  reports.forEach(r=>{r.tags=r.tags.filter(t=>t!==name);});
  addLog(`删除了报告标签「${name}」`);
  showNotif(`标签「${name}」已删除`);
  closeModal(); saveData(); renderMain();
}
// ===================== END REPORT MODULE =====================

// ===================== INIT =====================
initStatusBar();

(function(){
  const ld=document.createElement('div');
  ld.id='cloud-loader';
  ld.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:14px';
  ld.innerHTML=`
    <div style="width:38px;height:38px;border:3px solid #e8e6ff;border-top-color:#5046e4;border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="font-size:13px;color:#5046e4;font-weight:500">正在初始化…</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  document.body.appendChild(ld);
})();

async function init(){
  await loadData();
  const ld = document.getElementById('cloud-loader');

  // 检查是否是 OAuth 回调（URL 带 ?code= 参数）
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const state = params.get('state');

  if(code){
    // 清理 URL（不刷新页面）
    history.replaceState({}, '', window.location.pathname + window.location.hash);
    if(!isFsConfigured()){
      if(ld) ld.remove();
      currentUser={id:'',name:'',role:'none',email:''};
      updateTopbarUser();
      showAuthOverlay('notconfigured');
      return;
    }
    try{
      const userInfo = await handleFsOAuthCallback(code, state);
      if(ld) ld.remove();
      await handleAuthUser(userInfo);
    }catch(e){
      if(ld) ld.remove();
      currentUser={id:'',name:'',role:'none',email:''};
      updateTopbarUser();
      showAuthOverlay('login');
      setAuthMsg('a-login-msg', `登录失败：${e.message}`, 'err');
    }
    return;
  }

  // 非回调：检查是否有已保存的会话
  if(isFsConfigured()){
    const loggedIn = await checkAuthState();
    if(ld) ld.remove();
    if(!loggedIn){
      currentUser={id:'',name:'',role:'none',email:''};
      updateTopbarUser();
      showAuthOverlay('login');
    }
  } else {
    if(ld) ld.remove();
    currentUser={id:'',name:'',role:'none',email:''};
    updateTopbarUser();
    showAuthOverlay('notconfigured');
  }
}

init();
</script>
