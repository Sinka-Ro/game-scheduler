function exportCalendarExcelAll(){
  // Export all visible months for current game as one Excel sheet
  const mNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const DOW_ZH=['日','一','二','三','四','五','六'];
  const game = calGame;
  const gameActs = activities.filter(a=>a.game===game);
  const cats = GAME_CATS[game]||[];
  const catBgColors = GAME_CAT_COLORS[game]||[];
  const catTxColors = GAME_CAT_TEXT[game]||[];

  // Same dynamic range as calendar
  let _rs, _re;
  if(gameActs.length > 0){
    const starts=gameActs.map(a=>new Date(a.startTime));
    const ends=gameActs.map(a=>new Date(a.endTime));
    _rs=new Date(new Date(Math.min(...starts)).getFullYear(),new Date(Math.min(...starts)).getMonth(),1);
    _re=new Date(new Date(Math.max(...ends)).getFullYear(),new Date(Math.max(...ends)).getMonth()+1,0);
  } else {
    _rs=new Date(TODAY.getFullYear(),TODAY.getMonth()-1,1);
    _re=new Date(TODAY.getFullYear(),TODAY.getMonth()+2,0);
  }
  const minEnd2=new Date(_rs.getFullYear(),_rs.getMonth()+2,0);
  if(_re<minEnd2)_re=minEnd2;
  const rangeStart=_rs;
  const totalMonths=((_re.getFullYear()-_rs.getFullYear())*12+(_re.getMonth()-_rs.getMonth()))+1;
  const months=[];
  for(let mi=0;mi<totalMonths;mi++){
    const d=new Date(rangeStart.getFullYear(),rangeStart.getMonth()+mi,1);
    const yr=d.getFullYear(),mo=d.getMonth();
    const dim=new Date(yr,mo+1,0).getDate();
    const days=[];
    for(let day=1;day<=dim;day++){
      const dt=new Date(yr,mo,day);
      const dow=dt.getDay();
      days.push({d:day,dow,isWe:dow===0||dow===6,isToday:yr===TODAY.getFullYear()&&mo===TODAY.getMonth()&&day===TODAY.getDate(),year:yr,month:mo});
    }
    months.push({yr,mo,dim,days});
  }
  const allDays=months.flatMap(m=>m.days);
  const rangeEndDate=new Date(rangeStart.getFullYear(),rangeStart.getMonth()+totalMonths,0,23,59,59);

  function lighten(hex,amt=0.55){
    hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
    const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
    return '#'+[r,g,b].map(v=>Math.round(v+(255-v)*amt).toString(16).padStart(2,'0')).join('');
  }

  function actsOverlapRange(a,b){
    return new Date(a.startTime)<=new Date(b.endTime)&&new Date(b.startTime)<=new Date(a.endTime);
  }
  function packSubRows(acts){
    const rows=[];
    acts.forEach(act=>{let placed=false;for(const r of rows){if(!r.some(e=>actsOverlapRange(act,e))){r.push(act);placed=true;break;}}if(!placed)rows.push([act]);});
    return rows;
  }

  function dayIdx(dt){
    const yr=dt.getFullYear(),mo=dt.getMonth(),day=dt.getDate();
    let idx=0;
    for(const m of months){if(m.yr===yr&&m.mo===mo){idx+=day-1;break;}idx+=m.dim;}
    return idx;
  }
  function barGeom(startStr,endStr){
    const s=new Date(startStr),e=new Date(endStr);
    if(s>rangeEndDate||e<rangeStart)return null;
    const cs=s<rangeStart?rangeStart:s,ce=e>rangeEndDate?rangeEndDate:e;
    const si=dayIdx(cs),ei=dayIdx(ce);
    return{si,ei,colspan:ei-si+1};
  }

  // Build row items
  const rowItems=[];
  cats.forEach((catDef,ci)=>{
    rowItems.push({type:'cat',label:catDef.cat,ci});
    catDef.rows.forEach(rowDef=>{
      const rowActs=gameActs.filter(a=>rowDef.types.includes(a.type));
      const visActs=rowActs.filter(a=>new Date(a.startTime)<=rangeEndDate&&new Date(a.endTime)>=rangeStart);
      const subRows=visActs.length>0?packSubRows(visActs):[];
      if(subRows.length===0){rowItems.push({type:'row',label:rowDef.label,acts:[],ci,subRowIdx:0,totalSubRows:1});}
      else subRows.forEach((srActs,sri)=>rowItems.push({type:'row',label:sri===0?rowDef.label:`↳续行${sri+1}`,acts:srActs,ci,subRowIdx:sri,totalSubRows:subRows.length}));
    });
  });

  const totalCols = 1 + allDays.length;
  let html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8">
<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
<x:Name>${game}</x:Name>
<x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
<style>tr{height:22pt}td,th{font-family:"Microsoft YaHei",Arial,sans-serif;font-size:9pt;border:0.5pt solid #d0d0ce;vertical-align:middle}</style>
</head><body><table border="1" cellspacing="0" cellpadding="2">`;

  // Title row
  html+=`<tr style="height:28pt"><td colspan="${totalCols}" style="font-size:13pt;font-weight:bold;background:#5046e4;color:#fff;text-align:center">${game} 排期日历 · ${months[0].yr}年${mNames[months[0].mo]}—${months[months.length-1].yr}年${mNames[months[months.length-1].mo]}</td></tr>`;

  // Month label row
  html+=`<tr style="height:18pt"><td style="background:#ece9ff;color:#3730a3;font-weight:bold;text-align:center">活动类型</td>`;
  months.forEach(m=>{
    html+=`<td colspan="${m.dim}" style="background:#ece9ff;color:#3730a3;font-weight:700;text-align:center;font-size:10pt">${m.yr}年${mNames[m.mo]}</td>`;
  });
  html+=`</tr>`;

  // Day header row
  html+=`<tr style="height:30pt"><td style="font-weight:bold;background:#f7f7f6;color:#374151;text-align:center">活动类型</td>`;
  allDays.forEach(day=>{
    const bg=day.isToday?'#e8e6ff':day.isWe?'#fff0f0':'#f7f7f6';
    const tc=day.isToday?'#5046e4':day.isWe?'#d93025':'#595959';
    html+=`<td style="text-align:center;background:${bg};color:${tc};font-weight:${day.isToday?'bold':'normal'};min-width:22pt">${day.d}<br>${DOW_ZH[day.dow]}</td>`;
  });
  html+=`</tr>`;

  // Data rows
  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=catBgColors[item.ci%catBgColors.length]||'#f3f4f6';
      const tc=catTxColors[item.ci%catTxColors.length]||'#374151';
      html+=`<tr style="height:18pt"><td colspan="${totalCols}" style="font-weight:bold;background:${bg};color:${tc};padding:2px 8px">${item.label}</td></tr>`;
      return;
    }
    const labelBg=item.subRowIdx===0?'#fafafa':'#f3f4f6';
    const labelTc=item.subRowIdx===0?'#374151':'#9b9b9b';
    html+=`<tr><td style="background:${labelBg};color:${labelTc};text-align:center;font-size:9pt">${item.label}</td>`;

    // Build spans
    const spans=[];
    item.acts.forEach(act=>{
      const g=barGeom(act.startTime,act.endTime);
      if(g) spans.push({...g,act,isPreheat:false});
      if(act.preheat){
        const pg=barGeom(act.preheat,act.startTime);
        if(pg&&pg.colspan>0) spans.push({...pg,act,isPreheat:true});
      }
    });

    let d=0;
    while(d<allDays.length){
      const span=spans.find(s=>s.si===d);
      if(span){
        const col=TYPE_COLORS[span.act.type]||{bg:'#e5e7eb',text:'#374151',border:'#9ca3af'};
        const cellBg=span.isPreheat?lighten(col.bg,0.45):col.bg;
        const bd=span.isPreheat?`border:1pt dashed ${col.border};`:`border:0.5pt solid ${col.border};`;
        const label=span.isPreheat?`[预热]${span.act.name}`:span.act.name;
        html+=`<td colspan="${span.colspan}" style="background:${cellBg};color:${col.text};${bd}font-weight:${span.act.important?'bold':'normal'};font-size:8pt;overflow:hidden;white-space:nowrap">${label}</td>`;
        d+=span.colspan;
      }else{
        const inside=spans.find(s=>d>s.si&&d<=s.ei);
        if(inside){d++;continue;}
        const day=allDays[d];
        const bg=day.isToday?'#f0eeff':day.isWe?'#fdf8f8':'#fff';
        html+=`<td style="background:${bg}"></td>`;
        d++;
      }
    }
    html+=`</tr>`;
  });

  html+=`</table></body></html>`;
  const blob=new Blob(['\uFEFF'+html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const pad=v=>String(v).padStart(2,'0');
  const n=new Date();
  const stamp=`${n.getFullYear()}${pad(n.getMonth()+1)}${pad(n.getDate())}_${pad(n.getHours())}${pad(n.getMinutes())}`;
  a.download=`排期日历_${game}_${stamp}.xls`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showNotif(`✅ 已导出：${game} ${totalMonths}个月排期日历`);
}

// ── Export all images as ZIP ──
async function exportAllImages(game){
  const items=[];
  Object.entries(attachments).forEach(([actId,atts])=>{
    const act=activities.find(a=>a.id===actId);
    if(game!=='all'&&(!act||act.game!==game)) return;
    atts.filter(att=>att.type==='image').forEach(att=>items.push({att,act}));
  });
  if(!items.length){showNotif('当前没有可导出的图片',true);return;}
  showNotif(`正在打包 ${items.length} 张图片，请稍候…`);

  try{
    await new Promise((resolve,reject)=>{
      if(window.JSZip){resolve();return;}
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=resolve; s.onerror=reject;
      document.head.appendChild(s);
    });
    const zip=new JSZip();
    const folderName=game==='all'?'全部游戏':game;
    const folder=zip.folder(folderName);
    const safe=(s)=>s.replace(/[\/\\:*?"<>|]/g,'_').slice(0,30);

    for(let i=0;i<items.length;i++){
      const {att,act}=items[i];
      const fname=`${String(i+1).padStart(3,'0')}_${safe(act?.name||'未知活动')}.jpg`;
      if(att.data.startsWith('data:')){
        // base64 stored locally
        const base64=att.data.split(',')[1];
        folder.file(fname, base64, {base64:true});
      } else {
        // URL from Supabase Storage — fetch the blob
        try{
          const resp=await fetch(att.data);
          const blob=await resp.blob();
          folder.file(fname, blob);
        }catch(e){
          console.warn('Failed to fetch image for export',att.data,e);
        }
      }
    }
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:3}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`${folderName}_图片_${ts().replace(/[: ]/g,'-')}.zip`;
    a.click();
    URL.revokeObjectURL(url);
    showNotif(`✓ 已打包导出 ${items.length} 张图片`);
  }catch(e){
    console.warn('Export failed',e);
    showNotif(`导出失败：${e.message}`,true);
  }
}

function doDelete(id){
  const a=findActivityByRef(id);
  if(!a){ closeModal(); return; }
  const key = getActivityRef(a);
  // Record tombstone BEFORE filtering — so merge never brings this back
  if(key) _deletedKeys[key] = Date.now();
  activities=activities.filter(x=>getActivityRef(x)!==id && x.id!==id);
  if(a)addLog(`删除了《${a.game}》${a.name}`, {undo:{kind:'activity_delete', activity:deepClone(a)}});
  closeModal();showNotif('删除成功');
  saveData(); // save immediately so tombstone reaches cloud ASAP
  renderMain();
}

// ===================== DAILY RECOMMENDATIONS =====================
// 每次进入「每日推荐」Tab，从活动库随机抽6条展示
// 抽取策略：优先当前进行中 + 即将开始的活动，以重要活动优先
function renderDailyView(container){
  const now=TODAY;

  // Pool: active + upcoming, important first, then shuffle rest
  const active  = activities.filter(a=>new Date(a.startTime)<=now&&new Date(a.endTime)>=now);
  const upcoming= activities.filter(a=>new Date(a.startTime)>now);
  const ended   = activities.filter(a=>new Date(a.endTime)<now);

  const important = [...active,...upcoming,...ended].filter(a=>a.important);
  const rest      = [...active,...upcoming,...ended].filter(a=>!a.important);
  // Date-seeded shuffle — same day always produces same order
  // Seed = YYYYMMDD integer, giving consistent results all day
  const seed = parseInt(TODAY_STR.replace(/-/g,''));
  function seededRand(s){ s=Math.sin(s)*10000; return s-Math.floor(s); }
  const shuffle = arr => {
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(seededRand(seed+i)*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  };
  const picked = [...shuffle(important),...shuffle(rest)].slice(0,6);

  if(!picked.length){
    container.innerHTML=`<div class="daily-view"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px">
      <div style="font-size:40px">📋</div>
      <div style="font-size:14px">暂无活动数据</div>
      <div style="font-size:12px">先在「活动列表」录入活动，再来查看每日推荐</div>
    </div></div>`;
    return;
  }

  function getReason(a){
    const s=new Date(a.startTime),e=new Date(a.endTime);
    const dStart=Math.ceil((s-now)/86400000);
    const dEnd  =Math.ceil((e-now)/86400000);
    if(a.important) return '⭐ 重要活动，值得重点关注';
    if(s<=now&&e>=now){
      if(dEnd<=2) return `🔴 活动即将结束，仅剩 ${dEnd} 天`;
      if(dEnd<=7) return `🟡 活动进行中，还有 ${dEnd} 天结束`;
      return '🟢 活动进行中';
    }
    if(dStart<=3) return `🔵 即将在 ${dStart} 天后开始${a.preheat?'，预热已启动':''}`;
    if(dStart<=7) return `⏳ 本周开始，提前关注`;
    return '📌 近期活动，建议追踪';
  }

  // Get up to 3 image attachments for an activity
  function getImages(actId){
    return (attachments[actId]||[]).filter(att=>att.type==='image').slice(0,3);
  }

  const cards=picked.map((a,i)=>{
    const st=getStatus(a);
    const c=TYPE_COLORS[a.type]||{bg:'#f3f4f6',text:'#6b7280',border:'#d1d5db'};
    const imgs=getImages(a.id);
    const ssId=`ss-${a.id}-${i}`;

    // Slideshow HTML — only render if there are images
    const slideshowHtml = imgs.length>0 ? `
      <div class="dc-slideshow" id="${ssId}">
        ${imgs.map((img,si)=>`
          <div class="dc-slide${si===0?' active':''}" data-idx="${si}">
            <img src="${img.data}" alt="${img.name}" loading="lazy">
          </div>`).join('')}
        ${imgs.length>1?`<div class="dc-dots">
          ${imgs.map((_,si)=>`<div class="dc-dot${si===0?' active':''}" data-ss="${ssId}" data-idx="${si}"></div>`).join('')}
        </div>`:''}
      </div>` : '';

    return`<div class="daily-card ${a.important?'important-card':''}" onclick="showDetail('${getActivityRef(a)}')">
      ${slideshowHtml}
      <div class="daily-card-body">
        <div class="daily-card-num">${i+1}</div>
        <div class="daily-card-meta">
          <span class="tag" style="background:${c.bg};color:${c.text}">${a.type}</span>
          <span class="tag" style="background:${st.bg};color:${st.color}">${st.label}</span>
          <span style="font-size:10px;color:var(--text3)">${a.game}</span>
        </div>
        <div class="daily-card-name">${a.important?'⭐ ':''}${a.name}</div>
        <div class="daily-card-detail">
          <span>📅 ${a.startTime.split(' ')[0]} ~ ${a.endTime.split(' ')[0]}</span>
          ${a.intensity?`&nbsp;·&nbsp;<span>💪 ${a.intensity}</span>`:''}
          ${a.channels?.length?`&nbsp;·&nbsp;<span>📡 ${a.channels.join('/')}</span>`:''}
        </div>
        <div class="daily-card-reason">${getReason(a)}</div>
      </div>
    </div>`;
  }).join('');

  const importantCount=activities.filter(a=>a.important).length;

  container.innerHTML=`<div class="daily-view">
    <div class="daily-header">
      <div>
        <div class="daily-title">📋 每日活动推荐</div>
        <div style="font-size:11px;color:var(--text3);margin-top:3px">
          从 ${activities.length} 条活动中抽选 ${picked.length} 条
          ${importantCount?`，其中 ${importantCount} 条重要活动优先展示`:''}
          · 每日固定，次日自动更新
        </div>
      </div>
      <button class="btn primary" onclick="renderMain()" style="font-size:12px">🔀 换一批</button>
    </div>
    <div class="daily-grid">${cards}</div>
  </div>`;

  // Start auto-slideshows for cards that have images
  picked.forEach((a,i)=>{
    const imgs=getImages(a.id);
    if(imgs.length<=1) return;
    const ssId=`ss-${a.id}-${i}`;
    let cur=0;
    const timer=setInterval(()=>{
      const ss=document.getElementById(ssId);
      if(!ss){ clearInterval(timer); return; } // card removed
      const slides=ss.querySelectorAll('.dc-slide');
      const dots=ss.querySelectorAll('.dc-dot');
      slides[cur].classList.remove('active');
      dots[cur]?.classList.remove('active');
      cur=(cur+1)%slides.length;
      slides[cur].classList.add('active');
      dots[cur]?.classList.add('active');
    }, 3000);
  });
}
// ===================== END DAILY RECOMMENDATIONS =====================

// ===================== REPORT MODULE =====================

function genReportId(){ return 'rpt_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

// ── Render Report View ──
function renderReportView(container){
  const canEdit = currentUser.role!=='viewer';
  const q = (document.getElementById('report-search-val')||{value:''}).value||'';

  // Build filtered list
  let list = reports.filter(r=>{
    if(reportTagFilter!=='all' && !r.tags.includes(reportTagFilter)) return false;
    if(q){
      const ql=q.toLowerCase();
      const inTitle=r.title.toLowerCase().includes(ql);
      const inDesc=(r.desc||'').toLowerCase().includes(ql);
      const inKw=(r.keywords||'').toLowerCase().includes(ql);
      const inTags=r.tags.some(t=>t.toLowerCase().includes(ql));
      if(!inTitle&&!inDesc&&!inKw&&!inTags) return false;
    }
    return true;
  });

  // Tag counts for sidebar
  const tagCounts={};
  reports.forEach(r=>r.tags.forEach(t=>tagCounts[t]=(tagCounts[t]||0)+1));

  const tagColor = t => REPORT_TAG_COLORS[t]||{bg:'#f3f4f6',text:'#6b7280'};

  const sidebarHtml = `
    <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;padding:0 2px">标签筛选</div>
    <button class="rtag-filter ${reportTagFilter==='all'?'active':''}" onclick="reportTagFilter='all';renderMain()">
      全部报告 <span style="font-size:10px;color:var(--text3)">${reports.length}</span>
    </button>
    ${REPORT_TAGS.map(t=>`
      <button class="rtag-filter ${reportTagFilter===t?'active':''}" onclick="reportTagFilter='${t}';renderMain()">
        <span class="rtag" style="background:${tagColor(t).bg};color:${tagColor(t).text};pointer-events:none">${t}</span>
        <span style="font-size:10px;color:var(--text3);margin-left:auto">${tagCounts[t]||0}</span>
      </button>`).join('')}`;

  const cardsHtml = list.length===0
    ? `<div class="report-empty">
        <div style="font-size:40px">📄</div>
        <div style="font-size:14px">${reports.length===0?'暂无调研报告':'没有匹配的报告'}</div>
        <div style="font-size:12px">${reports.length===0?'点击右上角「上传报告」添加第一份报告':'尝试修改搜索关键词或标签筛选'}</div>
      </div>`
    : list.map(r=>{
        const thumbHtml = r.fileType==='pdf'
          ? (r.thumb
              ? `<img src="${r.thumb}" style="width:100%;height:100%;object-fit:cover">`
              : `<div class="pdf-icon">📄</div>`)
          : r.fileType==='image'
          ? `<img src="${r.fileData}" style="width:100%;height:100%;object-fit:cover">`
          : `<div style="font-size:36px;opacity:.5">🔗</div>`;
        return`<div class="report-card" onclick="showReportDetail('${r.id}')">
          <div class="report-card-thumb">${thumbHtml}</div>
          <div class="report-card-body">
            <div class="report-card-title">${r.title}</div>
            <div class="report-card-meta">${r.uploader} · ${r.uploadTime.split(' ')[0]}</div>
            <div class="report-tags">
              ${r.tags.map(t=>`<span class="rtag" style="background:${tagColor(t).bg};color:${tagColor(t).text}">${t}</span>`).join('')}
            </div>
          </div>
        </div>`;
      }).join('');

  container.innerHTML=`<div class="report-view">
    <div class="report-sidebar">${sidebarHtml}</div>
    <div class="report-main">
      <div class="report-toolbar">
        <div style="display:flex;align-items:center;gap:6px;flex:1;max-width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:0 10px">
          <span style="color:var(--text3)">⌕</span>
          <input id="report-search-val" type="text" placeholder="搜索标题、关键词、标签…" value="${q}"
            style="border:none;background:transparent;outline:none;font-size:12px;padding:7px 0;flex:1;color:var(--text)"
            oninput="renderMain()">
        </div>
        <span style="font-size:11px;color:var(--text3)">${list.length} 份报告</span>
        ${canEdit?`<button class="btn primary" onclick="showUploadReportDialog()" style="margin-left:auto">+ 上传报告</button>`:''}
      </div>
      ${list.length===0&&reports.length===0
        ?`<div class="report-empty">
            <div style="font-size:48px">📄</div>
            <div style="font-size:15px;font-weight:500">暂无调研报告</div>
            <div style="font-size:12px">支持上传 PDF、图片或粘贴链接</div>
            ${canEdit?`<button class="btn primary" onclick="showUploadReportDialog()" style="margin-top:8px">+ 上传第一份报告</button>`:''}
          </div>`
        :`<div class="report-grid">${cardsHtml}</div>`}
    </div>
  </div>`;
}

          <button class="btn ${!ov._linkMode?'primary':''}" id="rpt-file-btn" onclick="setRptMode(false)" style="font-size:11px">上传文件（PDF/图片）</button>
          <button class="btn ${ov._linkMode?'primary':''}" id="rpt-link-btn" onclick="setRptMode(true)" style="font-size:11px">粘贴链接</button>
        </div>
        <div id="rpt-file-area">
          <label style="display:block;border:2px dashed var(--border2);border-radius:7px;padding:14px;text-align:center;cursor:pointer;font-size:12px;color:var(--text2)">
            <input type="file" accept=".pdf,image/*" style="display:none" id="rpt-file-input" onchange="onRptFileSelect(event)">
            <span id="rpt-file-label">${r?'点击重新选择文件（当前已有文件）':'点击选择 PDF 或图片文件，最大 20MB'}</span>
          </label>
        </div>
        <div id="rpt-link-area" style="display:none">
          <input id="rpt-link-val" type="url" placeholder="https://..." value="${r?.fileType==='link'?r.fileData:''}">
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="saveReport('${editId||''}')">保存</button>
    </div>
  </div>`;
  ov._linkMode=false;
  ov._selectedTags=new Set(r?.tags||[]);
  ov._fileData=null; ov._fileType=null; ov._thumb=null;
  document.body.appendChild(ov);
}

function setRptMode(linkMode){
  const ov=document.getElementById('modal-overlay');
  if(ov) ov._linkMode=linkMode;
  document.getElementById('rpt-file-area').style.display=linkMode?'none':'';
  document.getElementById('rpt-link-area').style.display=linkMode?'':'none';
  document.getElementById('rpt-file-btn').className='btn'+(linkMode?'':' primary');
  document.getElementById('rpt-link-btn').className='btn'+(linkMode?' primary':'');
}

function toggleReportTagSel(tag){
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const sel=ov._selectedTags;
  const c=REPORT_TAG_COLORS[tag]||{bg:'#f3f4f6',text:'#6b7280'};
  const el=document.getElementById('rptag-'+tag.replace(/\s/g,'_'));
  if(sel.has(tag)){
    sel.delete(tag);
    if(el){el.style.background='var(--bg2)';el.style.color='var(--text3)';el.style.borderColor='var(--border2)';}
  } else {
    sel.add(tag);
    if(el){el.style.background=c.bg;el.style.color=c.text;el.style.borderColor=c.text+'44';}
  }
}

function onRptFileSelect(e){
  const file=e.target.files[0]; if(!file)return;
  if(file.size>20*1024*1024){showNotif('文件超过20MB限制',true);return;}
  const label=document.getElementById('rpt-file-label');
  if(label) label.textContent=`已选择：${file.name}（${(file.size/1024/1024).toFixed(1)}MB）`;
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    ov._fileData=ev.target.result;
    ov._fileType=file.type.startsWith('image/')?'image':'pdf';
    ov._thumb=ov._fileType==='image'?ev.target.result:null;
  };
  reader.readAsDataURL(file);
}

async function saveReport(editId){
  const title=(document.getElementById('rpt-title').value||'').trim();
  if(!title){showNotif('请填写报告标题',true);return;}
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const desc=document.getElementById('rpt-desc').value||'';
  const keywords=document.getElementById('rpt-kw').value||'';
  const tags=[...ov._selectedTags];
  const linkMode=ov._linkMode;
  const linkVal=(document.getElementById('rpt-link-val').value||'').trim();

  let fileData=ov._fileData, fileType=ov._fileType, thumb=ov._thumb;

  if(editId){
    // editing — keep old file if no new one selected
    const old=reports.find(r=>r.id===editId);
    if(!fileData&&old){ fileData=old.fileData; fileType=old.fileType; thumb=old.thumb; }
  }

  if(linkMode){
    if(!linkVal){showNotif('请填写报告链接',true);return;}
    fileData=linkVal; fileType='link'; thumb=null;
  } else if(!fileData){
    showNotif('请选择报告文件',true);return;
  }

  const now=ts();
  if(editId){
    const idx=reports.findIndex(r=>r.id===editId);
    if(idx>=0){
      reports[idx]={...reports[idx],title,desc,keywords,tags,fileData,fileType,thumb,modifier:currentUser.name,modifyTime:now};
      addLog(`编辑了调研报告「${title}」`);
      showNotif('报告已更新');
    }
  } else {
    reports.unshift({id:genReportId(),title,desc,keywords,tags,fileData,fileType,thumb,uploader:currentUser.name,uploadTime:now});
    addLog(`上传了调研报告「${title}」`);
    showNotif('报告上传成功');
  }
  closeModal(); saveData(); renderMain();
}

function confirmDeleteReport(id){
  const r=reports.find(x=>x.id===id); if(!r)return;

function doDeleteReport(id){

}

// ── Report Tag Management (in CollabView) ──
const REPORT_TAG_PRESETS=[
  {bg:'#fee2e2',text:'#991b1b'},{bg:'#dbeafe',text:'#1d4ed8'},{bg:'#dcfce7',text:'#166534'},
  {bg:'#ede9fe',text:'#5b21b6'},{bg:'#fef9c3',text:'#713f12'},{bg:'#ffedd5',text:'#9a3412'},
  {bg:'#fce7f3',text:'#9d174d'},{bg:'#ccfbf1',text:'#0f766e'},{bg:'#f0fdf4',text:'#14532d'},
  {bg:'#eff6ff',text:'#1e40af'},{bg:'#fdf4ff',text:'#6b21a8'},{bg:'#fff7ed',text:'#9a3412'}
];

function showAddReportTagDialog(){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  const swatches=REPORT_TAG_PRESETS.map((c,i)=>
    `<div onclick="selectRptColor(${i})" id="rpc-${i}" style="width:22px;height:22px;border-radius:4px;background:${c.bg};border:2px solid ${i===0?c.text:'transparent'};cursor:pointer"></div>`

function selectRptColor(idx){
  const ov=document.getElementById('modal-overlay'); if(!ov)return;
  const old=ov._selectedRptColorIdx;
  const c=REPORT_TAG_PRESETS[idx];
  document.getElementById(`rpc-${old}`)?.style.setProperty('border','2px solid transparent');

}

function doAddReportTag(){
  const name=(document.getElementById('new-rpt-tag').value||'').trim();
  if(!name){showNotif('标签名称不能为空',true);return;}
  if(REPORT_TAGS.includes(name)){showNotif(`「${name}」已存在`,true);return;}
  const ov=document.getElementById('modal-overlay');
  const c=REPORT_TAG_PRESETS[ov?._selectedRptColorIdx||0];
  REPORT_TAGS.push(name);
  REPORT_TAG_COLORS[name]=c;
  addLog(`新增了报告标签「${name}」`);
  showNotif(`标签「${name}」已新增`);
  closeModal(); saveData(); renderMain();
}

function showEditReportTagDialog(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const oldName=REPORT_TAGS[idx];
  const curC=REPORT_TAG_COLORS[oldName]||REPORT_TAG_PRESETS[0];
  const curIdx=REPORT_TAG_PRESETS.findIndex(c=>c.bg===curC.bg);
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  const swatches=REPORT_TAG_PRESETS.map((c,i)=>
    `<div onclick="selectRptColor(${i})" id="rpc-${i}" style="width:22px;height:22px;border-radius:4px;background:${c.bg};border:2px solid ${i===curIdx?c.text:'transparent'};cursor:pointer"></div>`
  ).join('');
  ov._selectedRptColorIdx=curIdx>=0?curIdx:0;
  ov.innerHTML=`<div class="confirm-box" style="width:420px;text-align:left">
    <div class="confirm-title" style="margin-bottom:14px">修改报告标签</div>
    <div class="fg full" style="margin-bottom:10px">
      <div class="flabel">标签名称 <span class="req">*</span></div>
      <input id="edit-rpt-tag" type="text" value="${oldName}">
    </div>
    <div class="fg full" style="margin-bottom:16px">
      <div class="flabel">标签颜色</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${swatches}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="doEditReportTag(${idx},'${oldName}')">保存</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>{const el=document.getElementById('edit-rpt-tag');if(el){el.focus();el.select();}},50);
}

function doEditReportTag(idx,oldName){
  const newName=(document.getElementById('edit-rpt-tag').value||'').trim();
  if(!newName){showNotif('标签名称不能为空',true);return;}
  if(newName!==oldName&&REPORT_TAGS.includes(newName)){showNotif(`「${newName}」已存在`,true);return;}
  const ov=document.getElementById('modal-overlay');
  const c=REPORT_TAG_PRESETS[ov?._selectedRptColorIdx||0];
  REPORT_TAGS[idx]=newName;
  REPORT_TAG_COLORS[newName]=c;
  if(newName!==oldName){
    delete REPORT_TAG_COLORS[oldName];
    reports.forEach(r=>{r.tags=r.tags.map(t=>t===oldName?newName:t);});
  }
  addLog(`将报告标签「${oldName}」改为「${newName}」`);
  showNotif('标签已更新');
  closeModal(); saveData(); renderMain();
}

function confirmDeleteReportTag(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return;}
  const name=REPORT_TAGS[idx];
  const count=reports.filter(r=>r.tags.includes(name)).length;
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='modal-overlay';
  ov.innerHTML=`<div class="confirm-box">
    <div class="confirm-title">确认删除标签</div>
    <div class="confirm-desc">确定删除标签「${name}」吗？${count>0?`<br><span style="color:#d93025">${count} 份报告使用了此标签，删除后标签会从这些报告上移除。</span>`:'该标签暂无报告使用。'}</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn danger" onclick="doDeleteReportTag(${idx})">确认删除</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}

function doDeleteReportTag(idx){
  const name=REPORT_TAGS[idx];
  REPORT_TAGS.splice(idx,1);
  delete REPORT_TAG_COLORS[name];
  reports.forEach(r=>{r.tags=r.tags.filter(t=>t!==name);});
  addLog(`删除了报告标签「${name}」`);
  showNotif(`标签「${name}」已删除`);
  closeModal(); saveData(); renderMain();
}
// ===================== END REPORT MODULE =====================

// ===================== INIT =====================
initStatusBar();

(function(){
  const ld=document.createElement('div');
  ld.id='cloud-loader';
  ld.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:14px';
  ld.innerHTML=`
    <div style="width:38px;height:38px;border:3px solid #e8e6ff;border-top-color:#5046e4;border-radius:50%;animation:spin .7s linear infinite"></div>
    <div style="font-size:13px;color:#5046e4;font-weight:500">正在初始化…</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  document.body.appendChild(ld);
})();

async function init(){
  await loadData();
  getSB(); // initialize client
  const ld=document.getElementById('cloud-loader');

  if(getSB()){
    // Supabase is configured — check if already logged in
    const loggedIn = await checkAuthState();
    if(ld) ld.remove();
    if(!loggedIn){
      // Show login/register screen — all visitors see this, no admin bypass
      currentUser={id:'',name:'',role:'none',email:''};
      updateTopbarUser();
      showAuthOverlay('login');
    }
    // handleAuthUser() calls renderMain() on successful login
  } else {
    // Supabase not yet configured in this file
    // Only the admin who is setting up for the first time should see the setup form
    if(ld) ld.remove();
    currentUser={id:'',name:'',role:'none',email:''};
    updateTopbarUser();
    showAuthOverlay('nosupabase');
  }
}

init();
</script>
