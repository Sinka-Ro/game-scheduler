<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞品游戏运营活动排期工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f6;--bg3:#efefed;
  --text:#1a1a1a;--text2:#595959;--text3:#9b9b9b;
  --border:#e5e5e3;--border2:#d0d0ce;
  --primary:#5046e4;--primary-light:#ece9ff;
  --row-h:32px;--label-w:160px;--day-w:36px;
  --header-h:30px;--subheader-h:22px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;font-size:13px;color:var(--text);background:var(--bg);overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;gap:12px}
.logo{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap}
.badge-beta{font-size:10px;padding:1px 6px;border-radius:10px;background:#e8e6ff;color:#5046e4;margin-left:6px;font-weight:500}
.topbar-mid{display:flex;gap:0;border-bottom:none}
.nav-tab{padding:0 14px;height:48px;display:flex;align-items:center;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500}
.nav-tab:hover:not(.active){color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{padding:5px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border2);cursor:pointer;background:var(--bg);color:var(--text);white-space:nowrap;transition:background .1s;line-height:1.5}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn.primary:hover{background:#3d34c8}
.btn.sm{padding:3px 8px;font-size:11px}
.btn.danger{color:#d93025;border-color:#f5c6c3}
.btn.danger:hover{background:#fce8e6}
.avatar{width:26px;height:26px;border-radius:50%;background:#e8e6ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#5046e4;flex-shrink:0;cursor:pointer}

/* MAIN AREA */
#mainArea{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ===== LIST VIEW ===== */
.list-view{display:flex;height:100%;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;padding:10px 8px;gap:8px;overflow-y:auto}
.sidebar-section-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;padding:4px 6px 2px}
.filter-item{padding:5px 8px;font-size:12px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;color:var(--text2);transition:background .1s}
.filter-item:hover{background:var(--bg2)}
.filter-item.active{background:var(--primary-light);color:var(--primary);font-weight:500}
.filter-count{font-size:11px;opacity:.7}
.list-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.list-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.search-wrap{position:relative}
.search-wrap input{padding:5px 10px 5px 28px;font-size:12px;border:1px solid var(--border2);border-radius:5px;outline:none;background:var(--bg);color:var(--text);width:220px}
.search-wrap input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.list-table-wrap{flex:1;overflow:auto}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.stat-card{background:var(--bg2);border-radius:6px;padding:10px 14px}
.stat-card .val{font-size:20px;font-weight:600;line-height:1.2}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:2px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:7px 12px;font-size:11px;font-weight:500;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;position:sticky;top:0;z-index:5}
td{padding:7px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:var(--bg2)}
.tag{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:500}

/* ===== GANTT CALENDAR ===== */
.cal-view{display:flex;flex-direction:column;height:100%;overflow:hidden}
.cal-toolbar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;flex-wrap:wrap}
.cal-title{font-size:13px;font-weight:600;white-space:nowrap}
.game-switcher{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden;flex-shrink:0}
.game-tab{padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);background:var(--bg);border-right:1px solid var(--border2);transition:background .1s;white-space:nowrap}
.game-tab:last-child{border-right:none}
.game-tab.active{background:var(--primary);color:#fff;font-weight:500}
.game-tab:hover:not(.active){background:var(--bg2)}
.month-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.mnav-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2)}
.mnav-btn:hover{background:var(--bg2)}
.mnav-label{font-size:12px;min-width:64px;text-align:center;color:var(--text)}

.gantt-container{flex:1;display:flex;overflow:hidden}
.gantt-left{width:var(--label-w);flex-shrink:0;display:flex;flex-direction:column;border-right:2px solid var(--border2);position:relative;z-index:10;background:var(--bg)}
.gantt-right{flex:1;overflow-x:auto;overflow-y:auto;position:relative}
.gantt-right-inner{min-width:max-content;position:relative}

/* Frozen left headers */
.left-top{height:calc(var(--header-h) + var(--subheader-h));flex-shrink:0;border-bottom:2px solid var(--border2);display:flex;align-items:flex-end;padding:0 10px 6px;font-size:11px;color:var(--text3);font-weight:500;background:var(--bg2)}
.left-rows{flex:1;overflow-y:hidden;overflow-x:hidden}
.left-cat-header{height:26px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;letter-spacing:.3px;border-bottom:1px solid var(--border);flex-shrink:0}
.left-row{height:var(--row-h);display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.left-row:hover{background:var(--bg2)}

/* Right header */
.right-header{height:calc(var(--header-h) + var(--subheader-h));border-bottom:2px solid var(--border2);background:var(--bg2);position:sticky;top:0;z-index:8}
.week-header-row{height:var(--header-h);display:flex;border-bottom:1px solid var(--border)}
.week-block{display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);font-weight:600;border-right:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.day-header-row{height:var(--subheader-h);display:flex}
.day-hcell{width:var(--day-w);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);border-right:1px solid var(--border);cursor:default}
.day-hcell.weekend{color:#d93025;background:rgba(217,48,37,.04)}
.day-hcell.today{background:#e8e6ff;color:var(--primary);font-weight:700}

/* Right body rows */
.right-cat-header{height:26px;border-bottom:1px solid var(--border);display:flex;position:relative}
.right-cat-header .day-bg{width:var(--day-w);flex-shrink:0;border-right:1px solid var(--border);height:100%}
.right-row{height:var(--row-h);border-bottom:1px solid var(--border);display:flex;position:relative}
.right-row .day-bg{width:var(--day-w);flex-shrink:0;border-right:1px solid var(--border);height:100%;flex-shrink:0}
.right-row .day-bg.weekend{background:rgba(0,0,0,.018)}
.right-row .day-bg.today{background:rgba(80,70,228,.06)}
.right-row:hover .day-bg{background:rgba(0,0,0,.025)}
.right-row:hover .day-bg.today{background:rgba(80,70,228,.1)}

/* Activity bars */
.act-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:2;transition:filter .1s;pointer-events:all}
.act-bar:hover{filter:brightness(.93)}
.preheat-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;border:1.5px dashed;display:flex;align-items:center;padding:0 5px;font-size:10px;white-space:nowrap;overflow:hidden;cursor:pointer;z-index:1;opacity:.7}

/* Today line */
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--primary);z-index:9;pointer-events:none}

/* Scrollbar sync helper */
.gantt-left .left-rows{scrollbar-width:none}
.gantt-left .left-rows::-webkit-scrollbar{display:none}

/* Tooltip */
.tip{position:fixed;background:var(--bg);border:1px solid var(--border2);border-radius:7px;padding:10px 14px;font-size:12px;z-index:9999;pointer-events:none;max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none}
.tip-title{font-weight:600;font-size:13px;margin-bottom:6px;color:var(--text)}
.tip-row{color:var(--text2);margin-bottom:3px;line-height:1.5}
.tip-row span{color:var(--text);font-weight:500}

/* Stats view */
.stats-view{padding:20px;overflow-y:auto;height:100%}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-big{background:var(--bg2);border-radius:8px;padding:14px 16px}
.stat-big .num{font-size:24px;font-weight:700}
.stat-big .lbl{font-size:11px;color:var(--text3);margin-top:3px}
.stats-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px}
.panel-title{font-size:13px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--text3);min-width:20px;text-align:right}

/* Collab view */
.collab-view{padding:20px;overflow-y:auto;height:100%}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg);border-radius:10px;width:660px;max-width:95vw;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.flabel{font-size:11px;color:var(--text2);font-weight:600}
.flabel .req{color:#d93025}
input[type=text],input[type=datetime-local],select,textarea{font-size:12px;padding:6px 9px;border:1px solid var(--border2);border-radius:5px;outline:none;color:var(--text);background:var(--bg);font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:64px}
.close-x{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px}
.close-x:hover{background:var(--bg2);color:var(--text)}
.confirm-box{background:var(--bg);border-radius:10px;padding:28px;width:380px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.confirm-title{font-size:15px;font-weight:600;margin-bottom:8px}
.confirm-desc{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}

/* Notif */
.notif{position:fixed;top:16px;right:16px;z-index:2000;background:var(--bg);border:1px solid;border-radius:7px;padding:10px 16px;font-size:13px;max-width:340px;transition:opacity .3s;display:none;box-shadow:var(--shadow)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Media library */
.media-view{padding:0;overflow:hidden;height:100%;display:flex;flex-direction:column}
.media-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.media-game-tabs{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.media-game-tab{padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text2);background:var(--bg);border-right:1px solid var(--border2);white-space:nowrap}
.media-game-tab:last-child{border-right:none}
.media-game-tab.active{background:var(--primary);color:#fff;font-weight:500}
.media-game-tab:hover:not(.active){background:var(--bg2)}
.media-grid{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;align-content:start}
.media-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.media-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1)}
.media-thumb{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--bg2)}
.media-thumb-video{width:100%;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;background:#1a1a2e;font-size:28px}
.media-card-body{padding:8px 10px}
.media-card-name{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.media-card-meta{font-size:10px;color:var(--text3);margin-top:2px}
/* Attachment zone in detail modal */
.attach-zone{border:2px dashed var(--border2);border-radius:8px;padding:18px 14px;text-align:center;cursor:pointer;transition:border-color .15s;background:var(--bg2);position:relative}
.attach-zone:hover,.attach-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.attach-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.attach-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.attach-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg2);border-radius:6px;border:1px solid var(--border)}
.attach-thumb{width:44px;height:34px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--bg3)}
.attach-thumb-vid{width:44px;height:34px;border-radius:4px;flex-shrink:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:16px}
.attach-info{flex:1;min-width:0}
.attach-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-size{font-size:10px;color:var(--text3)}
.attach-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;border-radius:3px;flex-shrink:0}
.attach-del:hover{background:var(--bg3);color:#d93025}
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.lightbox img,.lightbox video{max-width:92vw;max-height:80vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-caption{color:#e5e7eb;font-size:13px;max-width:600px;text-align:center}
.lightbox-nav{display:flex;gap:8px}
.lightbox-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:12px}
.lightbox-nav button:hover{background:rgba(255,255,255,.3)}
/* ── Auth ── */
.auth-overlay{position:fixed;inset:0;background:#f0eff7;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.auth-card{background:#fff;border:1px solid #ddd;border-radius:14px;width:100%;max-width:420px;padding:36px 40px;box-shadow:0 8px 32px rgba(80,70,228,.1)}
.auth-logo{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-.3px}
.auth-sub{font-size:12px;color:#9b9b9b;margin:4px 0 26px}
.auth-tabs{display:flex;border-bottom:1px solid #e5e5e3;margin-bottom:22px}
.atab{padding:8px 18px;font-size:13px;cursor:pointer;color:#9b9b9b;border-bottom:2px solid transparent;transition:color .15s}
.atab.active{color:#5046e4;border-bottom-color:#5046e4;font-weight:500}
.afield{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.alabel{font-size:11px;font-weight:600;color:#595959}
.ainput{padding:9px 12px;border:1px solid #d0d0ce;border-radius:7px;font-size:13px;outline:none;font-family:inherit;width:100%;transition:border-color .15s}
.ainput:focus{border-color:#5046e4;box-shadow:0 0 0 3px rgba(80,70,228,.1)}
.abtn{width:100%;padding:11px;background:#5046e4;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit;letter-spacing:.2px}
.abtn:hover{background:#3d34c8}
.abtn:disabled{background:#c7c4f0;cursor:not-allowed}
.amsg{font-size:12px;padding:9px 12px;border-radius:7px;margin-top:10px;line-height:1.6}
.amsg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.amsg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.amsg.warn{background:#fffbeb;color:#713f12;border:1px solid #fde68a}
/* role badges */
.rbadge{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.rb-admin{background:#fee2e2;color:#991b1b}
.rb-editor{background:#dbeafe;color:#1d4ed8}
.rb-viewer{background:#f3f4f6;color:#6b7280}
.rb-pending{background:#fffbeb;color:#713f12}
/* ── AI Assistant ── */
.ai-view{display:flex;height:100%;overflow:hidden;background:var(--bg2)}
.ai-left{width:300px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.ai-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ai-section-hd{padding:12px 16px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between}
.ai-rec-list{flex:1;overflow-y:auto;padding:12px}
.ai-rec-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.ai-rec-card:hover{border-color:#5046e4}
.ai-rec-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;margin-bottom:6px}
.ai-rec-title{font-size:13px;font-weight:500;margin-bottom:5px;line-height:1.4}
.ai-rec-insight{font-size:11px;color:var(--text2);line-height:1.6}
.ai-chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:82%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.65}
.ai-msg.user{background:#5046e4;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.ai-msg.assistant{background:var(--bg);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
.ai-msg.loading{background:var(--bg2);border:1px solid var(--border);color:var(--text3);align-self:flex-start}
.ai-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg)}
.ai-input{flex:1;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;font-size:13px;outline:none;font-family:inherit;resize:none;height:40px;overflow:hidden}
.ai-input:focus{border-color:#5046e4;box-shadow:0 0 0 3px rgba(80,70,228,.08)}

// ===================== AUTH MODULE =====================
// Supabase Auth + user_profiles table.
// user_profiles schema:
//   id uuid PK (= auth.users.id)
//   email text, name text, role text default 'pending', reason text, created_at timestamptz
// Roles: pending | viewer | editor | admin
//
// SQL to run once in Supabase SQL Editor:
// -------------------------------------------------
// create table if not exists user_profiles (
//   id uuid primary key references auth.users(id) on delete cascade,
//   email text not null, name text, role text not null default 'pending',
//   reason text default '', created_at timestamptz default now()
// );
// alter table user_profiles enable row level security;
// create policy "own profile" on user_profiles for select using (auth.uid()=id);
// create policy "own insert"  on user_profiles for insert with check (auth.uid()=id);
// create policy "admin all"   on user_profiles using (
//   (select role from user_profiles where id=auth.uid())='admin'
// );
// -------------------------------------------------

let _sb = null; // Supabase client instance

function getSB(){
  if(_sb) return _sb;
  // Priority 1: hardcoded values in HTML (set by admin before deploying)
  if(_sbUrl && _sbKey && window.supabase){
    _sb = window.supabase.createClient(_sbUrl, _sbKey);
    return _sb;
  }
  // Priority 2: localStorage (used during initial setup by admin)
  const cfg = lsLoad();
  if(cfg && cfg._sbUrl && cfg._sbKey && window.supabase){
    _sbUrl = cfg._sbUrl; _sbKey = cfg._sbKey;
    _sb = window.supabase.createClient(_sbUrl, _sbKey);
  }
  return _sb;
}

// ── Auth UI ──
function authTab(tab){
  ['login','reg'].forEach(t=>{
    document.getElementById(`atab-${t}`).classList.toggle('active',t===tab);
    document.getElementById(`aform-${t}`).style.display=t===tab?'':'none';
  });
  document.getElementById('aform-pending').style.display='none';
}

function setAuthMsg(elId,msg,type){
  document.getElementById(elId).innerHTML=msg?`<div class="amsg ${type}">${msg}</div>`:'';
}

async function authLogin(){
  const sb=getSB();
  if(!sb){showAuthMsg('请先在「存储设置」中配置 Supabase','err','login');return;}
  const email=document.getElementById('a-email').value.trim();
  const pwd=document.getElementById('a-pwd').value;
  if(!email||!pwd){setAuthMsg('a-login-msg','请填写邮箱和密码','err');return;}
  const btn=document.getElementById('a-login-btn');
  btn.disabled=true;btn.textContent='登录中…';
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
    if(error) throw new Error(error.message==='Invalid login credentials'?'邮箱或密码错误，请重试':error.message);
    await handleAuthUser(data.user);
  }catch(e){
    setAuthMsg('a-login-msg',e.message,'err');
  }finally{
    btn.disabled=false;btn.textContent='登录';
  }
}

async function authRegister(){
  const sb=getSB();
  if(!sb){setAuthMsg('a-reg-msg','请先配置 Supabase（底部「存储设置」）','err');return;}
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pwd=document.getElementById('r-pwd').value;
  const reason=document.getElementById('r-reason').value.trim();
  if(!name||!email||!pwd){setAuthMsg('a-reg-msg','请填写所有必填项','err');return;}
  if(pwd.length<6){setAuthMsg('a-reg-msg','密码至少需要6位','err');return;}
  const btn=document.getElementById('a-reg-btn');
  btn.disabled=true;btn.textContent='提交中…';
  try{
    const {data,error}=await sb.auth.signUp({email,password:pwd,options:{data:{display_name:name}}});
    if(error) throw new Error(error.message);
    if(data.user){
      await sb.from('user_profiles').upsert({id:data.user.id,email,name,role:'pending',reason});
      // Write pending notif into opLogs for admin visibility
      opLogs.unshift({time:ts(),user:'系统',action:`新账号申请：${name}（${email}）${reason?'，说明：'+reason:''}`});
      saveData();
    }
    setAuthMsg('a-reg-msg','✓ 申请已提交！请等待管理员审批，通过后刷新页面登录。','ok');
  }catch(e){
    setAuthMsg('a-reg-msg','注册失败：'+e.message,'err');
  }finally{
    btn.disabled=false;btn.textContent='提交申请';
  }
}

async function authLogout(){
  const sb=getSB();
  if(sb) await sb.auth.signOut().catch(()=>{});
  currentUser={id:'',name:'',role:'none',email:''};
  updateTopbarUser();
  showAuthOverlay('login');
}

async function handleAuthUser(user){
  if(!user) return;
  const sb=getSB();
  const {data:prof,error}=await sb.from('user_profiles').select('*').eq('id',user.id).single();
  if(error||!prof){
    // Profile missing — create pending
    await sb.from('user_profiles').upsert({id:user.id,email:user.email,name:user.user_metadata?.display_name||user.email.split('@')[0],role:'pending',reason:''});
    showPendingState();return;
  }
  if(prof.role==='pending'||prof.role==='revoked'){
    showAuthOverlay('pending');
    if(prof.role==='revoked'){
      const el=document.getElementById('aform-pending');
      if(el){const m=el.querySelector('.amsg');if(m)m.textContent='❌ 您的账号访问权限已被撤销，如有疑问请联系管理员。';}
    }
    return;
  }
  currentUser={id:user.id,name:prof.name||prof.email,role:prof.role,email:prof.email};
  document.getElementById('auth-overlay').style.display='none';
  updateTopbarUser();
  addLog('登录系统');
  renderMain();
  if(prof.role==='admin') checkPendingApprovals();
  // Upcoming activity reminder
  setTimeout(()=>{
    const soon=activities.filter(a=>{
      const d=(new Date(a.startTime)-TODAY)/86400000;
      return d>0&&d<=3;
    });
    if(soon.length) showNotif(`提醒：《${soon[0].game}》「${soon[0].name}」将于 ${Math.ceil((new Date(soon[0].startTime)-TODAY)/86400000)} 天后开始`);
  },800);
}

function showPendingState(revoked=false){
  showAuthOverlay('pending');
  if(revoked){
    const el=document.getElementById('aform-pending');
    if(el){const m=el.querySelector('.amsg');if(m)m.textContent='❌ 您的账号访问权限已被撤销，如有疑问请联系管理员。';}
  }
}

function updateTopbarUser(){
  const av=document.getElementById('userAvatar');
  const un=document.getElementById('userName');
  const addBtn=document.getElementById('add-btn');
  if(av) av.textContent=currentUser.name?currentUser.name[0].toUpperCase():'?';
  if(un) un.textContent=(currentUser.name||'未登录')+' ▾';
  // Hide add button for non-editors and anyone not properly authenticated
  const canAdd = currentUser.id && currentUser.role==='editor'||currentUser.role==='admin';
  if(addBtn) addBtn.style.display=canAdd?'':'none';
}

async function checkPendingApprovals(){
  const sb=getSB();if(!sb)return;
  const {data}=await sb.from('user_profiles').select('id').eq('role','pending');
  if(data&&data.length>0)
    setTimeout(()=>showNotif(`有 ${data.length} 个账号申请待审批，请前往「协作管理」处理`),800);
}

async function checkAuthState(){
  const sb=getSB();if(!sb)return false;
  const {data:{session}}=await sb.auth.getSession().catch(()=>({data:{session:null}}));
  if(session?.user){await handleAuthUser(session.user);return true;}
  return false;
}

  const pending=profiles.filter(p=>p.role==='pending');

        <span style="background:#fef9c3;border:1px solid #fde68a;color:#713f12;font-size:10px;padding:1px 7px;border-radius:10px">${pending.length}</span>
      </div>
      <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;overflow:hidden">
        ${pending.map(p=>`

  wrap.innerHTML=pendingSection+activeSection+`<div style="margin-top:8px;text-align:right"><button class="btn sm" onclick="loadAndRenderUsers()">刷新列表</button></div>`;

async function approveUser(id,role,name){
  const sb=getSB();if(!sb)return;
  await sb.from('user_profiles').update({role}).eq('id',id);
  addLog(`审批通过了 ${name} 的申请，角色：${role==='editor'?'编辑者':'查看者'}`);
  showNotif(`已批准 ${name}，角色：${role==='editor'?'编辑者':'查看者'}`);
  loadAndRenderUsers();
}

async function rejectUser(id,name){
  const sb=getSB();if(!sb)return;
  await sb.from('user_profiles').update({role:'revoked'}).eq('id',id);
  addLog(`拒绝了 ${name} 的账号申请`);
  showNotif(`已拒绝 ${name} 的申请`);
  loadAndRenderUsers();
}

async function changeUserRole(id,role,name){
  const sb=getSB();if(!sb)return;
  await sb.from('user_profiles').update({role}).eq('id',id);
  const label={admin:'管理员',editor:'编辑者',viewer:'查看者',revoked:'撤销访问'};
  addLog(`将 ${name} 的权限修改为「${label[role]||role}」`);
  showNotif(`${name} 的权限已更新为：${label[role]||role}`);
  loadAndRenderUsers();
}
// ── Show auth overlay in specific state ──
function showAuthOverlay(state){
  const overlay = document.getElementById('auth-overlay');
  if(!overlay) return;
  overlay.style.display = 'flex';

  // Hide all forms first
  ['aform-login','aform-reg','aform-pending','aform-nosupabase'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.style.display='none';
  });
  const tabs = document.getElementById('auth-tabs');
  const sub  = document.getElementById('auth-sub-text');

  if(state==='nosupabase'){
    if(tabs) tabs.style.display='none';
    if(sub)  sub.textContent='访问受限';
    const el=document.getElementById('aform-nosupabase'); if(el) el.style.display='';
  } else if(state==='pending'){
    if(tabs) tabs.style.display='none';
    if(sub)  sub.textContent='账号待审批';
    const el=document.getElementById('aform-pending'); if(el) el.style.display='';
  } else {
    // login or reg
    if(tabs) tabs.style.display='flex';
    if(sub)  sub.textContent='请登录以继续，账号由管理员审批后生效';
    authTab(state==='reg'?'reg':'login');
  }
}

// ── Admin setup from the locked screen ──
async function doSetupFromAuthScreen(){
  const url=(document.getElementById('setup-sb-url').value||'').trim().replace(/\/$/,'');
  const key=(document.getElementById('setup-sb-key').value||'').trim();
  const msgEl=document.getElementById('setup-sb-msg');
  if(!url||!key){
    if(msgEl) msgEl.innerHTML=`<div class="amsg err" style="margin-top:8px">请填写 Project URL 和 anon key</div>`;
    return;
  }
  const btn=document.getElementById('setup-sb-btn');
  btn.disabled=true; btn.textContent='连接中…';
  try{
    // Test connection
    const r=await fetch(`${url}/rest/v1/scheduler_data?id=eq.main_data&select=id`,{
      headers:{'apikey':key,'Authorization':'Bearer '+key}
    });
    if(!r.ok&&r.status!==404&&r.status!==200) throw new Error(`连接失败 ${r.status}`);
    // Save config
    const local=lsLoad()||{};
    local._sbUrl=url; local._sbKey=key; local._sbTable='scheduler_data';
    lsSave(local);
    _sbUrl=url; _sbKey=key; _sbReady=true;
    _sb=null; getSB(); // reinitialize
    if(msgEl) msgEl.innerHTML=`<div class="amsg ok" style="margin-top:8px">
      ✓ 连接成功！正在进入…<br><br>
      <strong>重要：</strong>请在工具 HTML 文件第 <code>_sbUrl</code> 和 <code>_sbKey</code> 两行填入以下值后重新部署，这样所有人打开后直接看到登录界面：<br>
      <code style="font-size:10px;word-break:break-all">'${url}'</code>
    </div>`;
    setTimeout(()=>location.reload(), 2000);
  }catch(e){
    btn.disabled=false; btn.textContent='连接并进入';
    if(msgEl) msgEl.innerHTML=`<div class="amsg err" style="margin-top:8px">连接失败：${e.message}</div>`;
  }
}

// ─── localStorage helpers ───
function lsSave(d){ try{ localStorage.setItem(LS_KEY,JSON.stringify(d)); }catch(e){} }
function lsLoad(){ try{ const r=localStorage.getItem(LS_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }

// ─── Snapshot ───
function buildSnapshot(){
  return { activities, GAMES, ACT_TYPES, TYPE_COLORS,
           GAME_CATS, GAME_CAT_COLORS, GAME_CAT_TEXT,
           opLogs:opLogs.slice(0,300), calGame, calYear, calMonth,
           attachments, savedAt:ts() };
}

function applySnapshot(d){
  if(!d) return false;
  if(Array.isArray(d.activities)&&d.activities.length) activities=d.activities;
  if(Array.isArray(d.GAMES)&&d.GAMES.length) GAMES=d.GAMES;
  if(Array.isArray(d.ACT_TYPES)&&d.ACT_TYPES.length) ACT_TYPES=d.ACT_TYPES;
  if(d.TYPE_COLORS)     Object.assign(TYPE_COLORS,d.TYPE_COLORS);
  if(d.GAME_CATS)       Object.assign(GAME_CATS,d.GAME_CATS);
  if(d.GAME_CAT_COLORS) Object.assign(GAME_CAT_COLORS,d.GAME_CAT_COLORS);
  if(d.GAME_CAT_TEXT)   Object.assign(GAME_CAT_TEXT,d.GAME_CAT_TEXT);
  if(Array.isArray(d.opLogs)) opLogs=d.opLogs;
  if(d.calGame) calGame=d.calGame;
  if(d.calYear) calYear=d.calYear;
  if(typeof d.calMonth==='number') calMonth=d.calMonth;
  if(d.attachments&&typeof d.attachments==='object') Object.assign(attachments,d.attachments);
  return true;
}

// ─── Supabase REST helpers ───
// Uses plain fetch against Supabase REST API — no SDK needed, works from file://
async function sbUpsert(snapshot){
  const r = await fetch(`${_sbUrl}/rest/v1/${_sbTable}?id=eq.main_data`, {
    method:'PATCH',
    headers:{ 'Content-Type':'application/json','apikey':_sbKey,'Authorization':'Bearer '+_sbKey,
              'Prefer':'return=minimal' },
    body: JSON.stringify({ id:'main_data', payload: JSON.stringify(snapshot) })
  });
  if(r.status===404||r.status===0||!r.ok){
    // Row doesn't exist yet — INSERT
    const r2 = await fetch(`${_sbUrl}/rest/v1/${_sbTable}`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json','apikey':_sbKey,'Authorization':'Bearer '+_sbKey,
                'Prefer':'return=minimal' },
      body: JSON.stringify({ id:'main_data', payload: JSON.stringify(snapshot) })
    });
    if(!r2.ok){ const t=await r2.text(); throw new Error(`写入失败 ${r2.status}: ${t}`); }
  }
}

async function sbRead(){
  const r = await fetch(`${_sbUrl}/rest/v1/${_sbTable}?id=eq.main_data&select=payload`, {
    headers:{ 'apikey':_sbKey, 'Authorization':'Bearer '+_sbKey }
  });
  if(!r.ok) throw new Error(`读取失败 ${r.status}`);
  const rows = await r.json();
  if(!rows||!rows.length) return null;
  return JSON.parse(rows[0].payload);
}

// ─── Load ───
async function loadData(){
  // 1. Always try localStorage first (instant)
  const local = lsLoad();
  if(local && local._snapshot) applySnapshot(local._snapshot);

  // 2. Load Supabase config from localStorage
  if(local && local._sbUrl && local._sbKey){
    _sbUrl  = local._sbUrl;
    _sbKey  = local._sbKey;
    _sbTable = local._sbTable || 'scheduler_data';
    try{
      const cloud = await sbRead();
      if(cloud && cloud.savedAt){
        // Use whichever is newer
        const localTs  = local._snapshot?.savedAt||'';
        const cloudTs  = cloud.savedAt;
        if(!localTs || cloudTs >= localTs){
          applySnapshot(cloud);
        }
      }
      _sbReady = true;
      setBarState('cloud', `云端已连接（Supabase）`);
    }catch(e){
      console.warn('Supabase load failed', e);
      setBarState('error', `云端读取失败，使用本地数据（${e.message}）`);
    }
    return true;
  }

  // 3. Local only
  if(local && local._snapshot){
    setBarState('local', '本地自动保存已启用，数据刷新后不丢失');
    return true;
  }

  setBarState('local', '本地自动保存已启用 · 可在「存储设置」中接入 Supabase 云端');
  return false;
}

// ─── Save ───
async function saveData(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_doSave, 800);
}

async function _doSave(){
  const snapshot = buildSnapshot();

  // Always save to localStorage first
  const local = lsLoad() || {};
  local._snapshot = snapshot;
  lsSave(local);
  updateBarTs();

  // Then try Supabase if configured
  if(!_sbReady || !_sbUrl || !_sbKey){ setBarState('local'); return; }
  setBarState('saving');
  try{
    await sbUpsert(snapshot);
    setBarState('saved', `已同步到云端 · ${ts()}`);
  }catch(e){
    console.warn('Supabase save failed', e);
    setBarState('error', `云端同步失败（本地已保存）: ${e.message}`);
  }
}

async function doConnectCloud(){
  const url = (document.getElementById('sb-url').value||'').trim().replace(/\/$/,'');
  const key = (document.getElementById('sb-key').value||'').trim();
  if(!url||!key){ showNotif('请填写 Project URL 和 anon key',true); return; }

  closeModal();
  setBarState('loading','正在测试 Supabase 连接…');

  _sbUrl=url; _sbKey=key; _sbTable='scheduler_data';

  try{
    // Test: try to read (may return empty, that's ok)
    await fetch(`${url}/rest/v1/${_sbTable}?id=eq.main_data&select=id`,{
      headers:{'apikey':key,'Authorization':'Bearer '+key}
    }).then(r=>{ if(!r.ok&&r.status!==404) throw new Error(`连接测试失败 ${r.status}`); });

    // Save current data to cloud
    await sbUpsert(buildSnapshot());
    _sbReady=true;
    _sb=null; // force re-init so auth module uses new config
    getSB();  // re-initialize with new URL/key

    // Persist config
    const local=lsLoad()||{};
    local._sbUrl=url; local._sbKey=key; local._sbTable='scheduler_data';
    lsSave(local);

    setBarState('cloud','云端已连接！数据已上传到 Supabase');
    showNotif('🎉 Supabase 云端连接成功！所有修改将实时同步');
  }catch(e){
    _sbUrl=''; _sbKey=''; _sbReady=false;
    setBarState('error','连接失败：'+e.message);
    showNotif('连接失败：'+e.message+'\n请检查 URL 和 Key 是否正确', true);
  }
}

function disconnectCloud(){
  const local=lsLoad()||{};
  delete local._sbUrl; delete local._sbKey; delete local._sbTable;
  lsSave(local);
  _sbUrl=''; _sbKey=''; _sbReady=false;
  closeModal();
  setBarState('local');
  showNotif('已断开云端，切换为本地存储模式');
}

function doExportJSON(){
  const snap = buildSnapshot();
  const blob = new Blob([JSON.stringify(snap,null,2)],{type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='竞品排期数据_'+ts().replace(/[: ]/g,'-')+'.json';
  a.click(); URL.revokeObjectURL(url);
  showNotif('JSON 数据包已导出');
}

function doExportCSV(){
  const list=activities;
  const headers=['活动ID','竞品游戏','活动类型','活动名称','开始时间','结束时间','预热时间','活动渠道','活动力度','活动目标','数据来源','录入人','录入时间'];
  const rows=list.map(a=>[a.id,a.game,a.type,a.name,a.startTime,a.endTime,a.preheat||'无',a.channels.join('/'),(a.intensity||''),(a.goals||[]).join('/'),a.source,a.creator,a.createTime]);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='活动列表_'+ts().replace(/[: ]/g,'-')+'.csv';
  a.click(); URL.revokeObjectURL(url);
  showNotif(`CSV 已导出，共 ${list.length} 条活动`);
}

function doImportJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      applySnapshot(d);
      saveData();
      closeModal();
      renderMain();
      showNotif(`导入成功：${activities.length} 条活动已恢复`);
      addLog(`导入了 JSON 数据包`);
    }catch(err){
      showNotif('导入失败：文件格式不正确，请确认是本工具导出的 JSON 文件', true);
    }
  };
  reader.readAsText(file);
}

// ===================== END STORAGE LAYER =====================

function ts(){const n=new Date();return`${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())} ${p(n.getHours())}:${p(n.getMinutes())}`}
function p(v){return String(v).padStart(2,'0')}
function addLog(a){
  opLogs.unshift({time:ts(),user:currentUser.name,action:a});
  saveData();
}
function showNotif(msg,isErr){
  const el=document.getElementById('notif');
  el.textContent=msg;el.style.display='block';
  el.style.borderColor=isErr?'#f5c6c3':'#a7f3d0';
  el.style.color=isErr?'#d93025':'#065f46';
  el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',300)},3000);
}
function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove()}
function getDur(a){return Math.max(1,Math.ceil((new Date(a.endTime)-new Date(a.startTime))/86400000))}
function getStatus(a){
  const now=TODAY,s=new Date(a.startTime),e=new Date(a.endTime);
  if(now<s){if(a.preheat&&new Date(a.preheat)<=now)return{label:'预热中',bg:'#fef9c3',color:'#713f12'};
    return{label:'未开始',bg:'#dbeafe',color:'#1d4ed8'};}
  if(now>e)return{label:'已结束',bg:'#f3f4f6',color:'#6b7280'};
  const d=Math.ceil((e-now)/86400000);
  if(d<=3)return{label:`剩${d}天`,bg:'#fee2e2',color:'#991b1b'};
  return{label:'进行中',bg:'#dcfce7',color:'#14532d'};
}
function typeTag(t){const c=TYPE_COLORS[t]||{bg:'#f3f4f6',text:'#6b7280'};return`<span class="tag" style="background:${c.bg};color:${c.text}">${t}</span>`}

function renderCalendarView(container){
  const year=calYear, month=calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const gameActs=activities.filter(a=>a.game===calGame);
  const cats=GAME_CATS[calGame]||[];
  const catColors=GAME_CAT_COLORS[calGame]||[];
  const catTexts=GAME_CAT_TEXT[calGame]||[];

  // build days array
  const days=[];
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(year,month,d);
    const dow=dt.getDay();
    days.push({d,dow,isWe:dow===0||dow===6,isToday:year===TODAY.getFullYear()&&month===TODAY.getMonth()&&d===TODAY.getDate()});
  }
  const totalW=days.length*36; // var(--day-w)=36px

  // week labels for header
  function buildWeekBlocks(){
    const blocks=[];let cur=null;
    days.forEach(day=>{
      const weekNum=getWeekNum(new Date(year,month,day.d));
      if(!cur||cur.wn!==weekNum){
        if(cur)blocks.push(cur);
        cur={wn:weekNum,start:day.d,count:1};
      } else {cur.count++;}
    });
    if(cur)blocks.push(cur);
    return blocks;
  }
  function getWeekNum(d){
    const jan1=new Date(d.getFullYear(),0,1);
    return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  }
  const weekBlocks=buildWeekBlocks();

  // compute bar left/width in px given day column positions
  function barGeom(startStr,endStr){
    const s=new Date(startStr), e=new Date(endStr);
    const mStart=new Date(year,month,1), mEnd=new Date(year,month,daysInMonth,23,59,59);
    if(s>mEnd||e<mStart)return null;
    const sd=Math.max(1,(s<mStart?1:s.getDate()));
    const ed=Math.min(daysInMonth,(e>mEnd?daysInMonth:e.getDate()));
    const left=(sd-1)*36;
    const width=(ed-sd+1)*36-2;
    return{left,width};
  }

  // ── Row splitting: detect overlapping bars and assign to sub-rows ──
  // Two activities "overlap in the calendar" if their visible date ranges intersect this month.
  function actsOverlap(a, b){
    const mStart=new Date(year,month,1), mEnd=new Date(year,month,daysInMonth,23,59,59);
    const as=new Date(a.startTime), ae=new Date(a.endTime);
    const bs=new Date(b.startTime), be=new Date(b.endTime);
    const visAs=as<mStart?mStart:as, visAe=ae>mEnd?mEnd:ae;
    const visBs=bs<mStart?mStart:bs, visBe=be>mEnd?mEnd:be;
    if(visAs>mEnd||visAe<mStart||visBs>mEnd||visBe<mStart)return false;
    return visAs<=visBe && visBs<=visAe;
  }

  // Pack acts into non-overlapping sub-rows using greedy interval packing
  function packIntoSubRows(acts){
    const subRows=[]; // each subRow is array of acts
    acts.forEach(act=>{
      // find first subRow where act doesn't overlap any existing act
      let placed=false;
      for(const sr of subRows){
        if(!sr.some(existing=>actsOverlap(act,existing))){
          sr.push(act);placed=true;break;
        }
      }
      if(!placed) subRows.push([act]);
    });
    return subRows;
  }

  // build flat row list with cat separators — each type row may expand into multiple sub-rows
  const rowItems=[];
  cats.forEach((catDef,ci)=>{
    rowItems.push({type:'cat',label:catDef.cat,ci});
    catDef.rows.forEach(rowDef=>{
      const rowActs=gameActs.filter(a=>rowDef.types.includes(a.type));
      // filter to acts visible this month
      const visActs=rowActs.filter(a=>{
        const s=new Date(a.startTime),e=new Date(a.endTime);
        return s<=new Date(year,month,daysInMonth,23,59,59)&&e>=new Date(year,month,1);
      });
      const subRows=visActs.length>0?packIntoSubRows(visActs):[];
      if(subRows.length===0){
        // empty row — show one blank row
        rowItems.push({type:'row',label:rowDef.label,acts:[],types:rowDef.types,ci,subRowIdx:0,totalSubRows:1,allActs:rowActs});
      } else {
        subRows.forEach((srActs,sri)=>{
          rowItems.push({
            type:'row',
            label:sri===0?rowDef.label:'',  // label only on first sub-row
            acts:srActs,
            types:rowDef.types,
            ci,
            subRowIdx:sri,
            totalSubRows:subRows.length,
            allActs:rowActs
          });
        });
      }
    });
  });

  // render game tabs
  const gameTabs=GAMES.map(g=>`<div class="game-tab ${g===calGame?'active':''}" onclick="switchCalGame('${g}')">${g}</div>`).join('');

  // Month names
  const mNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

  // Left column HTML
  let leftTop=`<div class="left-top">活动类型</div>`;
  let leftRows='';
  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=catColors[item.ci%catColors.length]||'#f3f4f6';
      const tc=catTexts[item.ci%catTexts.length]||'#374151';
      leftRows+=`<div class="left-cat-header" style="background:${bg};color:${tc}">${item.label}</div>`;
    } else {
      // For sub-rows after the first, show a continuation indicator
      if(item.subRowIdx===0){
        // first sub-row: show label, with row-count badge if multiple
        const badge=item.totalSubRows>1
          ?`<span style="margin-left:4px;font-size:9px;background:var(--bg3);color:var(--text3);padding:1px 5px;border-radius:8px">${item.totalSubRows}</span>`
          :'';
        leftRows+=`<div class="left-row" title="${item.label}">${item.label}${badge}</div>`;
      } else {
        // continuation row — subtle indent indicator
        leftRows+=`<div class="left-row" style="opacity:.55;font-size:10px;padding-left:18px">↳ 续行 ${item.subRowIdx+1}</div>`;
      }
    }
  });

  // Right column header HTML
  let weekHeaderHtml='';
  weekBlocks.forEach(wb=>{
    weekHeaderHtml+=`<div class="week-block" style="width:${wb.count*36}px">W${wb.wn}</div>`;
  });
  let dayHeaderHtml='';
  days.forEach(day=>{
    const cls=(day.isWe?'weekend':'')+(day.isToday?' today':'');
    dayHeaderHtml+=`<div class="day-hcell ${cls}">${day.d}</div>`;
  });

  // Right body rows HTML
  let rightBodyHtml='';
  // Today line position
  const todayPos=TODAY.getFullYear()===year&&TODAY.getMonth()===month?(TODAY.getDate()-1)*36+18:-1;

  rowItems.forEach(item=>{
    if(item.type==='cat'){
      const bg=catColors[item.ci%catColors.length]||'#f3f4f6';
      let dayCells='';
      days.forEach(day=>{
        dayCells+=`<div class="day-bg" style="background:${bg};opacity:.5"></div>`;
      });
      rightBodyHtml+=`<div class="right-cat-header" style="background:${bg};opacity:.7">${dayCells}</div>`;
    } else {
      let dayCells='';
      days.forEach(day=>{
        const cls=(day.isWe?' weekend':'')+(day.isToday?' today':'');
        dayCells+=`<div class="day-bg${cls}"></div>`;
      });
      // bars for this row
      let bars='';
      item.acts.forEach(act=>{
        // main bar
        const geom=barGeom(act.startTime,act.endTime);
        if(geom){
          const c=TYPE_COLORS[act.type]||{bg:'#e5e7eb',text:'#374151',border:'#9ca3af'};
          const escaped=act.name.replace(/'/g,"\\'");
          bars+=`<div class="act-bar" style="left:${geom.left}px;width:${geom.width}px;background:${c.bg};color:${c.text};border:1px solid ${c.border}" 
            onmouseenter="showTip(event,'${act.id}')" onmouseleave="hideTip()" onclick="showDetail('${act.id}')">${act.name}</div>`;
        }
        // preheat bar
        if(act.preheat){
          const pGeom=barGeom(act.preheat,act.startTime);
          if(pGeom&&pGeom.width>4){
            const c=TYPE_COLORS[act.type]||{border:'#9ca3af',text:'#6b7280'};
            bars+=`<div class="preheat-bar" style="left:${pGeom.left}px;width:${pGeom.width-2}px;border-color:${c.border};color:${c.text}" 
              onmouseenter="showTip(event,'${act.id}','preheat')" onmouseleave="hideTip()">预热</div>`;
          }
        }
      });
      rightBodyHtml+=`<div class="right-row">
        ${dayCells}
        ${bars}
        ${todayPos>=0?`<div class="today-line" style="left:${todayPos}px"></div>`:''}
      </div>`;
    }
  });

  // Legend
  const usedTypes=[...new Set(gameActs.map(a=>a.type))];
  const legendHtml=usedTypes.map(t=>{
    const c=TYPE_COLORS[t]||{bg:'#e5e7eb',text:'#374151'};
    return`<div class="legend-item"><div class="legend-swatch" style="background:${c.bg};border:1px solid ${c.border||c.bg}"></div>${t}</div>`;
  }).join('');

  container.innerHTML=`
  <div class="cal-view">
    <div class="cal-toolbar">
      <div class="cal-title">${year}年 ${mNames[month]} — ${calGame}</div>
      <div class="game-switcher">${gameTabs}</div>
      <div class="month-nav">
        <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
        <span class="mnav-label">${year}/${month+1}</span>
        <button class="mnav-btn" onclick="changeMonth(1)">›</button>
        <button class="btn sm" onclick="calYear=2026;calMonth=2;renderMain()" style="margin-left:4px">今天</button>
        <button class="btn sm" onclick="showModal('add')" style="margin-left:4px">+ 新增</button>
      </div>
    </div>
    <div class="gantt-container" id="ganttContainer">
      <div class="gantt-left" id="ganttLeft">
        ${leftTop}
        <div class="left-rows" id="leftRows">${leftRows}</div>
      </div>
      <div class="gantt-right" id="ganttRight">
        <div class="gantt-right-inner" style="width:${totalW}px">
          <div class="right-header">
            <div class="week-header-row">${weekHeaderHtml}</div>
            <div class="day-header-row">${dayHeaderHtml}</div>
          </div>
          <div id="rightBody">${rightBodyHtml}</div>
        </div>
      </div>
    </div>
    <div class="legend-strip">${legendHtml||'<span style="color:var(--text3);font-size:11px">暂无活动数据，点击右上角「+新增」添加活动</span>'}</div>
  </div>`;

  // sync scroll between left and right
  const gr=document.getElementById('ganttRight');
  const lr=document.getElementById('leftRows');
  if(gr&&lr){
    gr.addEventListener('scroll',()=>{lr.scrollTop=gr.scrollTop});
  }
}

function switchCalGame(g){calGame=g;renderMain();saveData()}
function changeMonth(d){
  calMonth+=d;
  if(calMonth<0){calMonth=11;calYear--}
  if(calMonth>11){calMonth=0;calYear++}
  renderMain();saveData();
}

// Tooltip
function showTip(e,id,mode){
  const a=activities.find(x=>x.id===id);if(!a)return;
  const t=document.getElementById('tip');
  const st=getStatus(a);
  t.innerHTML=`<div class="tip-title">${a.name}</div>
    <div class="tip-row">竞品：<span>${a.game}</span></div>
    <div class="tip-row">类型：<span>${a.type}</span></div>
    <div class="tip-row">时间：<span>${a.startTime.split(' ')[0]} ~ ${a.endTime.split(' ')[0]}</span></div>
    ${mode==='preheat'&&a.preheat?`<div class="tip-row" style="color:var(--primary)">预热：<span>${a.preheat.split(' ')[0]} 起</span></div>`:''}
    ${a.intensity?`<div class="tip-row">力度：<span>${a.intensity}</span></div>`:''}
    <div class="tip-row">渠道：<span>${a.channels.join(' / ')}</span></div>
    <div style="margin-top:6px"><span class="tag" style="background:${st.bg};color:${st.color}">${st.label}</span></div>`;
  t.style.display='block';
  moveTip(e);
}
function moveTip(e){
  const t=document.getElementById('tip');
  const x=Math.min(e.clientX+14,window.innerWidth-280);
  const y=Math.min(e.clientY+14,window.innerHeight-140);
  t.style.left=x+'px';t.style.top=y+'px';
}
function hideTip(){document.getElementById('tip').style.display='none'}
document.addEventListener('mousemove',e=>{const t=document.getElementById('tip');if(t.style.display!=='none')moveTip(e)});

function refreshTable(){
  const q=(document.getElementById('searchInput')||{value:''}).value.toLowerCase();
  const sf=(document.getElementById('statusFilter')||{value:'all'}).value;
  const sb=(document.getElementById('sortBy')||{value:'startTime'}).value;
  const now=TODAY;
  let list=activities.filter(a=>{
    if(activeGameFilter!=='all'&&a.game!==activeGameFilter)return false;
    if(activeTypeFilter!=='all'&&a.type!==activeTypeFilter)return false;
    if(q&&!a.name.toLowerCase().includes(q)&&!a.game.includes(q)&&!a.type.includes(q))return false;
    if(sf==='active'&&!(new Date(a.startTime)<=now&&new Date(a.endTime)>=now))return false;
    if(sf==='upcoming'&&new Date(a.startTime)<=now)return false;
    if(sf==='ended'&&new Date(a.endTime)>=now)return false;
    return true;
  });
  list.sort((x,y)=>sb==='game'?x.game.localeCompare(y.game):new Date(y[sb])-new Date(x[sb]));
  const rc=document.getElementById('resultCount');
  if(rc)rc.textContent=`共 ${list.length} 条`;
  const tb=document.getElementById('tableBody');if(!tb)return;
  const canEdit=currentUser.role!=='viewer',canDel=currentUser.role==='admin';
  if(!list.length){tb.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text3)">暂无符合条件的活动记录</td></tr>`;return;}
  tb.innerHTML=list.map(a=>{
    const st=getStatus(a);
    return`<tr>
      <td style="font-weight:500">${a.game}</td>
      <td>${typeTag(a.type)}</td>
      <td title="${a.name}">${a.name}</td>
      <td><span class="tag" style="background:${st.bg};color:${st.color}">${st.label}</span></td>
      <td style="font-size:11px">${a.startTime.split(' ')[0]}</td>
      <td style="font-size:11px">${a.endTime.split(' ')[0]}</td>
      <td style="font-size:11px">${getDur(a)}天</td>
      <td style="font-size:11px;color:var(--text2)">${a.channels.join('/')}</td>
      <td>
        <button class="btn sm" onclick="showDetail('${a.id}')">详情</button>
        ${canEdit?`<button class="btn sm" onclick="showModal('edit','${a.id}')" style="margin-left:3px">编辑</button>`:''}
        ${canDel?`<button class="btn sm danger" onclick="confirmDelete('${a.id}')" style="margin-left:3px">删除</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

function showAddGameDialog(){

function doAddGame(){
  const name=document.getElementById('new-game-name').value.trim();
  if(!name){showNotif('游戏名称不能为空',true);return}
  if(GAMES.includes(name)){showNotif(`「${name}」已存在，请勿重复添加`,true);return}
  GAMES.push(name);
  // add default cat config for new game
  GAME_CATS[name]=[
    {cat:'版本&活动',rows:ACT_TYPES.slice(0,4).map(t=>({label:t,types:[t]}))},
    {cat:'商业化',rows:ACT_TYPES.slice(4).map(t=>({label:t,types:[t]}))},
  ];
  GAME_CAT_COLORS[name]=['#dbeafe','#dcfce7','#fef9c3'];
  GAME_CAT_TEXT[name]=['#1d4ed8','#14532d','#713f12'];
  addLog(`新增了竞品游戏「${name}」`);
  showNotif(`新增成功：已添加竞品游戏「${name}」`);
  closeModal();renderMain();
}

function doEditGame(idx,oldName){
  const newName=document.getElementById('edit-game-name').value.trim();
  if(!newName){showNotif('游戏名称不能为空',true);return}
  if(newName!==oldName&&GAMES.includes(newName)){showNotif(`「${newName}」已存在`,true);return}
  GAMES[idx]=newName;
  // migrate activities
  activities.forEach(a=>{if(a.game===oldName)a.game=newName});
  // migrate GAME_CATS, GAME_CAT_COLORS, GAME_CAT_TEXT
  if(GAME_CATS[oldName]){GAME_CATS[newName]=GAME_CATS[oldName];delete GAME_CATS[oldName]}
  if(GAME_CAT_COLORS[oldName]){GAME_CAT_COLORS[newName]=GAME_CAT_COLORS[oldName];delete GAME_CAT_COLORS[oldName]}
  if(GAME_CAT_TEXT[oldName]){GAME_CAT_TEXT[newName]=GAME_CAT_TEXT[oldName];delete GAME_CAT_TEXT[oldName]}
  if(calGame===oldName)calGame=newName;
  addLog(`将竞品游戏「${oldName}」重命名为「${newName}」`);
  showNotif(`修改成功：「${oldName}」已更名为「${newName}」`);
  closeModal();renderMain();
}

function confirmDeleteGame(idx){
  if(currentUser.role!=='admin'){showNotif('仅管理员可操作',true);return}
  const name=GAMES[idx];

  const ov=document.createElement('div');

  ov.innerHTML=`<div class="confirm-box">

      <button class="btn danger" onclick="doDeleteGame(${idx})">确认删除</button>

  document.body.appendChild(ov);

function doDeleteGame(idx){
  const name=GAMES[idx];

  const colorIdx=ov?._selectedColorIdx||0;
  ACT_TYPES.push(name);

function doEditType(idx,oldName){
  const newName=document.getElementById('edit-type-name').value.trim();

  const colorIdx=ov?._selectedColorIdx||0;
  ACT_TYPES[idx]=newName;
  TYPE_COLORS[newName]=TYPE_COLOR_PRESETS[colorIdx%TYPE_COLOR_PRESETS.length];
  if(newName!==oldName)delete TYPE_COLORS[oldName];

  activities.forEach(a=>{if(a.type===oldName)a.type=newName});

function doDeleteType(idx){
  const name=ACT_TYPES[idx];

  Object.values(GAME_CATS).forEach(cats=>cats.forEach(cat=>{
    cat.rows=cat.rows.filter(row=>!row.types.every(t=>t===name));
  }));
  addLog(`删除了活动类型「${name}」`);
  showNotif(`已删除活动类型「${name}」`);
  closeModal();renderMain();
}

// ===================== TYPE DRAG REORDER =====================
let _dragTypeIdx = null;

function typeDragStart(e, idx){
  _dragTypeIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.4';
}

function typeDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.style.background = 'var(--bg2)';
  e.currentTarget.style.borderTop = '2px solid #5046e4';
}

function typeDragLeave(e){
  e.currentTarget.style.background = '';
  e.currentTarget.style.borderTop = '';
}

function typeDrop(e, targetIdx){
  e.preventDefault();
  e.currentTarget.style.background = '';
  e.currentTarget.style.borderTop = '';
  if(_dragTypeIdx === null || _dragTypeIdx === targetIdx){ _dragTypeIdx=null; return; }

  // Reorder ACT_TYPES array
  const moved = ACT_TYPES.splice(_dragTypeIdx, 1)[0];
  ACT_TYPES.splice(targetIdx, 0, moved);

  // Also reorder rows in GAME_CATS to match new type order
  // Each game's cat rows: sort rows within each cat to follow ACT_TYPES order
  Object.values(GAME_CATS).forEach(cats=>{
    cats.forEach(cat=>{
      cat.rows.sort((a,b)=>{
        const ai = Math.min(...a.types.map(t=>ACT_TYPES.indexOf(t)).filter(i=>i>=0));
        const bi = Math.min(...b.types.map(t=>ACT_TYPES.indexOf(t)).filter(i=>i>=0));
        return (ai===-1?999:ai)-(bi===-1?999:bi);
      });
    });
  });

  _dragTypeIdx = null;
  addLog(`调整了活动类型排序`);
  showNotif('排序已更新，日历行顺序同步变化');
  saveData();
  refreshCatPanel();
}
// ===================== END TYPE DRAG REORDER =====================

function renderCatPanelHtml(game){

  return cats.map((cat,ci)=>{
    const bg = catColors[ci % catColors.length] || '#f3f4f6';
    const tc = catTexts[ci % catTexts.length]   || '#374151';
    const typeChips = cat.rows.map((row,ri)=>`
      <span style="display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border2);border-radius:14px;padding:2px 8px;font-size:11px;cursor:pointer;margin:2px"
        onclick="showMoveTypeDialog('${game}',${ci},${ri})"
        title="点击移动到其他分组">
        ${row.label}
        <span style="color:var(--text3);font-size:10px">⇄</span>
      </span>`).join('');

    return`<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden"
      draggable="true" data-ci="${ci}"
      ondragstart="catDragStart(event,${ci},'${game}')"
      ondragover="catDragOver(event)"
      ondragleave="catDragLeave(event)"
      ondrop="catDrop(event,${ci},'${game}')">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:${bg};cursor:grab">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:${tc};opacity:.5;font-size:14px">⠿</span>
          <span style="font-size:13px;font-weight:600;color:${tc}">${cat.cat}</span>
          <span style="font-size:10px;color:${tc};opacity:.7">${cat.rows.length} 个类型</span>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn sm" onclick="showEditCatDialog('${game}',${ci})" style="font-size:10px;padding:2px 8px">修改名称</button>
          <button class="btn sm" onclick="showAddTypeToCatDialog('${game}',${ci})" style="font-size:10px;padding:2px 8px">+ 添加类型</button>
          <button class="btn sm danger" onclick="confirmDeleteCat('${game}',${ci})" style="font-size:10px;padding:2px 8px">删除分组</button>
        </div>
      </div>
      <div style="padding:8px 12px;background:var(--bg);min-height:36px;display:flex;flex-wrap:wrap;align-items:center;gap:2px">
        ${typeChips || `<span style="font-size:11px;color:var(--text3)">暂无活动类型，点击「+ 添加类型」</span>`}
      </div>
    </div>`;
  }).join('');
}

function saveActivity(){
  const g=document.getElementById('f-game').value;
  const t=document.getElementById('f-type').value;
  const n=document.getElementById('f-name').value.trim();
  const s=document.getElementById('f-start').value.replace('T',' ');
  const e=document.getElementById('f-end').value.replace('T',' ');
  const ph=document.getElementById('f-preheat').value.replace('T',' ');
  const src=document.getElementById('f-source').value;
  const channels=[...document.getElementById('f-channels').selectedOptions].map(o=>o.value);
  const goals=[...document.getElementById('f-goals').selectedOptions].map(o=>o.value);
  const intensity=document.getElementById('f-intensity').value;
  const rules=document.getElementById('f-rules').value;
  const note=document.getElementById('f-note').value;
  if(!n){showNotif('活动名称不能为空',true);return}
  if(!s||!e){showNotif('时间不能为空',true);return}
  if(new Date(s)>new Date(e)){showNotif('结束时间不能早于开始时间，请修改',true);return}
  if(!channels.length){showNotif('请至少选择一个活动渠道',true);return}
  const now=ts();
  if(editingId){
    const idx=activities.findIndex(a=>a.id===editingId);
    if(idx>=0){
      activities[idx]={...activities[idx],game:g,type:t,name:n,startTime:s,endTime:e,preheat:ph,channels,goals,intensity,rules,note,source:src,modifier:currentUser.name,modifyTime:now};
      addLog(`修改了《${g}》${n}`);
      showNotif(`修改成功：${n}`);
    }
  } else {
    const gc={'王者荣耀':'WZRY','和平精英':'HPJY','原神':'YS','明日方舟':'MRF','崩坏：星穹铁道':'BHXQTD','第五人格':'DWRG','蛋仔派对':'DZPD'};
    const tc={'充值返利':'RECHARGE','版本更新':'UPDATE','节日活动':'EVENT','赛事活动':'ESPORTS','福利发放':'WELFARE','跨界联动':'COLLAB','新服开放':'NEWSVR','限时折扣':'DISCOUNT'};
    const dc=s.split(' ')[0].replace(/-/g,'');
    const seq=String(activities.filter(a=>a.game===g&&a.type===t).length+1).padStart(3,'0');
    const newId=`${gc[g]||'GAME'}-${tc[t]||'ACT'}-${dc}-${seq}`;
    activities.unshift({id:newId,game:g,type:t,name:n,startTime:s,endTime:e,preheat:ph,channels,goals,intensity,rules,note,source:src,creator:currentUser.name,createTime:now,modifier:currentUser.name,modifyTime:now});
    addLog(`新增了《${g}》${n}`);
    showNotif(`新增成功：《${g}》${t} · ${n}`);
    calGame=g;currentTab='calendar';
    document.querySelectorAll('.nav-tab').forEach((tb,i)=>tb.classList.toggle('active',i===1));
  }
  closeModal();renderMain();
}

function showDetail(id){

function formatSize(bytes){
  if(!bytes) return '';
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return Math.round(bytes/1024)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

function genAttId(){return 'att_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}

// Drag-and-drop handlers
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}
function onDrop(e,actId){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  processFiles([...e.dataTransfer.files], actId);
}
function onFileSelect(e,actId){processFiles([...e.target.files], actId);e.target.value='';}

function processFiles(files, actId){
  const MAX=5*1024*1024;
  let count=0;
  files.forEach(file=>{
    if(file.size>MAX){showNotif(`「${file.name}」超过5MB限制，已跳过`,true);return;}
    const isImg=file.type.startsWith('image/');
    const isVid=file.type.startsWith('video/');
    if(!isImg&&!isVid){showNotif(`「${file.name}」不是图片或视频，已跳过`,true);return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const att={
        id:genAttId(), name:file.name,
        type:isImg?'image':'video',
        size:file.size, data:ev.target.result,
        addedBy:currentUser.name, addedAt:ts()
      };
      if(!attachments[actId]) attachments[actId]=[];
      attachments[actId].push(att);
      refreshAttachList(actId);
      saveData();
      count++;
      if(count===files.length) showNotif(`成功添加 ${count} 个附件`);
    };
    reader.readAsDataURL(file);
  });
}

function renderMediaView(container){
  // collect all attachments, grouped by game
  const allGames=['all',...GAMES];
  const filtered=mediaGame==='all'
    ? Object.entries(attachments)
    : Object.entries(attachments).filter(([actId])=>{
        const act=activities.find(a=>a.id===actId);
        return act&&act.game===mediaGame;
      });

  // Flatten all items with activity info
  const items=[];
  filtered.forEach(([actId,atts])=>{
    const act=activities.find(a=>a.id===actId);
    atts.forEach(att=>items.push({att,act,actId}));
  });

  // Sort newest first
  items.sort((a,b)=>b.att.addedAt>a.att.addedAt?1:-1);

  const gameCounts={all:0};
  GAMES.forEach(g=>{gameCounts[g]=0});
  Object.entries(attachments).forEach(([actId,atts])=>{
    const act=activities.find(a=>a.id===actId);
    if(act){ gameCounts[act.game]=(gameCounts[act.game]||0)+atts.length; gameCounts.all+=atts.length; }
  });

  const tabs=allGames.map(g=>`<div class="media-game-tab ${mediaGame===g?'active':''}" onclick="mediaGame='${g}';renderMain()">${g==='all'?'全部游戏':g} <span style="opacity:.7">${gameCounts[g]||0}</span></div>`).join('');

  container.innerHTML=`<div class="media-view">
    <div class="media-toolbar">
      <div style="font-size:13px;font-weight:600">媒体库</div>
      <div class="media-game-tabs">${tabs}</div>
      <div style="margin-left:auto;font-size:11px;color:var(--text3)">${items.length} 个文件</div>
    </div>
    ${items.length===0
      ?`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px">
          <div style="font-size:40px">🖼</div>
          <div style="font-size:14px">暂无媒体文件</div>
          <div style="font-size:12px">在活动详情页上传图片或视频后，会在这里汇总显示</div>

      :`<div class="media-grid">
        ${items.map(({att,act,actId})=>`
          <div class="media-card" onclick="openLightboxFromMedia('${actId}','${att.id}')">
            ${att.type==='image'
              ?`<img class="media-thumb" src="${att.data}" alt="${att.name}" loading="lazy">`
              :`<div class="media-thumb-video">${att.type==='video_url'?'🔗':'▶'}</div>`}
            <div class="media-card-body">
              <div class="media-card-name" title="${att.name}">${att.name}</div>

              <div class="media-card-meta">${act?act.game:''} · ${att.addedBy}</div>
            </div>
          </div>`).join('')}
      </div>`}
  </div>`;
}

// Build context snapshot for AI — summarize current data concisely
function buildAIContext(){
  const now = TODAY;
  const active = activities.filter(a=>new Date(a.startTime)<=now&&new Date(a.endTime)>=now);
  const upcoming = activities.filter(a=>new Date(a.startTime)>now).sort((a,b)=>new Date(a.startTime)-new Date(b.startTime));
  const recent = activities.filter(a=>new Date(a.endTime)<now).sort((a,b)=>new Date(b.endTime)-new Date(a.endTime)).slice(0,10);

  const gameSummary = GAMES.map(g=>{
    const acts = activities.filter(a=>a.game===g);
    const activeActs = acts.filter(a=>new Date(a.startTime)<=now&&new Date(a.endTime)>=now);
    return `${g}：共${acts.length}条活动，当前进行中${activeActs.length}条`;
  }).join('；');

  const typeSummary = ACT_TYPES.map(t=>{
    const n = activities.filter(a=>a.type===t).length;
    return `${t}(${n}条)`;
  }).join('、');

  const activeDetail = active.slice(0,15).map(a=>
    `[${a.game}·${a.type}] ${a.name}，${a.startTime.split(' ')[0]}~${a.endTime.split(' ')[0]}，渠道:${a.channels.join('/')}${a.intensity?'，力度:'+a.intensity:''}${a.goals?.length?'，目标:'+a.goals.join('/'):''}${a.rules?'，规则:'+a.rules.slice(0,60):''}`
  ).join('\n');

  const upcomingDetail = upcoming.slice(0,10).map(a=>
    `[${a.game}·${a.type}] ${a.name}，${a.startTime.split(' ')[0]}开始${a.preheat?'（预热'+a.preheat.split(' ')[0]+'）':''}`
  ).join('\n');

  return `你是一个专业的游戏运营分析助手，正在帮助分析竞品游戏运营活动排期数据。

【当前数据概览】
- 今日日期：${TODAY_STR}
- 竞品游戏：${GAMES.join('、')}
- 活动类型：${typeSummary}
- 各游戏活动量：${gameSummary}
- 当前进行中活动共 ${active.length} 条，即将开始活动共 ${upcoming.length} 条

【当前进行中的活动（最多15条）】
${activeDetail || '无'}

【即将开始的活动（最多10条）】
${upcomingDetail || '无'}

请基于以上真实数据回答用户的问题。回答要简洁专业，适当给出分析洞察。如果问题超出数据范围，请如实说明。`;
}

// Call Anthropic API
async function callClaude(userMsg, systemPrompt){
  // Use the built-in Anthropic API proxy — no API key needed,
  // authentication is handled by the hosting environment.
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [
        ...aiMessages
          .filter(m => m.role === 'user' || m.role === 'assistant')
          .slice(-10),
        {role: 'user', content: userMsg}
      ]
    })
  });
  if(!resp.ok){
    const errText = await resp.text().catch(()=>'');
    throw new Error(`API 错误 ${resp.status}${errText ? '：' + errText.slice(0,100) : ''}`);
  }
  const data = await resp.json();
  if(data.error) throw new Error(data.error.message);
  return data.content?.find(b=>b.type==='text')?.text || '抱歉，未能获取回答';
}

    </div>
    <!-- Right: Q&A Chat -->

                `<span class="ai-suggestion" onclick="sendAIQuestion('${q}')">${q}</span>`
              ).join('')}

        <div class="ai-input-row">
          <textarea class="ai-input" id="ai-input" placeholder="输入问题，如：王者荣耀本月有哪些活动？" rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAIMessage()}"
            oninput="this.style.height='40px';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>

  // Load recommendations
  if(aiDailyRecs){
    renderRecs(aiDailyRecs);
  } else {
    loadDailyRecs();

  // Restore chat history
  if(aiMessages.length > 0){
    const msgContainer = document.getElementById('ai-messages');
    if(msgContainer){
      msgContainer.innerHTML = '';
      aiMessages.forEach(m=>{
        if(m.role !== 'system') appendMessage(m.role, m.content);

// ── Daily Recommendations ──
async function loadDailyRecs(){
  const btn = document.getElementById('rec-refresh-btn');
  const list = document.getElementById('ai-rec-list');
  if(!list) return;
  if(btn) btn.disabled = true;
  list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px"><div style="font-size:20px;margin-bottom:8px;animation:spin .8s linear infinite;display:inline-block">◌</div><br>AI 正在分析中…</div>`;

  const prompt = buildAIContext();
  const today = TODAY_STR;
  const userMsg = `今天是${today}。请基于以上竞品活动数据，给运营分析师推荐今天值得重点关注的3~4个活动，每个推荐包含：
1. 活动名称和所属游戏
2. 推荐理由（为什么今天特别值得关注）
3. 一条专业洞察或行动建议（如：可以参考这个活动的力度设计竞品方案）

请以JSON格式返回，格式：
[{"game":"游戏名","type":"活动类型","name":"活动名","reason":"推荐理由","insight":"洞察建议","tag":"今日开始/即将结束/高价值参考/竞争激烈","tagColor":"#dc2626或#d97706或#5046e4或#059669"}]
只返回JSON数组，不要其他文字。`;

  try{
    const result = await callClaude(userMsg, prompt);
    const clean = result.replace(/```json|```/g,'').trim();
    const recs = JSON.parse(clean);
    aiDailyRecs = recs;
    renderRecs(recs);
  }catch(e){
    console.warn('AI rec error', e);
    if(list) list.innerHTML = `<div style="padding:16px;font-size:12px;color:var(--text3)">
      <div style="color:#d93025;margin-bottom:8px">⚠ 推荐生成失败</div>
      <div>${e.message}</div>
      <div style="margin-top:8px;font-size:11px">请确认工具已接入 Anthropic API</div>
    </div>`;
  }
  if(btn) btn.disabled = false;
}

function renderRecs(recs){
  const list = document.getElementById('ai-rec-list');
  if(!list) return;
  if(!recs || !recs.length){
    list.innerHTML = `<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">暂无推荐数据</div>`;
    return;
  }
  list.innerHTML = recs.map((r,i)=>`
    <div class="ai-rec-card" onclick="sendAIQuestion('告诉我更多关于${r.name}的信息')">
      <div>
        <span class="ai-rec-tag" style="background:${r.tagColor||'#5046e4'}22;color:${r.tagColor||'#5046e4'}">${r.tag||'推荐关注'}</span>
        <span style="font-size:10px;color:var(--text3);margin-left:6px">${r.game} · ${r.type}</span>
      </div>
      <div class="ai-rec-title">${r.name}</div>
      <div class="ai-rec-insight" style="margin-bottom:5px;color:var(--text2)">${r.reason}</div>
      <div class="ai-rec-insight" style="background:var(--bg2);padding:6px 8px;border-radius:5px;border-left:2px solid ${r.tagColor||'#5046e4'}">
        💡 ${r.insight}
      </div>
    </div>`).join('') + `<div style="font-size:10px;color:var(--text3);text-align:center;padding:6px 0">${TODAY_STR} 每日推荐 · 点击卡片可继续追问</div>`;
}

// ── Q&A Chat ──
function appendMessage(role, content){
  const container = document.getElementById('ai-messages');
  if(!container) return;
  // Remove empty state if present
  const empty = container.querySelector('.ai-empty');
  if(empty) empty.remove();

  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  // Simple markdown: bold, line breaks
  div.innerHTML = content
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function sendAIQuestion(q){
  const input = document.getElementById('ai-input');
  if(input){ input.value = q; input.style.height = '40px'; }
  sendAIMessage();
}

async function sendAIMessage(){
  if(aiLoading) return;
  const input = document.getElementById('ai-input');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;

  aiLoading = true;
  input.value = ''; input.style.height = '40px';
  const sendBtn = document.getElementById('ai-send-btn');
  if(sendBtn) sendBtn.disabled = true;

  // Add user message to UI and history
  appendMessage('user', text);
  aiMessages.push({role:'user', content:text});

  // Loading indicator
  const loadingDiv = appendMessage('assistant', '▋');
  if(loadingDiv) loadingDiv.classList.add('loading');

  try{
    const systemPrompt = buildAIContext();
    const reply = await callClaude(text, systemPrompt);

    // Replace loading with actual reply
    if(loadingDiv){ loadingDiv.remove(); }
    appendMessage('assistant', reply);
    aiMessages.push({role:'assistant', content:reply});

    // Keep history to last 20 messages
    if(aiMessages.length > 20) aiMessages = aiMessages.slice(-20);

  }catch(e){
    if(loadingDiv){ loadingDiv.remove(); }
    appendMessage('assistant', `⚠ 请求失败：${e.message}\n\n请确认 Anthropic API 已接入（工具使用 Claude Sonnet 模型）。`);
  }

  aiLoading = false;
  if(sendBtn) sendBtn.disabled = false;
  if(input) input.focus();
}

  await loadData();
  getSB(); // initialize client
  const ld=document.getElementById('cloud-loader');

  if(getSB()){
    // Supabase is configured — check if already logged in
    const loggedIn = await checkAuthState();
    if(ld) ld.remove();
    if(!loggedIn){
      // Show login/register screen — all visitors see this, no admin bypass
      currentUser={id:'',name:'',role:'none',email:''};
      updateTopbarUser();
      showAuthOverlay('login');
    }
    // handleAuthUser() calls renderMain() on successful login
  } else {
    // Supabase not yet configured in this file
    // Only the admin who is setting up for the first time should see the setup form
    if(ld) ld.remove();
    currentUser={id:'',name:'',role:'none',email:''};
    updateTopbarUser();
    showAuthOverlay('nosupabase');
  }
}

init();
